services:
  - type: web
    name: flowernet-generator
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: GENERATOR_PROVIDER
        value: deepseek
      - key: GENERATOR_MODEL
        value: deepseek-v4-flash
      - key: GENERATOR_OPENROUTER_MODEL
        value: qwen/qwen3-coder:free
      - key: GENERATOR_GEMINI_MODEL
        value: models/gemini-2.5-flash-lite
      - key: GENERATOR_AZURE_MODEL
        value: gpt-4o-mini
      - key: GENERATOR_AZURE_API_BASE
        value: https://poffices-ai.openai.azure.com/
      - key: GENERATOR_AZURE_API_VERSION
        value: 2025-04-01-preview
      - key: GENERATOR_AZURE_DEPLOYMENT_NAME
        value: gpt-4o-mini
      - key: GENERATOR_AZURE_API_KEY
        sync: false
      - key: GENERATOR_DASHSCOPE_MODEL
        value: glm-5
      - key: GENERATOR_DASHSCOPE_API_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
      - key: GENERATOR_DASHSCOPE_API_KEY
        sync: false
      - key: DASHSCOPE_MODEL
        value: glm-5
      - key: DASHSCOPE_API_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: GENERATOR_SENSENOVA_MODEL
        value: SenseNova-V6-5-Turbo
      - key: GENERATOR_SENSENOVA_API_URL
        value: https://api.sensenova.cn/v1/llm/chat-completions
      - key: GENERATOR_SENSENOVA_API_KEY
        sync: false
      - key: GENERATOR_DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: GENERATOR_DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: GENERATOR_DEEPSEEK_API_URL
        value: https://api.deepseek.com/chat/completions
      - key: GENERATOR_DEEPSEEK_ANTHROPIC_BASE_URL
        value: https://api.deepseek.com/anthropic
      - key: GENERATOR_DEEPSEEK_API_KEY
        sync: false
      - key: GENERATOR_DEEPSEEK_THINKING_ENABLED
        value: "false"
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_API_URL
        value: https://api.deepseek.com/chat/completions
      - key: DEEPSEEK_ANTHROPIC_BASE_URL
        value: https://api.deepseek.com/anthropic
      - key: DEEPSEEK_THINKING_ENABLED
        value: "false"
      - key: SENSENOVA_MODEL
        value: SenseNova-V6-5-Turbo
      - key: SENSENOVA_API_URL
        value: https://api.sensenova.cn/v1/llm/chat-completions
      - key: SENSENOVA_API_KEY
        sync: false
      - key: AZURE_OPENAI_API_BASE
        value: https://poffices-ai.openai.azure.com/
      - key: AZURE_OPENAI_API_VERSION
        value: 2025-04-01-preview
      - key: AZURE_OPENAI_DEPLOYMENT_NAME
        value: gpt-4o-mini
      - key: AZURE_OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENROUTER_HTTP_REFERER
        value: https://flowernet-web.onrender.com
      - key: OPENROUTER_APP_NAME
        value: FlowerNet
      - key: PROVIDER_RETRIES
        value: "1"
      - key: GENERATOR_PROVIDER_CHAIN
        value: "deepseek"
      - key: GENERATOR_FORCE_DEEPSEEK_ON_RENDER
        value: "true"
      - key: GENERATOR_PRELOAD_ON_STARTUP
        value: "true"
      - key: PROVIDER_BACKOFF
        value: "2.0"
      - key: PROVIDER_MAX_BACKOFF
        value: "45.0"
      - key: PROVIDER_FAILURE_THRESHOLD
        value: "3"
      - key: PROVIDER_COOLDOWN_SECONDS
        value: "30"
      - key: PROVIDER_HTTP_TIMEOUT
        value: "120"
      - key: DEEPSEEK_HTTP_TIMEOUT
        value: "120"
      - key: GENERATOR_SENSENOVA_CONNECT_TIMEOUT
        value: "15"
      - key: GENERATOR_SENSENOVA_READ_TIMEOUT
        value: "120"
      - key: GENERATOR_SENSENOVA_TRANSPORT_RETRIES
