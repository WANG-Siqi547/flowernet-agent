services:
  - type: web
    name: flowernet-generator
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: GENERATOR_PROVIDER
        value: azure,ollama
      - key: GENERATOR_MODEL
        value: gpt-4o-mini
      - key: GENERATOR_AZURE_MODEL
        value: gpt-4o-mini
      - key: GENERATOR_AZURE_API_BASE
        value: https://poffices-ai.openai.azure.com/
      - key: GENERATOR_AZURE_API_VERSION
        value: 2025-01-01-preview
      - key: GENERATOR_AZURE_DEPLOYMENT_NAME
        value: gpt-4o-mini
      - key: GENERATOR_AZURE_API_KEY
        sync: false
      - key: AZURE_OPENAI_API_BASE
        value: https://poffices-ai.openai.azure.com/
      - key: AZURE_OPENAI_API_VERSION
        value: 2025-01-01-preview
      - key: AZURE_OPENAI_DEPLOYMENT_NAME
        value: gpt-4o-mini
      - key: AZURE_OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENROUTER_HTTP_REFERER
        value: https://flowernet-web.onrender.com
      - key: OPENROUTER_APP_NAME
        value: FlowerNet
      - key: PROVIDER_RETRIES
        value: "6"
      - key: PROVIDER_BACKOFF
        value: "3.0"
      - key: PROVIDER_MAX_BACKOFF
        value: "180.0"
      - key: PROVIDER_JITTER
        value: "0.5"
      - key: PROVIDER_MIN_INTERVAL
        value: "2.0"
      - key: ORCH_GENERATOR_RETRIES
        value: "6"
      - key: ORCH_GENERATOR_BACKOFF
        value: "3.0"
      - key: ORCH_GENERATOR_MAX_BACKOFF
        value: "120.0"
      - key: SERIALIZE_DOCUMENT_TASKS
        value: "true"
      - key: SERIALIZE_DOCUMENT_WAIT_TIMEOUT
        value: "0"
      - key: DOC_RETRY_BASE_DELAY
        value: "2.0"
      - key: DOC_RETRY_MAX_DELAY
        value: "90.0"
      - key: DOC_RETRY_JITTER
        value: "0.5"
      - key: SUBSECTION_RETRY_FOREVER
        value: "false"
      - key: MAX_SUBSECTION_ATTEMPTS
        value: "8"
      - key: USE_DATABASE
        value: "true"
      - key: DATABASE_PATH
        value: /tmp/flowernet_history.db
      - key: GENERATOR_URL
        value: https://flowernet-generator.onrender.com
      - key: VERIFIER_URL
        value: https://flowernet-verifier.onrender.com
      - key: CONTROLLER_URL
        value: https://flowernet-controller.onrender.com
      - key: OUTLINER_URL
        value: https://flowernet-outliner.onrender.com
      - key: USE_REMOTE_HISTORY
        value: "true"
      - key: NO_PROXY
        value: "localhost,127.0.0.1"
    healthCheckPath: /health
