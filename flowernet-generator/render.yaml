services:
  - type: web
    name: flowernet-generator
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: GENERATOR_PROVIDER
        value: sensenova
      - key: GENERATOR_MODEL
        value: glm-5
      - key: GENERATOR_OPENROUTER_MODEL
        value: qwen/qwen3-coder:free
      - key: GENERATOR_GEMINI_MODEL
        value: models/gemini-2.5-flash-lite
      - key: GENERATOR_AZURE_MODEL
        value: gpt-4o-mini
      - key: GENERATOR_AZURE_API_BASE
        value: https://poffices-ai.openai.azure.com/
      - key: GENERATOR_AZURE_API_VERSION
        value: 2025-04-01-preview
      - key: GENERATOR_AZURE_DEPLOYMENT_NAME
        value: gpt-4o-mini
      - key: GENERATOR_AZURE_API_KEY
        sync: false
      - key: GENERATOR_DASHSCOPE_MODEL
        value: glm-5
      - key: GENERATOR_DASHSCOPE_API_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
      - key: GENERATOR_DASHSCOPE_API_KEY
        sync: false
      - key: DASHSCOPE_MODEL
        value: glm-5
      - key: DASHSCOPE_API_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: GENERATOR_SENSENOVA_MODEL
        value: SenseNova-V6-5-Turbo
      - key: GENERATOR_SENSENOVA_API_URL
        value: https://api.sensenova.cn/v1/llm/chat-completions
      - key: GENERATOR_SENSENOVA_API_KEY
        sync: false
      - key: SENSENOVA_MODEL
        value: SenseNova-V6-5-Turbo
      - key: SENSENOVA_API_URL
        value: https://api.sensenova.cn/v1/llm/chat-completions
      - key: SENSENOVA_API_KEY
        sync: false
      - key: AZURE_OPENAI_API_BASE
        value: https://poffices-ai.openai.azure.com/
      - key: AZURE_OPENAI_API_VERSION
        value: 2025-04-01-preview
      - key: AZURE_OPENAI_DEPLOYMENT_NAME
        value: gpt-4o-mini
      - key: AZURE_OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENROUTER_HTTP_REFERER
        value: https://flowernet-web.onrender.com
      - key: OPENROUTER_APP_NAME
        value: FlowerNet
      - key: PROVIDER_RETRIES
        value: "2"
      - key: GENERATOR_PROVIDER_CHAIN
        value: "sensenova"
      - key: PROVIDER_BACKOFF
        value: "1.2"
      - key: PROVIDER_MAX_BACKOFF
        value: "20.0"
      - key: PROVIDER_FAILURE_THRESHOLD
        value: "2"
      - key: PROVIDER_COOLDOWN_SECONDS
        value: "180"
      - key: PROVIDER_HTTP_TIMEOUT
        value: "45"
      - key: DASHSCOPE_HTTP_TIMEOUT
        value: "45"
      - key: PROMPT_OUTLINE_MAX_CHARS
        value: "4500"
      - key: PROMPT_ORIGINAL_MAX_CHARS
        value: "3500"
      - key: PROMPT_RAG_MAX_CHARS
        value: "2200"
      - key: PROMPT_HISTORY_MAX_CHARS
        value: "2600"
      - key: PROVIDER_JITTER
        value: "0.3"
      - key: PROVIDER_MIN_INTERVAL
        value: "0.8"
      - key: ORCH_GENERATOR_RETRIES
        value: "2"
      - key: ORCH_GENERATOR_BACKOFF
        value: "1.5"
      - key: ORCH_GENERATOR_MAX_BACKOFF
        value: "20.0"
      - key: SERIALIZE_DOCUMENT_TASKS
        value: "true"
      - key: SERIALIZE_DOCUMENT_WAIT_TIMEOUT
        value: "180"
      - key: DOC_RETRY_BASE_DELAY
        value: "2.0"
      - key: DOC_RETRY_MAX_DELAY
        value: "20.0"
      - key: DOC_RETRY_JITTER
        value: "0.5"
      - key: SUBSECTION_RETRY_FOREVER
        value: "false"
      - key: MAX_SUBSECTION_ATTEMPTS
        value: "12"
      - key: MAX_GENERATOR_FAILURES_PER_SUBSECTION
        value: "12"
      - key: MAX_CONTROLLER_RETRIES
        value: "8"
      - key: STRICT_CONTROLLER_EFFECTIVE
        value: "false"
      - key: USE_DATABASE
        value: "true"
      - key: DATABASE_PATH
        value: /tmp/flowernet_history.db
      - key: GENERATOR_URL
        value: https://flowernet-generator.onrender.com
      - key: VERIFIER_URL
        value: https://flowernet-verifier.onrender.com
      - key: CONTROLLER_URL
        value: https://flowernet-controller.onrender.com
      - key: OUTLINER_URL
        value: https://flowernet-outliner.onrender.com
      - key: USE_REMOTE_HISTORY
        value: "true"
      - key: NO_PROXY
        value: "localhost,127.0.0.1"
    healthCheckPath: /health
