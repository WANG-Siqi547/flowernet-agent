      - key: PROMPT_ORIGINAL_MAX_CHARS
        value: "3500"
      - key: PROMPT_RAG_MAX_CHARS
        value: "2200"
      - key: RAG_TIMEOUT
        value: "8"
      - key: RAG_SEARCH_MAX_SECONDS
        value: "12"
      - key: PROMPT_HISTORY_MAX_CHARS
        value: "2600"
      - key: PROVIDER_JITTER
        value: "0.3"
      - key: PROVIDER_MIN_INTERVAL
        value: "0.8"
      - key: ORCH_GENERATOR_RETRIES
        value: "2"
      - key: CONTROLLER_HTTP_TIMEOUT
        value: "120"
      - key: ORCH_GENERATOR_BACKOFF
        value: "1.5"
      - key: ORCH_GENERATOR_MAX_BACKOFF
        value: "20.0"
      - key: ORCH_GENERATOR_MAX_TOKENS
        value: "1800"
      - key: ORCH_COMPACT_GENERATION_ENABLED
        value: "false"
      - key: GENERATOR_COMPACT_FALLBACK_ENABLED
        value: "false"
      - key: ORCH_COMPACT_PROMPT_TRIGGER_CHARS
        value: "7000"
      - key: ORCH_COMPACT_MAX_TOKENS
        value: "1800"
      - key: ORCH_MIN_DRAFT_CHARS
        value: "800"
      - key: ORCH_TARGET_DRAFT_MIN_CHARS
        value: "850"
      - key: ORCH_TARGET_DRAFT_MAX_CHARS
        value: "1100"
      - key: ORCH_ENFORCE_TARGET_DRAFT_MAX
        value: "false"
      - key: RAG_FORCE_CITATION
        value: "true"
      - key: SERIALIZE_DOCUMENT_TASKS
        value: "true"
      - key: SERIALIZE_DOCUMENT_WAIT_TIMEOUT
        value: "1200"
      - key: DOCUMENT_TASK_HARD_TIMEOUT
        value: "2400"
      - key: DOCUMENT_TASK_STALE_SECONDS
        value: "3000"
      - key: DOC_RETRY_BASE_DELAY
        value: "2.0"
      - key: DOC_RETRY_MAX_DELAY
        value: "20.0"
      - key: DOC_RETRY_JITTER
        value: "0.5"
      - key: SUBSECTION_RETRY_FOREVER
        value: "false"
      - key: SUBSECTION_MAX_SECONDS
        value: "420"
      - key: MAX_SUBSECTION_ATTEMPTS
        value: "3"
      - key: MAX_SUBSECTION_ATTEMPTS_CAP
        value: "3"
      - key: MAX_PASS_REL_MARGIN
        value: "0.15"
      - key: MAX_PASS_RED_MARGIN
        value: "0.25"
      - key: MAX_GENERATOR_FAILURES_PER_SUBSECTION
        value: "2"
      - key: MAX_CONTROLLER_RETRIES
        value: "1"
      - key: MAX_CONTROLLER_RETRIES_CAP
        value: "1"
      - key: NEAR_PASS_QUALITY_MARGIN
        value: "0.08"
      - key: BEST_DRAFT_MAX_FAILED_DIMS
        value: "2"
      - key: STRICT_CONTROLLER_EFFECTIVE
        value: "false"
      - key: USE_DATABASE
        value: "true"
      - key: DATABASE_PATH
        value: /tmp/flowernet_history.db
      - key: GENERATOR_URL
        value: https://flowernet-generator.onrender.com
      - key: VERIFIER_URL
        value: https://flowernet-verifier.onrender.com
      - key: CONTROLLER_URL
        value: https://flowernet-controller.onrender.com
      - key: OUTLINER_URL
        value: https://flowernet-outliner.onrender.com
      - key: USE_REMOTE_HISTORY
        value: "true"
      - key: NO_PROXY
        value: "localhost,127.0.0.1"
    healthCheckPath: /health
