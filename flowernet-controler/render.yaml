services:
  - type: web
    name: flowernet-controller
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 8001
      - key: CONTROLLER_PUBLIC_URL
        value: https://flowernet-controller.onrender.com
      - key: VERIFIER_URL
        value: https://flowernet-verifier.onrender.com
      - key: USE_DATABASE
        value: "true"
      - key: DATABASE_PATH
        value: /tmp/flowernet_history.db
      - key: OUTLINER_URL
        value: https://flowernet-outliner.onrender.com
      - key: GENERATOR_URL
        value: https://flowernet-generator.onrender.com
      - key: CONTROLLER_USE_LLM_OUTLINE
        value: "false"
      - key: CONTROLLER_REQUIRE_LLM_SOURCE
        value: "false"
      - key: CONTROLLER_LLM_TIMEOUT
        value: "45"
      - key: CONTROLLER_LLM_RETRIES
        value: "1"
      - key: CONTROLLER_MIN_SCORE_GAIN
        value: "0.001"
      - key: CONTROLLER_MIN_REL_ANCHOR_GAIN
        value: "0.005"
      - key: CONTROLLER_MIN_NOVELTY_GAIN
        value: "0.005"
      - key: CONTROLLER_MIN_STRUCTURE_GAIN
        value: "0.05"
    healthCheckPath: /
