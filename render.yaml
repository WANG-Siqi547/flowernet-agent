# 🚀 FlowerNet 多服务部署 Blueprint
# 使用此文件可一次性部署所有服务到 Render.com
# 
# 使用方法:
# 1. 将此文件放在项目根目录
# 2. 推送到 GitHub
# 3. 在 Render Dashboard: New → Blueprint
# 4. 连接 GitHub 仓库
# 5. Render 自动检测并部署所有服务

services:
  # ==========================================
  # Service 1: Verifier (文本验证服务)
  # ==========================================
  - type: web
    name: flowernet-verifier
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./flowernet-verifier/Dockerfile
    dockerContext: ./flowernet-verifier
    envVars:
      - key: PORT
        value: 8000
      - key: VERIFIER_PUBLIC_URL
        value: https://flowernet-verifier.onrender.com
      - key: USE_DATABASE
        value: "true"
      - key: DATABASE_PATH
        value: flowernet_history.db
    healthCheckPath: /
    
  # ==========================================
  # Service 2: Controller (流程控制服务)
  # ==========================================
  - type: web
    name: flowernet-controller
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./flowernet-controler/Dockerfile
    dockerContext: ./flowernet-controler
    envVars:
      - key: CONTROLLER_PUBLIC_URL
        value: https://flowernet-controller.onrender.com
      - key: VERIFIER_URL
        value: https://flowernet-verifier.onrender.com
      - key: USE_DATABASE
        value: "true"
      - key: DATABASE_PATH
        value: flowernet_history.db
    healthCheckPath: /
    
  # ==========================================
  # Service 3: Outliner (大纲生成服务)
  # ==========================================
  - type: web
    name: flowernet-outliner
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./flowernet-outliner/Dockerfile
    dockerContext: ./flowernet-outliner
    envVars:
      - key: PORT
        value: 8003
      - key: OUTLINER_PROVIDER
        value: azure,openrouter,gemini
      - key: OUTLINER_MODEL
        value: gpt-4o-mini
      - key: OUTLINER_OPENROUTER_MODEL
        value: qwen/qwen3-coder:free
      - key: OUTLINER_GEMINI_MODEL
        value: models/gemini-2.5-flash-lite
      - key: OUTLINER_AZURE_MODEL
        value: gpt-4o-mini
      - key: OUTLINER_AZURE_API_BASE
        value: https://poffices-ai.openai.azure.com/
      - key: OUTLINER_AZURE_API_VERSION
        value: 2025-04-01-preview
      - key: OUTLINER_AZURE_DEPLOYMENT_NAME
        value: gpt-4o-mini
      - key: OUTLINER_AZURE_API_KEY
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_API_BASE
        value: https://poffices-ai.openai.azure.com/
      - key: AZURE_OPENAI_API_VERSION
        value: 2025-04-01-preview
      - key: AZURE_OPENAI_DEPLOYMENT_NAME
        value: gpt-4o-mini
      - key: AZURE_OPENAI_MODEL
        value: gpt-4o-mini
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_HTTP_REFERER
        value: https://flowernet-web.onrender.com
      - key: OPENROUTER_APP_NAME
        value: FlowerNet
      - key: PROVIDER_RETRIES
        value: "4"
      - key: PROVIDER_BACKOFF
        value: "2.0"
      - key: PROVIDER_MAX_BACKOFF
        value: "90.0"
      - key: PROVIDER_JITTER
        value: "0.4"
      - key: PROVIDER_MIN_INTERVAL
        value: "1.2"
      - key: USE_DATABASE
        value: "true"
      - key: DATABASE_PATH
        value: flowernet_history.db
    healthCheckPath: /
    
  # ==========================================
  # Service 4: Generator (文档生成服务)
  # ==========================================
  - type: web
    name: flowernet-generator
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./flowernet-generator/Dockerfile
    dockerContext: ./flowernet-generator
    envVars:
      - key: PORT
        value: 8002
      - key: GENERATOR_PROVIDER
        value: azure,openrouter,gemini
      - key: GENERATOR_MODEL
        value: gpt-4o-mini
      - key: GENERATOR_OPENROUTER_MODEL
        value: qwen/qwen3-coder:free
      - key: GENERATOR_GEMINI_MODEL
        value: models/gemini-2.5-flash-lite
      - key: GENERATOR_AZURE_MODEL
        value: gpt-4o-mini
      - key: GENERATOR_AZURE_API_BASE
        value: https://poffices-ai.openai.azure.com/
      - key: GENERATOR_AZURE_API_VERSION
        value: 2025-04-01-preview
      - key: GENERATOR_AZURE_DEPLOYMENT_NAME
        value: gpt-4o-mini
      - key: GENERATOR_AZURE_API_KEY
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_API_BASE
        value: https://poffices-ai.openai.azure.com/
      - key: AZURE_OPENAI_API_VERSION
        value: 2025-04-01-preview
      - key: AZURE_OPENAI_DEPLOYMENT_NAME
        value: gpt-4o-mini
      - key: AZURE_OPENAI_MODEL
        value: gpt-4o-mini
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_HTTP_REFERER
        value: https://flowernet-web.onrender.com
      - key: OPENROUTER_APP_NAME
        value: FlowerNet
      - key: PROVIDER_RETRIES
        value: "6"
      - key: PROVIDER_BACKOFF
        value: "3.0"
      - key: PROVIDER_MAX_BACKOFF
        value: "180.0"
      - key: PROVIDER_JITTER
        value: "0.5"
      - key: PROVIDER_MIN_INTERVAL
        value: "2.0"
      - key: ORCH_GENERATOR_RETRIES
        value: "6"
      - key: ORCH_GENERATOR_BACKOFF
        value: "3.0"
      - key: ORCH_GENERATOR_MAX_BACKOFF
        value: "120.0"
      - key: SERIALIZE_DOCUMENT_TASKS
        value: "true"
      - key: SERIALIZE_DOCUMENT_WAIT_TIMEOUT
        value: "0"
      - key: DOC_RETRY_BASE_DELAY
        value: "2.0"
      - key: DOC_RETRY_MAX_DELAY
        value: "90.0"
      - key: DOC_RETRY_JITTER
        value: "0.5"
      - key: SUBSECTION_RETRY_FOREVER
        value: "false"
      - key: MAX_SUBSECTION_ATTEMPTS
        value: "8"
      - key: USE_DATABASE
        value: "true"
      - key: DATABASE_PATH
        value: flowernet_history.db
      - key: VERIFIER_URL
        value: https://flowernet-verifier.onrender.com
      - key: CONTROLLER_URL
        value: https://flowernet-controller.onrender.com
      - key: OUTLINER_URL
        value: https://flowernet-outliner.onrender.com
      - key: NO_PROXY
        value: "localhost,127.0.0.1"
    healthCheckPath: /
    
  # ==========================================
  # Service 5: Web UI (前端用户界面)
  # ==========================================
  - type: web
    name: flowernet-web
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./flowernet-web/Dockerfile
    dockerContext: ./flowernet-web
    envVars:
      - key: PORT
        value: 10000
      - key: OUTLINER_URL
        value: https://flowernet-outliner.onrender.com
      - key: GENERATOR_URL
        value: https://flowernet-generator.onrender.com
      - key: PUBLIC_BASE_URL
        value: https://flowernet-web.onrender.com
      - key: REQUEST_TIMEOUT
        value: "3600"
      - key: DOWNSTREAM_BACKOFF
        value: "2.0"
      - key: DOWNSTREAM_MAX_BACKOFF
        value: "60.0"
      - key: DOWNSTREAM_JITTER
        value: "0.4"
      - key: DOWNSTREAM_RETRIES
        value: "5"
      - key: NO_PROXY
        value: "localhost,127.0.0.1"
    healthCheckPath: /health
    
