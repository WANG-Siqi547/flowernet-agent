# 🚀 FlowerNet 多服务部署 Blueprint
# 使用此文件可一次性部署所有服务到 Render.com
# 
# 使用方法:
# 1. 将此文件放在项目根目录
# 2. 推送到 GitHub
# 3. 在 Render Dashboard: New → Blueprint
# 4. 连接 GitHub 仓库
# 5. Render 自动检测并部署所有服务

services:
  # ==========================================
  # Service 1: Verifier (文本验证服务)
  # ==========================================
  - type: web
    name: flowernet-verifier
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./flowernet-verifier/Dockerfile
    dockerContext: ./flowernet-verifier
    envVars:
      - key: PORT
        value: 8000
      - key: VERIFIER_PUBLIC_URL
        value: https://flowernet-verifier.onrender.com
      - key: UNIEVAL_ENDPOINT
        value: https://flowernet-unieval.onrender.com/score
      - key: UNIEVAL_TIMEOUT
        value: "25"
      - key: UNIEVAL_STRICT_REQUIRED
        value: "false"
      - key: USE_DATABASE
        value: "true"
      - key: DATABASE_PATH
        value: flowernet_history.db
    healthCheckPath: /health/live

  # ==========================================
  # Service 1.5: UniEval (多维语义评估服务)
  # ==========================================
  - type: web
    name: flowernet-unieval
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./flowernet-unieval/Dockerfile
    dockerContext: ./flowernet-unieval
    envVars:
      - key: PORT
        value: 8004
      - key: UNIEVAL_MODEL_NAME
        value: cross-encoder/nli-MiniLM2-L6-H768
      - key: UNIEVAL_MODEL_REVISION
        value: b95119ce93d3e065de6214e38cd4a97b0f2f2c6d
      - key: UNIEVAL_CACHE_DIR
        value: /opt/render/project/hf-cache
      - key: UNIEVAL_LOAD_TIMEOUT_SEC
        value: "300"
      - key: UNIEVAL_MODEL_LOAD_RETRIES
        value: "1"
      - key: UNIEVAL_MAX_INPUT_CHARS
        value: "1800"
      - key: UNIEVAL_LIGHTWEIGHT_MODE
        value: "true"
      - key: UNIEVAL_BOOL_THRESHOLD
        value: "0.5"
    healthCheckPath: /health/live
    
  # ==========================================
  # Service 2: Controller (流程控制服务)
  # ==========================================
  - type: web
    name: flowernet-controller
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./flowernet-controler/Dockerfile
    dockerContext: ./flowernet-controler
    envVars:
      - key: CONTROLLER_PUBLIC_URL
        value: https://flowernet-controller.onrender.com
      - key: VERIFIER_URL
        value: https://flowernet-verifier.onrender.com
      - key: OUTLINER_URL
        value: https://flowernet-outliner.onrender.com
      - key: GENERATOR_URL
        value: https://flowernet-generator.onrender.com
      - key: CONTROLLER_USE_LLM_OUTLINE
        value: "true"
      - key: CONTROLLER_LLM_CALL_MODE
        value: "generator"
      - key: CONTROLLER_LLM_FALLBACK_TO_GENERATOR
        value: "true"
      - key: CONTROLLER_LLM_RETRIES
        value: "1"
      - key: CONTROLLER_LLM_TIMEOUT
        value: "45"
      - key: CONTROLLER_SENSENOVA_MODEL
        value: SenseNova-V6-5-Turbo
      - key: CONTROLLER_SENSENOVA_API_URL
        value: https://api.sensenova.cn/v1/llm/chat-completions
      - key: CONTROLLER_SENSENOVA_API_KEY
        sync: false
      - key: SENSENOVA_API_KEY
        sync: false
      - key: CONTROLLER_MIN_SCORE_GAIN
        value: "0.0"
      - key: CONTROLLER_MIN_REL_ANCHOR_GAIN
        value: "0.0"
      - key: CONTROLLER_MIN_NOVELTY_GAIN
        value: "0.0"
      - key: CONTROLLER_MIN_STRUCTURE_GAIN
        value: "0.0"
      - key: USE_DATABASE
        value: "true"
      - key: DATABASE_PATH
        value: flowernet_history.db
    healthCheckPath: /health/live
    
