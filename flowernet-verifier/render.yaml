services:
  - type: web
    name: flowernet-verifier
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 8000
      - key: VERIFIER_PUBLIC_URL
        value: https://flowernet-verifier.onrender.com
      - key: USE_DATABASE
        value: "true"
      - key: DATABASE_PATH
        value: /tmp/flowernet_history.db
      - key: UNIEVAL_STRICT_REQUIRED
        value: "false"
      - key: REFERENCE_DOMAIN_MISMATCH_THRESHOLD
        value: "0.08"
      - key: QUALITY_SCORE_THRESHOLD
        value: "0.60"
      - key: QUALITY_DIMENSION_THRESHOLDS_JSON
        value: '{"topic_alignment":0.53,"coverage_completeness":0.53,"logical_coherence":0.05,"evidence_grounding":0.33,"novelty":0.68,"structure_clarity":0.51}'
    healthCheckPath: /
