services:
  - type: web
    name: flowernet-outliner
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: OUTLINER_PROVIDER
        value: azure
      - key: OUTLINER_MODEL
        value: gpt-4o-mini
      - key: OUTLINER_OPENROUTER_MODEL
        value: qwen/qwen3-coder:free
      - key: OUTLINER_GEMINI_MODEL
        value: models/gemini-2.5-flash-lite
      - key: OUTLINER_AZURE_MODEL
        value: gpt-4o-mini
      - key: OUTLINER_AZURE_API_BASE
        value: https://poffices-ai.openai.azure.com/
      - key: OUTLINER_AZURE_API_VERSION
        value: 2025-04-01-preview
      - key: OUTLINER_AZURE_DEPLOYMENT_NAME
        value: gpt-4o-mini
      - key: OUTLINER_AZURE_API_KEY
        sync: false
      - key: AZURE_OPENAI_API_BASE
        value: https://poffices-ai.openai.azure.com/
      - key: AZURE_OPENAI_API_VERSION
        value: 2025-04-01-preview
      - key: AZURE_OPENAI_DEPLOYMENT_NAME
        value: gpt-4o-mini
      - key: AZURE_OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENROUTER_HTTP_REFERER
        value: https://flowernet-web.onrender.com
      - key: OPENROUTER_APP_NAME
        value: FlowerNet
      - key: PROVIDER_RETRIES
        value: "2"
      - key: PROVIDER_BACKOFF
        value: "1.2"
      - key: PROVIDER_MAX_BACKOFF
        value: "20.0"
      - key: PROVIDER_JITTER
        value: "0.3"
      - key: PROVIDER_MIN_INTERVAL
        value: "0.8"
      - key: OUTLINER_SERIALIZE_TASKS
        value: "true"
      - key: OUTLINER_TASK_WAIT_TIMEOUT
        value: "5"
      - key: OUTLINER_FLOW_RETRIES
        value: "6"
      - key: OUTLINER_FLOW_BACKOFF
        value: "5.0"
      - key: USE_DATABASE
        value: "true"
      - key: DATABASE_PATH
        value: /tmp/flowernet_history.db
      - key: OUTLINER_URL
        value: https://flowernet-outliner.onrender.com
    healthCheckPath: /
