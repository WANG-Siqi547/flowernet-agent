services:
  - type: web
    name: flowernet-outliner
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OUTLINER_PROVIDER
        value: gemini,openrouter
      - key: OUTLINER_MODEL
        value: models/gemini-2.5-flash-lite
      - key: OUTLINER_GEMINI_MODEL
        value: models/gemini-2.5-flash-lite
      - key: OUTLINER_OPENROUTER_MODEL
        value: qwen/qwen3-32b:free
      - key: OPENROUTER_HTTP_REFERER
        value: https://flowernet-web.onrender.com
      - key: OPENROUTER_APP_NAME
        value: FlowerNet
      - key: PROVIDER_RETRIES
        value: "4"
      - key: PROVIDER_BACKOFF
        value: "2.0"
      - key: PROVIDER_MAX_BACKOFF
        value: "90.0"
      - key: PROVIDER_JITTER
        value: "0.4"
      - key: PROVIDER_MIN_INTERVAL
        value: "1.2"
      - key: USE_DATABASE
        value: "true"
      - key: DATABASE_PATH
        value: /tmp/flowernet_history.db
      - key: OUTLINER_URL
        value: https://flowernet-outliner.onrender.com
    healthCheckPath: /
