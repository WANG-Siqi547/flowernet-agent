services:
  - type: web
    name: flowernet-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OUTLINER_URL
        value: https://flowernet-outliner.onrender.com
      - key: GENERATOR_URL
        value: https://flowernet-generator.onrender.com
      - key: GENERATOR_PREFLIGHT_PROVIDERS
        value: deepseek
      - key: PUBLIC_BASE_URL
        value: https://flowernet-web.onrender.com
      - key: FLOWERNET_STATE_DIR
        value: /tmp/flowernet_state
      - key: REQUEST_TIMEOUT
        value: "7200"
      - key: GENERATOR_TASK_POLL_MAX_TIMEOUT
        value: "2400"
      - key: MIN_REFERENCES_PER_SUBSECTION
        value: "3"
      - key: GENERATOR_DOWNSTREAM_MIN_TIMEOUT
        value: "900"
      - key: DOWNSTREAM_RETRIES
        value: "1"
      - key: DOWNSTREAM_BACKOFF
        value: "4.0"
      - key: DOWNSTREAM_MAX_BACKOFF
        value: "180.0"
      - key: DOWNSTREAM_JITTER
        value: "0.4"
      - key: DOWNSTREAM_OUTLINER_MIN_RETRIES
        value: "1"
      - key: DOWNSTREAM_OUTLINER_MIN_DELAY_429
        value: "35.0"
      - key: DOWNSTREAM_OUTLINER_COOLDOWN_429
        value: "60.0"
      - key: OUTLINER_TASK_START_RETRIES
        value: "2"
      - key: OUTLINER_TASK_START_BACKOFF
        value: "10.0"
      - key: OUTLINER_TASK_START_MAX_WAIT
        value: "120"
      - key: OUTLINER_TASK_POLL_MAX_TIMEOUT
        value: "1200"
      - key: WEB_INPROCESS_OUTLINER_FALLBACK
        value: "false"
      - key: WEB_OUTLINER_PROVIDER_CHAIN
        value: deepseek
      - key: POFFICES_POLL_WAIT_SECONDS
        value: "25"
      - key: POFFICES_POLL_INTERVAL_SECONDS
        value: "2.0"
      - key: DOWNSTREAM_GENERATOR_COOLDOWN_429
        value: "20.0"
      - key: DOWNSTREAM_OUTLINER_MIN_DELAY_503
        value: "8.0"
      - key: OUTLINER_STREAM_MAX_WAIT
        value: "1800"
      - key: WEB_DEFAULT_REL_THRESHOLD
        value: "0.77"
      - key: WEB_DEFAULT_RED_THRESHOLD
        value: "0.52"
      - key: NO_PROXY
        value: "localhost,127.0.0.1"
    healthCheckPath: /health
