services:
  - type: web
    name: flowernet-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OUTLINER_URL
        value: https://flowernet-outliner.onrender.com
      - key: GENERATOR_URL
        value: https://flowernet-generator.onrender.com
      - key: PUBLIC_BASE_URL
        value: https://flowernet-web.onrender.com
      - key: REQUEST_TIMEOUT
        value: "3600"
      - key: DOWNSTREAM_RETRIES
        value: "8"
      - key: DOWNSTREAM_BACKOFF
        value: "3.0"
      - key: DOWNSTREAM_MAX_BACKOFF
        value: "120.0"
      - key: DOWNSTREAM_JITTER
        value: "0.6"
      - key: NO_PROXY
        value: "localhost,127.0.0.1"
    healthCheckPath: /health
