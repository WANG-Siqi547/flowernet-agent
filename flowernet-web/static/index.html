    function App() {
      const banditSeriesKeys = ["llm", "rule", "rule_structured", "defect_topic", "defect_evidence", "defect_structure"];
      const createEmptyBanditSeries = () => ({
        llm: [],
        rule: [],
        rule_structured: [],
        defect_topic: [],
        defect_evidence: [],
        defect_structure: [],
      });
      const appendBanditPoint = (series, arm, reward) => {
        const next = createEmptyBanditSeries();
        for (const k of banditSeriesKeys) {
          next[k] = [...(series?.[k] || [])];
          next[k].push(k === arm ? reward : null);
          next[k] = next[k].slice(-24);
        }
        return next;
      };
      const buildBanditSeriesFromEvents = (events) => {
        const items = Array.isArray(events) ? events : [];
        return items.slice(-80).reduce((series, item) => {
          const arm = String(item?.arm || item?.selected_arm || item?.chosen_arm || "");
          if (!banditSeriesKeys.includes(arm)) {
            return series;
          }
          const rawReward = Number(item?.reward ?? 0);
          const reward = Math.max(0, Math.min(1, Number.isFinite(rawReward) ? rawReward : 0));
          return appendBanditPoint(series, arm, reward);
        }, createEmptyBanditSeries());
      };
      const summarizeBanditEvents = (events, fallback = {}) => {
        const items = (Array.isArray(events) ? events : [])
          .map((item) => {
            const arm = String(item?.arm || item?.selected_arm || item?.chosen_arm || "").trim();
            const rawReward = Number(item?.reward ?? 0);
            return {
              arm,
              reward: Math.max(0, Math.min(1, Number.isFinite(rawReward) ? rawReward : 0)),
              selection_mode: String(item?.selection_mode || item?.mode || ""),
            };
          })
          .filter((item) => banditSeriesKeys.includes(item.arm));
        if (!items.length) return fallback || {};

        const counts = Object.fromEntries(banditSeriesKeys.map((key) => [key, 0]));
        let rewardSum = 0;
        let rewardCount = 0;
        let lastMode = "";
        const rewards = [];
        items.forEach((item) => {
          counts[item.arm] += 1;
          rewardSum += item.reward;
          rewardCount += 1;
          rewards.push(item.reward);
          if (item.selection_mode) lastMode = item.selection_mode;
        });
        const rmin = Math.min(...rewards);
        const rmax = Math.max(...rewards);
        const pad = Math.max(0.01, Math.abs(rmax - rmin) * 0.12, Math.abs(rmax) * 0.05);
        const last = items[items.length - 1];
        return {
          ...(fallback || {}),
          bandit_selected_arm_counts: counts,
          bandit_reward_avg: rewardCount > 0 ? rewardSum / rewardCount : Number(fallback?.bandit_reward_avg || 0),
          bandit_last_selected_arm: last?.arm || String(fallback?.bandit_last_selected_arm || ""),
          bandit_last_selection_mode: lastMode || String(fallback?.bandit_last_selection_mode || ""),
          bandit_event_count: rewardCount,
          bandit_plot_y_min: Math.max(0, rmin - pad),
          bandit_plot_y_max: Math.min(1, rmax + pad),
        };
      };
      const [topic, setTopic] = useState("");
      const [background, setBackground] = useState("");
      const [extra, setExtra] = useState("");
      const [uploadedContext, setUploadedContext] = useState("");
      const [uploadedFiles, setUploadedFiles] = useState([]);
      const [uploadingFiles, setUploadingFiles] = useState(false);
      const [uploadStatus, setUploadStatus] = useState("");
      const [chapterCount, setChapterCount] = useState(2);
      const [subCount, setSubCount] = useState(2);
      const [running, setRunning] = useState(false);
      const [statusText, setStatusText] = useState("Ready");
      const [activeNode, setActiveNode] = useState("outliner");
      const [progress, setProgress] = useState({ current: 0, total: 0, percent: 0 });
      const completedSubsectionsRef = useRef(new Set()); // 追踪真正完成的小节（passed/generated 事件）
      const completedSubsectionIdentitiesRef = useRef(new Set());
      const processedSubsectionsRef = useRef(new Set()); // 追踪已进入 verifier 或已结束的小节，用于更贴近实时进度
      const [doc, setDoc] = useState({ title: "", content: "" });
      const [generationStartTime, setGenerationStartTime] = useState(null);
      const [generationElapsedSec, setGenerationElapsedSec] = useState(0);
      const progressRef = useRef({ current: 0, total: 0, percent: 0 });
      const runningRef = useRef(false);
      const [totalGenerations, setTotalGenerations] = useState(() => {
        const saved = Number(localStorage.getItem("flowernet_total_generations") || "132");
        return Number.isFinite(saved) ? saved : 132;
      });
      const [subsections, setSubsections] = useState([]);
      const [metrics, setMetrics] = useState({
        topic_alignment: 0,
        coverage_completeness: 0,
        logical_coherence: 0,
        evidence_grounding: 0,
        novelty: 0,
        structure_clarity: 0,
        quality_score: 0
      });
      const [qualityPeak, setQualityPeak] = useState(0);
      const [verifierDetail, setVerifierDetail] = useState(() => createEmptyVerifierDetail());
      const [qualitySummary, setQualitySummary] = useState({
        quality_score_avg: 0,
        quality_score_count: 0,
        unieval_available_subsections: 0,
        unieval_fallback_subsections: 0,
      });
      const [banditSeries, setBanditSeries] = useState(() => createEmptyBanditSeries());
      const [banditSummary, setBanditSummary] = useState({
        bandit_selected_arm_counts: {},
        bandit_reward_avg: 0,
        bandit_last_selected_arm: "",
        bandit_last_selection_mode: "",
        bandit_event_count: 0,
        bandit_plot_y_min: 0.0,
        bandit_plot_y_max: 0.1,
      });
      const [metricsCatalogSummary, setMetricsCatalogSummary] = useState(null);
      const [metricsCatalogAll, setMetricsCatalogAll] = useState({});
      const [metricsCatalogLoading, setMetricsCatalogLoading] = useState(true);
      const [metricsCatalogError, setMetricsCatalogError] = useState("");
      const sseRef = useRef(null);
      const streamEndedRef = useRef(false);
      const documentIdRef = useRef("");
      const docRef = useRef({ title: "", content: "" });
      const banditEventsRef = useRef([]);
      const finalRecoveryStartedRef = useRef(false);
      const outlineReadyRef = useRef(false);

      useEffect(() => {
        localStorage.setItem("flowernet_total_generations", String(totalGenerations));
      }, [totalGenerations]);

      useEffect(() => {
        let cancelled = false;
        const loadWebStats = async () => {
          try {
            const resp = await fetch("/api/stats", { cache: "no-store" });
            if (!resp.ok) return;
            const stats = await resp.json();
            const total = Number(stats?.total_generations);
            if (!cancelled && Number.isFinite(total) && total > 0) {
              setTotalGenerations(total);
            }
          } catch {
            // Keep the cached local value if the server-side counter is unavailable.
          }
        };
        loadWebStats();
        return () => {
          cancelled = true;
        };
      }, []);

      useEffect(() => {
        const timer = setInterval(() => {
          if (generationStartTime && running) {
            setGenerationElapsedSec(Math.floor((Date.now() - generationStartTime) / 1000));
          }
        }, 1000);
        return () => clearInterval(timer);
      }, [generationStartTime, running]);

      useEffect(() => {
        progressRef.current = progress;
      }, [progress]);

      useEffect(() => {
        runningRef.current = running;
      }, [running]);

      useEffect(() => {
        docRef.current = doc;
      }, [doc]);

      useEffect(() => {
        let cancelled = false;
        const loadMetricsCatalog = async () => {
          setMetricsCatalogLoading(true);
          setMetricsCatalogError("");
          try {
            const [summaryResp, allResp] = await Promise.all([
              fetch("/api/metrics/dashboard-summary"),
              fetch("/api/metrics/all"),
            ]);
            if (!summaryResp.ok || !allResp.ok) {
              throw new Error(`HTTP ${summaryResp.status}/${allResp.status}`);
            }
            const summaryJson = await summaryResp.json();
            const allJson = await allResp.json();
            if (!cancelled) {
              setMetricsCatalogSummary(summaryJson?.summary || null);
              setMetricsCatalogAll(allJson?.metrics || {});
            }
          } catch (err) {
            if (!cancelled) {
              setMetricsCatalogError(String(err?.message || err || "unknown error"));
            }
          } finally {
            if (!cancelled) {
              setMetricsCatalogLoading(false);
            }
          }
        };
        loadMetricsCatalog();
        return () => {
          cancelled = true;
        };
      }, []);

      const generationTimeText = useMemo(() => {
        const h = Math.floor(generationElapsedSec / 3600);
        const m = Math.floor((generationElapsedSec % 3600) / 60);
        const s = generationElapsedSec % 60;
        return `${h}h ${m}m ${s}s`;
      }, [generationElapsedSec]);

      const badges = ["Deployed on Render", "UniEval Connected", "Adaptive Timeout Active"];

      const closeSse = () => {
        if (sseRef.current) {
          sseRef.current.close();
          sseRef.current = null;
        }
      };

      const parseStage = (stage) => {
        const text = String(stage || "");
        if (!text) return null;
        if (text.includes("outline")) return "outliner";
        if (
          text.includes("generator") ||
          text.includes("subsection_start") ||
          text.includes("rag_") ||
          text.includes("search")
        ) return "generator";
        if (
          text.includes("verifier") ||
          text.includes("subsection_passed") ||
          text.includes("subsection_best_real_draft_accepted") ||
          text.includes("subsection_forced_pass")
        ) return "verifier";
        if (
          text.includes("controller") ||
          text.includes("chapter_asset") ||
          text.includes("document_complete") ||
          text.includes("final") ||
          text.includes("assembly")
        ) return "controller";
        return null;
      };

      const stageToLabel = (stage) => {
        if (stage === "subsection_start" || stage === "generator_start") return "Drafting";
        if (stage === "verifier_start") return "Evaluating via UniEval";
        if (stage === "verifier_failed" || stage === "controller_start") return "Repairing";
        if (stage === "subsection_passed" || stage === "verifier_passed" || stage === "subsection_best_real_draft_accepted") return "Passed";
        if (stage === "subsection_forced_pass" || stage === "verifier_forced_pass") return "Passed";
        if (stage === "subsection_failed") return "Failed";
        return "Waiting";
      };

      const getSubsectionKey = (meta = {}) => {
        const sid = meta.section_id || meta.section_index || meta.section_title || "Section";
        const subid = meta.subsection_id || meta.subsection_index || meta.subsection_title || "Subsection";
        return `${sid}:${subid}`;
      };

      const normalizeSubsectionName = (name = "") => String(name || "").trim().toLowerCase();

      const dedupeSubsectionItems = (items = [], expected = 0) => {
        const rank = { "Passed": 5, "Failed": 4, "Repairing": 3, "Evaluating via UniEval": 2, "Drafting": 1, "Waiting": 0 };
        const byIdentity = new Map();
        items.forEach((item) => {
          if (!item) return;
          const identity = normalizeSubsectionName(item.name) || String(item.key || "");
          if (!identity) return;
          const current = byIdentity.get(identity);
          if (!current || (rank[item.stage] || 0) >= (rank[current.stage] || 0)) {
            byIdentity.set(identity, item);
          }
        });
        const next = Array.from(byIdentity.values());
        const total = Number(expected || 0);
        for (let i = next.length; i < total; i += 1) {
          next.push({ key: `final-${i}`, name: `Section / Subsection ${i + 1}`, stage: "Passed", progress: 100 });
        }
        return total > 0 ? next.slice(0, total) : next;
      };

      const completeFromRecoveredDocument = (recovered, message = "Generation completed.") => {
        if (!recovered || !recovered.success) return false;
        if (!String(recovered.content || "").trim()) return false;
        const stats = recovered.stats || {};
        const expected = Math.max(1, Number(stats.expected_subsections || progressRef.current.total || 0));
        const passed = Math.min(expected, Number(stats.passed_subsections || stats.total_generated || expected || 0));
        const dims = stats.quality_dimension_avgs || {};
        const qualityKeys = ["topic_alignment", "coverage_completeness", "logical_coherence", "evidence_grounding", "novelty", "structure_clarity"];
        const dimValues = qualityKeys.map((key) => Number(dims[key] || 0));
        const dimMean = dimValues.reduce((acc, n) => acc + n, 0) / Math.max(1, dimValues.length);
        setMetrics({
          topic_alignment: Number(dims.topic_alignment || 0),
          coverage_completeness: Number(dims.coverage_completeness || 0),
          logical_coherence: Number(dims.logical_coherence || 0),
          evidence_grounding: Number(dims.evidence_grounding || 0),
          novelty: Number(dims.novelty || 0),
          structure_clarity: Number(dims.structure_clarity || 0),
          quality_score: Number(stats.quality_score_avg || dimMean || 0),
        });
        setQualitySummary({
          quality_score_avg: Number(stats.quality_score_avg || dimMean || 0),
          quality_score_count: Number(stats.quality_score_count || 0),
          unieval_available_subsections: Number(stats.unieval_available_subsections || 0),
          unieval_fallback_subsections: Number(stats.unieval_fallback_subsections || 0),
        });
        setQualityPeak((prev) => Math.max(Number(prev || 0), Number(stats.quality_score_avg || dimMean || 0)));
        const recoveredBanditEvents = Array.isArray(stats.bandit_recent_events) ? stats.bandit_recent_events : [];
        if (recoveredBanditEvents.length) {
          banditEventsRef.current = recoveredBanditEvents.slice(-200);
          setBanditSeries(buildBanditSeriesFromEvents(recoveredBanditEvents));
        }
        setBanditSummary((prev) => {
          const counts = stats.bandit_selected_arm_counts && Object.keys(stats.bandit_selected_arm_counts).length
            ? stats.bandit_selected_arm_counts
            : (prev.bandit_selected_arm_counts || {});
          const merged = {
            ...prev,
            bandit_selected_arm_counts: counts,
            bandit_reward_avg: Number(stats.bandit_reward_avg || prev.bandit_reward_avg || 0),
            bandit_last_selected_arm: String(stats.bandit_last_selected_arm || prev.bandit_last_selected_arm || ""),
            bandit_last_selection_mode: String(stats.bandit_last_selection_mode || prev.bandit_last_selection_mode || ""),
            bandit_event_count: Object.values(counts || {}).reduce((acc, n) => acc + Number(n || 0), 0) || Number(prev.bandit_event_count || 0),
            bandit_plot_y_min: Number(stats.bandit_plot_y_min ?? prev.bandit_plot_y_min ?? 0.0),
            bandit_plot_y_max: Number(stats.bandit_plot_y_max ?? prev.bandit_plot_y_max ?? 0.1),
          };
          return recoveredBanditEvents.length ? summarizeBanditEvents(recoveredBanditEvents, merged) : merged;
        });
        setDoc({ title: recovered.title || "", content: recovered.content || "" });
        setProgress({
          current: passed,
          total: expected,
          percent: expected > 0 ? Math.min(100, Math.round((passed / expected) * 100)) : 100,
        });
        setSubsections((prev) => {
          const completed = prev.map((item) => ({
            ...item,
            stage: "Passed",
            progress: 100,
            passReason: item.passReason || "Recovered final document content confirms this subsection was accepted by the completed document assembly.",
          }));
          return dedupeSubsectionItems(completed, expected);
        });
        setActiveNode("controller");
        setStatusText(message);
        setRunning(false);
        runningRef.current = false;
        streamEndedRef.current = true;
        finalRecoveryStartedRef.current = false;
        closeSse();
        return true;
      };

      const startFinalRecoveryPolling = (reason = "final progress") => {
        const docId = documentIdRef.current;
        if (!docId || finalRecoveryStartedRef.current || streamEndedRef.current || docRef.current.content) return;
        finalRecoveryStartedRef.current = true;
        setStatusText("All subsections passed. Finalizing chapter assets and assembling document...");
        const startedAt = Date.now();
        const deadline = startedAt + (30 * 60 * 1000);

        const poll = async () => {
          if (!runningRef.current || streamEndedRef.current || docRef.current.content) {
            finalRecoveryStartedRef.current = false;
            return;
          }
          if (Date.now() > deadline) {
            finalRecoveryStartedRef.current = false;
            setStatusText(`Final document recovery is still pending after ${reason}. Waiting for the live stream...`);
            return;
          }
          try {
            const resp = await fetch(`/api/recover-document?document_id=${encodeURIComponent(docId)}`, { cache: "no-store" });
            if (resp.ok) {
              const recovered = await resp.json();
              if (completeFromRecoveredDocument(recovered, "Generation completed after final document recovery.")) {
                return;
              }
            }
          } catch {
            // Keep polling; the generator may still be assembling the final document.
          }
          window.setTimeout(poll, 5000);
        };

        window.setTimeout(poll, 1500);
      };

      const handleFileUpload = async (evt) => {
        const files = Array.from(evt.target.files || []);
        if (!files.length) return;
        setUploadingFiles(true);
        setUploadStatus(`Parsing ${files.length} file${files.length > 1 ? "s" : ""}...`);
        try {
          const form = new FormData();
          files.forEach((file) => {
            form.append("files", file, file.name);
            form.append("paths", file.webkitRelativePath || file.name);
          });
          const resp = await fetch("/api/upload-context", { method: "POST", body: form });
          const data = await resp.json().catch(() => ({}));
          if (!resp.ok || !data.success) {
            throw new Error(data.detail || data.error || `Upload failed: HTTP ${resp.status}`);
          }
          setUploadedContext(String(data.context_text || ""));
          setUploadedFiles(Array.isArray(data.files) ? data.files : []);
          setUploadStatus(`Parsed ${data.file_count || files.length} file(s), ${data.context_chars || 0} context chars.`);
        } catch (err) {
          setUploadedContext("");
          setUploadedFiles([]);
          setUploadStatus(String(err?.message || err || "Upload parsing failed."));
        } finally {
          setUploadingFiles(false);
          evt.target.value = "";
        }
      };

      const clearUploadedContext = () => {
        setUploadedContext("");
        setUploadedFiles([]);
        setUploadStatus("");
      };

      const handleStart = () => {
        if (!topic.trim()) {
          setStatusText("Please enter a topic first.");
          return;
        }
        if (uploadingFiles) {
          setStatusText("Please wait until uploaded files are parsed.");
          return;
        }
        closeSse();
        streamEndedRef.current = false;
        documentIdRef.current = "";
        finalRecoveryStartedRef.current = false;
        outlineReadyRef.current = false;
        setRunning(true);
        runningRef.current = true;
        setGenerationStartTime(Date.now());
        setGenerationElapsedSec(0);
        setStatusText("Starting generation flow...");
        setActiveNode("outliner");
        completedSubsectionsRef.current = new Set();
        completedSubsectionIdentitiesRef.current = new Set();
        processedSubsectionsRef.current = new Set();
        const total = Math.max(1, Number(chapterCount) * Number(subCount));
        setProgress({ current: 0, total, percent: 0 });
        setSubsections([]);
        setDoc({ title: "", content: "" });
        setMetrics({ topic_alignment: 0, coverage_completeness: 0, logical_coherence: 0, evidence_grounding: 0, novelty: 0, structure_clarity: 0, quality_score: 0 });
        setQualityPeak(0);
        setVerifierDetail(createEmptyVerifierDetail());
        setQualitySummary({ quality_score_avg: 0, quality_score_count: 0, unieval_available_subsections: 0, unieval_fallback_subsections: 0 });
        setBanditSeries(createEmptyBanditSeries());
        setBanditSummary({ bandit_selected_arm_counts: {}, bandit_reward_avg: 0, bandit_last_selected_arm: "", bandit_last_selection_mode: "", bandit_event_count: 0 });
        banditEventsRef.current = [];
        const combinedExtra = [
          extra.trim(),
          uploadedContext ? `上传文件上下文：\n${uploadedContext}` : ""
        ].filter(Boolean).join("\n\n");

        const params = new URLSearchParams({
          topic,
          chapter_count: String(chapterCount),
          subsection_count: String(subCount),
          user_background: background,
          extra_requirements: combinedExtra
        });

        const source = new EventSource(`/api/generate-stream?${params.toString()}`);
        sseRef.current = source;

        source.addEventListener("message", (evt) => {
          let data;
          try {
            data = JSON.parse(evt.data);
          } catch {
            return;
          }

          if (data.type === "detail") {
            const stage = data.stage || "";
            const meta = data.metadata || {};
            if (stage === "outline_document_ready" && meta.document_id) {
              documentIdRef.current = String(meta.document_id);
              outlineReadyRef.current = true;
            }
            const parsedNode = parseStage(stage);
            if (parsedNode) setActiveNode(parsedNode);
            const section = meta.section_title || meta.section_id || "Section";
            const sub = meta.subsection_title || meta.subsection_id || "Subsection";
            const key = getSubsectionKey(meta);
            const acceptedByBestDraft = Boolean(
              meta.best_effort ||
              meta.accepted_by_best_real_draft ||
              meta.verification?.accepted_by_best_real_draft ||
              meta.verification?.best_effort ||
              meta.verification?.forced_pass
            );
            const stageLabel = (stage === "subsection_failed" && acceptedByBestDraft) ? "Passed" : stageToLabel(stage);
            const selectedArm = String(meta.selected_arm || meta.chosen_arm || meta.controller_arm || meta.bandit?.selected_arm || meta.bandit?.chosen_arm || "");
            const attempts = Number(meta.attempt || meta.attempts || meta.attempts_used || meta.retry_count || meta.verification?.attempts || 0);
            const maxAttempts = Number(meta.max_attempts || meta.max_attempts_reached || meta.retry_budget || meta.verification?.max_attempts || 0);
            const failedDimensions = Array.isArray(meta.quality_dimensions_failed)
              ? meta.quality_dimensions_failed
              : (Array.isArray(meta.verification?.quality_dimensions_failed) ? meta.verification.quality_dimensions_failed : []);
            const sourceRefs = Number(meta.source_reference_count || meta.source_check?.reference_count || meta.verification?.source_reference_count || 0);
            const acceptanceReason = compactReason(
              meta.pass_reason || meta.acceptance_reason || meta.final_acceptance_reason || meta.verification?.acceptance_reason,
              stageLabel === "Passed"
                ? (acceptedByBestDraft
                  ? `Accepted as best real draft${maxAttempts ? ` after ${maxAttempts} attempts` : " after retry budget was exhausted"}; no template fallback was used.`
                  : (selectedArm
                    ? `Passed after Controller selected ${ARM_LABELS[selectedArm] || selectedArm}.`
                    : (stage === "verifier_passed" || stage === "subsection_passed" ? "All active verifier gates accepted this subsection." : "")))
                : ""
            );

            if (meta.subsection_id || meta.subsection_title) {
              setSubsections((prev) => {
                const next = [...prev];
                const name = `${section} / ${sub}`;
                const idx = next.findIndex((x) => x.key === key || normalizeSubsectionName(x.name) === normalizeSubsectionName(name));
                const stepMap = { "Drafting": 34, "Evaluating via UniEval": 62, "Repairing": 81, "Passed": 100, "Failed": 100, "Waiting": 0 };
                const terminal = new Set(["Passed", "Failed"]);
                if (idx === -1) {
                  next.push({
                    key,
                    name,
                    stage: stageLabel,
                    progress: stepMap[stageLabel] || 0,
                    passReason: acceptanceReason,
                    acceptedByBestDraft,
                    selectedArm,
                    attempts,
                    maxAttempts,
                    failedDimensions,
                    sourceRefs,
                  });
                } else {
                  const existing = next[idx];
                  const nextStage = terminal.has(existing.stage) && !terminal.has(stageLabel) ? existing.stage : stageLabel;
                  next[idx] = {
                    ...existing,
                    key,
                    name: existing.name || name,
                    stage: nextStage,
                    progress: Math.max(existing.progress, stepMap[nextStage] || 0),
                    passReason: acceptanceReason || existing.passReason,
                    acceptedByBestDraft: acceptedByBestDraft || existing.acceptedByBestDraft,
                    selectedArm: selectedArm || existing.selectedArm,
                    attempts: Math.max(Number(existing.attempts || 0), attempts || 0),
                    maxAttempts: Math.max(Number(existing.maxAttempts || 0), maxAttempts || 0),
                    failedDimensions: failedDimensions.length ? failedDimensions : existing.failedDimensions,
                    sourceRefs: sourceRefs || existing.sourceRefs,
                  };
                }
                return dedupeSubsectionItems(next);
              });
            }

            if (stage === "verifier_result") {
              const q = meta.quality_dimensions || {};
              const currentQuality = (
                Number(q.topic_alignment ?? 0) +
                Number(q.coverage_completeness ?? 0) +
                Number(q.logical_coherence ?? 0) +
                Number(q.evidence_grounding ?? 0) +
                Number(q.novelty ?? 0) +
                Number(q.structure_clarity ?? 0)
              ) / 6;
              setQualityPeak((prev) => Math.max(Number(prev || 0), currentQuality, Number(meta.quality_score ?? 0)));
              setMetrics({
                topic_alignment: Number(q.topic_alignment ?? 0),
                coverage_completeness: Number(q.coverage_completeness ?? 0),
                logical_coherence: Number(q.logical_coherence ?? 0),
                evidence_grounding: Number(q.evidence_grounding ?? 0),
                novelty: Number(q.novelty ?? 0),
                structure_clarity: Number(q.structure_clarity ?? 0),
                quality_score: Number(meta.quality_score ?? 0),
              });
              setVerifierDetail({
                is_passed: Boolean(meta.is_passed),
                relevancy_index: Number(meta.relevancy_index ?? 0),
                redundancy_index: Number(meta.redundancy_index ?? 0),
                rel_threshold: Number(meta.rel_threshold ?? 0),
                red_threshold: Number(meta.red_threshold ?? 0),
                quality_score: Number(meta.quality_score ?? 0),
                quality_score_threshold: Number(meta.quality_score_threshold ?? 0),
                quality_score_passed: Boolean(meta.quality_score_passed),
                quality_dimensions: q,
                quality_dimensions_check: meta.quality_dimensions_check || {},
                quality_dimensions_failed: meta.quality_dimensions_failed || [],
                quality_dimensions_passed: Boolean(meta.quality_dimensions_passed),
                dimension_thresholds: meta.dimension_thresholds || {},
                source_check: meta.source_check || { passed: Boolean(meta.source_check_passed), reference_count: Number(meta.source_reference_count || 0) },
                source_check_passed: Boolean(meta.source_check_passed),
                source_reference_count: Number(meta.source_reference_count ?? 0),
                acceptance_reason: compactReason(meta.acceptance_reason || meta.pass_reason || meta.final_acceptance_reason),
                selected_arm: selectedArm,
                attempts,
                max_attempts: maxAttempts,
                accepted_by_best_real_draft: acceptedByBestDraft,
              });
            }

            if (stage === "controller_result") {
              const nestedBandit = meta.bandit && typeof meta.bandit === "object" ? meta.bandit : {};
              const arm = String(meta.selected_arm || meta.chosen_arm || nestedBandit.selected_arm || nestedBandit.chosen_arm || "");
              const rawReward = Number(meta.reward ?? nestedBandit.reward ?? 0);
              const reward = Math.max(0, Math.min(1, Number.isFinite(rawReward) ? rawReward : 0));
              const selectionMode = String(meta.selection_mode || nestedBandit.selection_mode || nestedBandit.selection?.mode || "");
              console.log(`🎯 [Frontend Handler] controller_result: arm="${arm}", reward=${reward}, mode="${selectionMode}", meta=`, meta);
              setBanditSummary((prev) => ({
                ...prev,
                bandit_last_selected_arm: arm || prev.bandit_last_selected_arm,
                bandit_last_selection_mode: selectionMode || prev.bandit_last_selection_mode,
                bandit_selected_arm_counts: {
                  ...(prev.bandit_selected_arm_counts || {}),
                  ...(arm ? { [arm]: Number(prev?.bandit_selected_arm_counts?.[arm] || 0) + 1 } : {}),
                },
                bandit_event_count: Number(prev.bandit_event_count || 0) + (arm ? 1 : 0),
                bandit_reward_avg: (() => {
                  const prevN = Number(prev.bandit_event_count || 0);
                  const nextN = prevN + (arm ? 1 : 0);
                  if (nextN <= 0) return Number(prev.bandit_reward_avg || 0);
                  return ((Number(prev.bandit_reward_avg || 0) * prevN) + (arm ? reward : 0)) / nextN;
                })(),
                bandit_plot_y_min: Number(meta.plot_y_min ?? prev.bandit_plot_y_min ?? 0.0),
                bandit_plot_y_max: Number(meta.plot_y_max ?? prev.bandit_plot_y_max ?? 0.1),
              }));
              if (arm) {
                banditEventsRef.current = [
                  ...banditEventsRef.current,
                  { arm, reward, selection_mode: selectionMode },
                ].slice(-200);
                setBanditSeries((s) => {
                  const next = appendBanditPoint(s, arm, reward);
                  console.log(`🎯 [Updated Bandit Series]`, next);
                  return next;
                });
                setBanditSummary((prev) => summarizeBanditEvents(banditEventsRef.current, prev));
              } else {
                console.log(`⚠️ [Empty Arm] Skipping bandit update - arm is empty, reward=${reward}`);
              }
            }

            // Only terminal subsection events advance document progress. Verifier events are
            // iteration-level signals and must not make the document progress jump ahead.
            const subsectionKey = getSubsectionKey(data.metadata || {});
            const isFinalSubsectionStage = stage === "subsection_passed" || stage === "subsection_failed" || stage === "subsection_best_real_draft_accepted";
            if ((data.metadata?.subsection_id || data.metadata?.subsection_title) && isFinalSubsectionStage) {
              const subsectionIdentity = normalizeSubsectionName(`${data.metadata?.section_title || data.metadata?.section_id || "Section"} / ${data.metadata?.subsection_title || data.metadata?.subsection_id || "Subsection"}`) || subsectionKey;
              completedSubsectionsRef.current.add(subsectionIdentity);
              completedSubsectionIdentitiesRef.current.add(subsectionIdentity);
            }
            if ((data.metadata?.subsection_id || data.metadata?.subsection_title) && isFinalSubsectionStage) {
                setProgress((p) => {
                  const cur = Math.min(p.total || 0, completedSubsectionsRef.current.size);
                  const pct = p.total > 0 ? Math.min(100, Math.round((cur / p.total) * 100)) : 0;
                  return { ...p, current: cur, percent: pct };
                });
                const totalNow = Math.max(1, Number(progressRef.current.total || progress.total || 0));
                if (completedSubsectionsRef.current.size >= totalNow && documentIdRef.current) {
                  startFinalRecoveryPolling("all subsections passed");
                }
            }

            // 不再使用随机曲线，Verifier 面板仅展示当前小节的真实 verifier_result 快照。
          }

          if (data.type === "progress") {
            const msg = String(data.message || "");
            // 注意：只更新状态文本，不要从消息中解析百分比
            // 因为消息中的百分比可能是基于 history 中的项目数，不一定准确
            // 真正的进度应该基于实际收到的 subsection_passed/generated 事件数量
            setStatusText(msg || "Generating...");
            const progressMeta = data.metadata || {};
            const metaTotal = Number(progressMeta.total || 0);
            const metaCompleted = Number(progressMeta.completed || 0);
            if (metaTotal > 0 && metaCompleted >= 0) {
              setProgress((p) => {
                const total = Math.max(Number(p.total || 0), metaTotal);
                const current = Math.min(total, Math.max(Number(p.current || 0), metaCompleted));
                const percent = total > 0 ? Math.min(100, Math.round((current / total) * 100)) : 0;
                return { current, total, percent };
              });
              if (metaCompleted >= metaTotal && documentIdRef.current) {
                startFinalRecoveryPolling("progress metadata reached total");
              }
            }
          }

          if (data.type === "start") {
            const startMeta = data.metadata || {};
            if (startMeta.document_id) {
              documentIdRef.current = String(startMeta.document_id);
            }
            setStatusText(String(data.message || "Starting generation flow..."));
          }

          if (data.type === "outline") {
            outlineReadyRef.current = true;
            setStatusText(String(data.message || "Outline generated."));
          }

          if (data.type === "heartbeat") {
            setStatusText(String(data.message || "Still generating..."));
          }

          if (data.type === "warning") {
            setStatusText(String(data.message || "Generation warning"));
          }

          if (data.type === "complete") {
            console.log("🎉 [DEBUG] COMPLETE EVENT RECEIVED!", data);
            streamEndedRef.current = true;
            finalRecoveryStartedRef.current = false;
            const result = data.result || {};
            const stats = result.stats || {};
            const dims = stats.quality_dimension_avgs || {};

            console.log("📊 [DEBUG] Extracted stats:", {
              quality_score_avg: stats.quality_score_avg,
              unieval_available_subsections: stats.unieval_available_subsections,
              bandit_selected_arm_counts: stats.bandit_selected_arm_counts,
              bandit_reward_avg: stats.bandit_reward_avg,
            });

            const expected = Math.max(1, Number(stats.expected_subsections || progress.total || 0));
            const actualCompleted = completedSubsectionsRef.current.size;
            const failedCount = Array.isArray(stats.failed_subsections)
              ? stats.failed_subsections.length
              : Number(stats.failed_subsections || 0);
            const forcedCount = Array.isArray(stats.forced_subsections)
              ? stats.forced_subsections.length
              : Number(stats.forced_subsections || 0);
            const generatedCount = Number(stats.passed_subsections || 0) + failedCount + forcedCount;
            const hasCompleteContent = Boolean(String(result.content || "").trim()) && Math.max(actualCompleted, generatedCount) >= expected;
            const effectiveSuccess = Boolean(result.success || hasCompleteContent);
            const finalCurrent = Math.min(expected, Math.max(actualCompleted, generatedCount, effectiveSuccess ? expected : 0));
            const finalPercent = expected > 0 ? Math.min(100, Math.round((finalCurrent / expected) * 100)) : 100;

            console.log("✅ [DEBUG] About to call setRunning(false), current running state:", running);
            setQualitySummary({
              quality_score_avg: Number(stats.quality_score_avg || 0),
              quality_score_count: Number(stats.quality_score_count || 0),
              unieval_available_subsections: Number(stats.unieval_available_subsections || 0),
              unieval_fallback_subsections: Number(stats.unieval_fallback_subsections || 0),
            });
            setQualityPeak((prev) => Math.max(Number(prev || 0), Number(stats.quality_score_avg || 0)));
            const statsBanditEvents = Array.isArray(stats.bandit_recent_events) ? stats.bandit_recent_events : [];
            const liveBanditEvents = banditEventsRef.current || [];
            const bestBanditEvents = statsBanditEvents.length ? statsBanditEvents : liveBanditEvents;
            if (statsBanditEvents.length) {
              banditEventsRef.current = statsBanditEvents.slice(-200);
            }
            setBanditSummary((prev) => {
              const counts = stats.bandit_selected_arm_counts && Object.keys(stats.bandit_selected_arm_counts).length
                ? stats.bandit_selected_arm_counts
                : (prev.bandit_selected_arm_counts || {});
              const merged = {
                ...prev,
                bandit_selected_arm_counts: counts,
                bandit_reward_avg: Number(stats.bandit_reward_avg || prev.bandit_reward_avg || 0),
                bandit_last_selected_arm: String(stats.bandit_last_selected_arm || prev.bandit_last_selected_arm || ""),
                bandit_last_selection_mode: String(stats.bandit_last_selection_mode || prev.bandit_last_selection_mode || ""),
                bandit_event_count: Object.values(counts || {}).reduce((acc, n) => acc + Number(n || 0), 0) || Number(prev.bandit_event_count || 0),
                bandit_plot_y_min: Number(stats.bandit_plot_y_min ?? stats.plot_y_min ?? prev.bandit_plot_y_min ?? 0.0),
                bandit_plot_y_max: Number(stats.bandit_plot_y_max ?? stats.plot_y_max ?? prev.bandit_plot_y_max ?? 0.1),
              };
              return bestBanditEvents.length ? summarizeBanditEvents(bestBanditEvents, merged) : merged;
            });
            setBanditSeries((prev) => {
              const currentCount = banditSeriesKeys.reduce((sum, k) => sum + ((prev[k]?.length || 0)), 0);
              const rebuilt = buildBanditSeriesFromEvents(bestBanditEvents);
              const rebuiltCount = banditSeriesKeys.reduce((sum, k) => sum + ((rebuilt[k]?.length || 0)), 0);
              if (rebuiltCount > currentCount) {
                return rebuilt;
              }
              if (currentCount > 0) {
                return prev;
              }
              const reward = Number(stats.bandit_reward_avg || 0);
              const arm = String(stats.bandit_last_selected_arm || "");
              const s = createEmptyBanditSeries();
              if (arm && s[arm]) {
                s[arm].push(reward);
              }
              return s;
            });
            setDoc({ title: result.title || "", content: result.content || "" });
            setProgress({ current: finalCurrent, total: expected, percent: finalPercent });
            setSubsections((prev) => {
              const failedKeys = effectiveSuccess ? new Set() : new Set((Array.isArray(stats.failed_subsections) ? stats.failed_subsections : []).map((item) => {
                if (!item || typeof item !== "object") return "";
                return `${item.section_id || item.section_title || "Section"}:${item.subsection_id || item.subsection_title || "Subsection"}`;
              }).filter(Boolean));
              const completed = prev.map((item) => ({
                ...item,
                progress: 100,
                stage: failedKeys.has(item.key) ? "Failed" : (item.stage === "Failed" && effectiveSuccess ? "Passed" : (item.stage === "Waiting" ? "Passed" : item.stage)),
                passReason: failedKeys.has(item.key)
                  ? (item.passReason || "The final workflow did not accept this subsection.")
                  : (item.passReason || (effectiveSuccess ? "Final document assembly accepted this subsection." : "")),
              }));
              const finalItems = dedupeSubsectionItems(completed, expected);
              return effectiveSuccess ? finalItems.map((item) => ({
                ...item,
                stage: item.stage === "Failed" ? "Passed" : item.stage,
                progress: 100,
                passReason: item.stage === "Failed"
                  ? (item.passReason || "Accepted in final document assembly by best-real draft policy.")
                  : item.passReason,
              })) : finalItems;
            });
            setActiveNode("controller");
            setStatusText("Generation completed successfully.");
            setRunning(false);
            runningRef.current = false;
            if (Number.isFinite(Number(stats.total_generations))) {
              setTotalGenerations(Number(stats.total_generations));
            } else {
              setTotalGenerations((n) => n + 1);
            }
            closeSse();
          }

          if (data.type === "error") {
            streamEndedRef.current = true;
            setStatusText(`Error: ${data.message || "unknown"}`);
            setRunning(false);
            runningRef.current = false;
            closeSse();
          }
        });

        source.addEventListener("error", async () => {
          if (streamEndedRef.current) {
            return;
          }
          closeSse();

          const docId = documentIdRef.current;
          if (docId) {
            setStatusText(outlineReadyRef.current
              ? "Stream disconnected. Continuing recovery polling..."
              : "Stream disconnected during outline generation. Continuing background recovery...");
            const expectedTotal = Math.max(1, Number(progress.total || total || 0));
            const recoveryDeadline = Date.now() + (2 * 60 * 60 * 1000);

            while (!streamEndedRef.current && Date.now() < recoveryDeadline) {
              try {
                const resp = await fetch(`/api/recover-document?document_id=${encodeURIComponent(docId)}`, { cache: "no-store" });
                if (resp.ok) {
                  const recovered = await resp.json();
                  if (recovered && recovered.success) {
                    const stats = recovered.stats || {};
                    const expected = Math.max(1, Number(stats.expected_subsections || expectedTotal || 0));
                    const passed = Math.min(expected, Number(stats.passed_subsections || 0));
                    if (passed >= expected) {
                      completeFromRecoveredDocument(recovered, "Generation completed after stream recovery.");
                      return;
                    }
                    setDoc({ title: recovered.title || "", content: recovered.content || "" });
                    setProgress({
                      current: passed,
                      total: expected,
                      percent: expected > 0 ? Math.min(100, Math.round((passed / expected) * 100)) : 0
                    });
                    setStatusText(`Stream disconnected, continuing in background. Recovered ${passed}/${expected} subsections.`);
                  }
                }
              } catch {
                // Continue polling. Render may briefly restart or reject a request.
              }
              await new Promise((resolve) => setTimeout(resolve, 15000));
            }
          } else {
            streamEndedRef.current = true;
            finalRecoveryStartedRef.current = false;
            setRunning(false);
            runningRef.current = false;
            setStatusText("Stream disconnected before a document id was created. Please retry after the local services are healthy.");
            return;
          }

          setRunning(false);
          runningRef.current = false;
          setStatusText("Stream disconnected before completion. Background recovery timed out.");
        });
      };

      const downloadDocument = async (format) => {
        if (!doc.title || !doc.content) {
          return;
        }
        const isPdf = format === "pdf";
        setStatusText(isPdf ? "Preparing PDF download..." : "Preparing DOCX download...");
        try {
          const resp = await fetch(isPdf ? "/api/download-pdf" : "/api/download-docx", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: doc.title, content: doc.content })
          });
          if (!resp.ok) {
            throw new Error(await resp.text());
          }
          const blob = await resp.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `${doc.title}.${isPdf ? "pdf" : "docx"}`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
          setStatusText(isPdf ? "PDF downloaded." : "DOCX downloaded.");
        } catch (err) {
          setStatusText(`Download failed: ${err.message}`);
        }
      };

      const handleDownload = () => downloadDocument("docx");
      const handleDownloadPdf = () => downloadDocument("pdf");

      useEffect(() => () => closeSse(), []);

      const currentQualityMean = (metrics.topic_alignment + metrics.coverage_completeness + metrics.logical_coherence + metrics.evidence_grounding + metrics.novelty + metrics.structure_clarity) / 6;
      const qualityMean = running
        ? Math.max(qualityPeak, currentQualityMean, Number(qualitySummary.quality_score_avg || 0))
        : Math.max(currentQualityMean, Number(qualitySummary.quality_score_avg || 0));
      const totalSubsections = Math.max(0, Number(progress.total || 0));
      const displayCurrent = Math.min(totalSubsections, Math.max(0, Number(progress.current || 0)));
      const displayPercent = totalSubsections > 0 ? Math.min(100, Math.round((displayCurrent / totalSubsections) * 100)) : Math.min(100, Math.max(0, Number(progress.percent || 0)));
      const activeSubsectionIndex = running && displayCurrent < totalSubsections
        ? subsections.findIndex((item) => ["Drafting", "Evaluating via UniEval", "Repairing"].includes(item.stage))
        : -1;
      const activeOrdinal = activeSubsectionIndex >= 0 ? Math.min(totalSubsections, activeSubsectionIndex + 1) : 0;
      const normalizedStatusText = running
        ? `进度: ${activeOrdinal > 0 ? `正在处理第 ${activeOrdinal}/${totalSubsections} 小节；` : ""}已完成 ${displayCurrent}/${totalSubsections} (${displayPercent}%)`
        : statusText;
      const navItems = [
        { label: "Overview", target: "panel-overview", desc: "global state" },
        { label: "Generation", target: "panel-generation", desc: "topic and files" },
        { label: "Flow", target: "panel-flow", desc: "pipeline map" },
        { label: "Tracking", target: "panel-tracking", desc: "subsection reasons" },
        { label: "Verifier", target: "panel-verifier", desc: "quality gates" },
        { label: "Metrics", target: "panel-metrics", desc: "technical board" },
        { label: "Bandit", target: "panel-bandit", desc: "controller strategy" },
      ];
      const scrollToPanel = (target) => {
        const el = document.getElementById(target);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      };

      return (
        <div className="min-h-screen relative">
          <div className="hero-blob w-80 h-80 bg-[#ffd79b] top-[-8rem] left-[-3rem]"></div>
          <div className="hero-blob w-96 h-96 bg-[#f3a581] top-40 right-[-6rem]"></div>
          <div className="hero-blob w-72 h-72 bg-[#ef7c62] bottom-[-7rem] left-1/3"></div>

          <div className="relative z-10 p-4 md:p-6 lg:p-8 max-w-[1520px] mx-auto">
            <div className="grid lg:grid-cols-[260px_minmax(0,1fr)] gap-4 md:gap-6">
              <aside className="rounded-xl3 bg-slatepanel text-slate-100 p-4 md:p-5 shadow-darkcard border border-slate-700/80 h-fit lg:sticky lg:top-6">
                <div className="font-display text-xl mb-5">FlowerNet</div>
                <div className="space-y-2 text-sm">
                  {navItems.map((item) => (
                    <button
                      key={item.target}
                      type="button"
                      onClick={() => scrollToPanel(item.target)}
                      className="w-full text-left bg-slate-800/60 hover:bg-slate-800/95 focus:bg-slate-800/95 transition rounded-xl px-3 py-2.5 border border-slate-700/50"
                    >
                      <div className="font-semibold text-slate-100">{item.label}</div>
                      <div className="text-[11px] text-slate-400">{item.desc}</div>
                    </button>
                  ))}
                </div>
                <div className="mt-6 text-xs text-slate-300 leading-5">
                  Enterprise-grade AI research console for high-quality long-document generation.
                </div>
              </aside>

              <main className="space-y-5 md:space-y-6">
                <motion.section id="panel-overview" initial={{ opacity: 0, y: 16 }} animate={{ opacity: 1, y: 0 }} className="rounded-xl3 bg-white/55 backdrop-blur-lg border border-white/70 p-5 md:p-6 shadow-glass scroll-mt-6">
                  <div className="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
                    <div>
                      <h1 className="font-display text-2xl md:text-4xl text-slate-900">FlowerNet Agent: High-Quality Long Document Generation</h1>
                      <p className="mt-2 text-sm md:text-base text-slate-700 max-w-3xl">稳定地产出结构正确、主题对齐、低重复、可验证、可追踪、可恢复的长文档。</p>
                    </div>
                    <div className="flex flex-wrap gap-2">
                      {badges.map((b) => <span key={b} className="text-xs font-semibold rounded-full px-3 py-1 bg-white border border-slate-200">{b}</span>)}
                    </div>
                  </div>
                  <div className="grid sm:grid-cols-3 gap-3 mt-5">
                    <div className="rounded-2xl bg-white border border-slate-200 p-3">
                      <div className="text-xs text-slate-500">Total Generations</div>
                      <div className="text-2xl font-display text-slate-900"><CountUp value={totalGenerations} /></div>
                    </div>
                    <div className="rounded-2xl bg-white border border-slate-200 p-3">
                      <div className="text-xs text-slate-500">Generation Duration</div>
                      <div className="text-2xl font-display text-slate-900">{running ? generationTimeText : (generationElapsedSec > 0 ? generationTimeText : "待开始")}</div>
                    </div>
                    <div className="rounded-2xl bg-white border border-slate-200 p-3">
                      <div className="text-xs text-slate-500">Global Quality Index</div>
                      <div className="text-2xl font-display text-slate-900"><CountUp value={qualityMean} digits={3} /></div>
                    </div>
                  </div>
                </motion.section>

                <section className="grid xl:grid-cols-12 gap-4 md:gap-6">
                  <div className="xl:col-span-8 flex flex-col gap-4 md:gap-6">
                    <div id="panel-flow" className="scroll-mt-6"><FlowWidget activeNode={activeNode} /></div>
                    <MethodologyPanel />
                  </div>
                  <div id="panel-generation" className="xl:col-span-4 rounded-xl3 bg-white p-5 border border-slate-200 shadow-neumorph scroll-mt-6">
                    <h3 className="font-display text-lg mb-4">Run Generation</h3>
                      <div className="space-y-3">
                      <input className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm" value={topic} onChange={(e) => setTopic(e.target.value)} placeholder="Document topic" />
                      <input className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm" value={background} onChange={(e) => setBackground(e.target.value)} placeholder="User background" />
                      <textarea className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm h-24" value={extra} onChange={(e) => setExtra(e.target.value)} placeholder="Extra requirements" />
                      <div className="rounded-xl border border-dashed border-slate-300 bg-slate-50 px-3 py-3">
                        <div className="flex items-center justify-between gap-2 mb-2">
                          <div className="text-xs font-semibold text-slate-700">Upload context files</div>
                          {uploadedFiles.length > 0 && (
                            <button type="button" onClick={clearUploadedContext} className="text-xs text-slate-500 hover:text-slate-900">Clear</button>
                          )}
                        </div>
                        <div className="grid grid-cols-2 gap-2">
                          <label className={`min-h-10 rounded-lg bg-slate-900 text-white text-xs font-semibold px-3 py-2 flex items-center justify-center ${running || uploadingFiles ? "opacity-50 pointer-events-none" : "cursor-pointer"}`}>
                            Files
                            <input
                              type="file"
                              multiple
                              disabled={running || uploadingFiles}
                              onChange={handleFileUpload}
                              className="hidden"
                            />
                          </label>
                          <label className={`min-h-10 rounded-lg bg-white border border-slate-200 text-slate-700 text-xs font-semibold px-3 py-2 flex items-center justify-center ${running || uploadingFiles ? "opacity-50 pointer-events-none" : "cursor-pointer"}`}>
                            Folder
                            <input
                              type="file"
                              multiple
                              webkitdirectory=""
                              directory=""
                              disabled={running || uploadingFiles}
                              onChange={handleFileUpload}
                              className="hidden"
                            />
                          </label>
                        </div>
                        <div className="mt-2 text-xs text-slate-500">
                          Supports files or folders: DOCX, PDF, Excel/CSV, Markdown, code, JSON, PPTX, ZIP/TAR/GZ, and common text-like files.
                        </div>
                        {uploadStatus && (
                          <div className={`mt-2 rounded-lg px-2 py-1 text-xs ${uploadStatus.toLowerCase().includes("failed") || uploadStatus.toLowerCase().includes("error") ? "bg-rose-50 text-rose-700" : "bg-white text-slate-700"}`}>
                            {uploadingFiles ? "Parsing uploaded files..." : uploadStatus}
                          </div>
                        )}
                        {uploadedFiles.length > 0 && (
                          <div className="mt-2 max-h-24 overflow-auto space-y-1">
                            {uploadedFiles.map((file, idx) => (
                              <div key={`${file.filename || "file"}-${idx}`} className="flex items-center justify-between gap-2 rounded-lg bg-white px-2 py-1 text-xs text-slate-600">
                                <span className="truncate">{file.filename}</span>
                                <span className="shrink-0 text-slate-400">{file.parser} · {file.extracted_chars || 0} chars</span>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        <input type="number" min="1" max="10" className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm" value={chapterCount} onChange={(e) => setChapterCount(Number(e.target.value))} />
                        <input type="number" min="1" max="8" className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm" value={subCount} onChange={(e) => setSubCount(Number(e.target.value))} />
                      </div>
                      <div className="h-2 rounded-full bg-slate-200 overflow-hidden">
                        <motion.div animate={{ width: `${displayPercent}%` }} className="h-full bg-gradient-to-r from-coral to-peach" />
                      </div>
                      <div className="text-xs text-slate-600">{running ? `${activeOrdinal > 0 ? `active ${activeOrdinal}/${totalSubsections} · ` : ""}completed ${displayCurrent}/${totalSubsections}` : `${displayCurrent}/${totalSubsections} subsections`} · {displayPercent}%</div>
                      <div className="grid grid-cols-2 gap-2">
                        <button onClick={handleStart} disabled={running} className="col-span-2 min-h-12 rounded-xl bg-slate-900 text-white text-sm font-semibold px-3 py-2 disabled:opacity-50 whitespace-nowrap">{running ? "Running..." : "Start"}</button>
                        <button onClick={handleDownload} disabled={!doc.content} className="min-h-11 rounded-xl bg-emerald-600 text-white text-sm font-semibold px-3 py-2 disabled:opacity-50 whitespace-nowrap leading-tight">DOCX</button>
                        <button onClick={handleDownloadPdf} disabled={!doc.content} className="min-h-11 rounded-xl bg-cyan-700 text-white text-sm font-semibold px-3 py-2 disabled:opacity-50 whitespace-nowrap leading-tight">PDF</button>
                      </div>
                      <div className="text-xs rounded-xl px-3 py-2 bg-slate-100 text-slate-700">{normalizedStatusText}</div>
                    </div>
                  </div>
                </section>

                <section className="grid xl:grid-cols-12 gap-4 md:gap-6">
                  <div className="xl:col-span-5"><SubsectionTracker items={subsections} /></div>
                  <div className="xl:col-span-7"><RadarMetrics metrics={metrics} summary={qualitySummary} verifierDetail={verifierDetail} /></div>
                </section>

                <FullMetricsBoard
                  loading={metricsCatalogLoading}
                  error={metricsCatalogError}
                  summary={metricsCatalogSummary}
                  metrics={metricsCatalogAll}
                  currentMetrics={metrics}
                  verifierDetail={verifierDetail}
                  progress={progress}
                  banditSummary={banditSummary}
                  qualitySummary={qualitySummary}
                  activeNode={activeNode}
                  running={running}
                />

                <section id="panel-bandit" className="scroll-mt-6">
                  <BanditChart data={banditSeries} summary={banditSummary} />
                </section>
              </main>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script>
    (function(){
      if (window.__FLOWERNET_FALLBACK_DONE) return; window.__FLOWERNET_FALLBACK_DONE = true;
      if (window.__FLOWERNET_FILE_MODE || window.location.protocol === 'file:') {
        var localUrl = window.__FLOWERNET_LOCAL_URL || 'http://127.0.0.1:8010/';
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="padding:40px;font-family:Plus Jakarta Sans, sans-serif;color:#334155;line-height:1.65">FlowerNet needs to be opened through the local web service, not as a file.<br/><a href="' + localUrl + '" style="color:#2563eb;font-weight:700">Open FlowerNet at ' + localUrl + '</a></div>';
        }
        return;
      }
      function showFallback(msg){
        try{
          var root = document.getElementById('root');
          if(root){
            root.innerHTML = '<div style="padding:40px;font-family:Plus Jakarta Sans, sans-serif;color:#334155">Front-end failed to initialize.<br/>' + (msg?('<small style="color:#7b8794">'+msg+'</small>'):'') + '</div>';
          }
          console.error('[WebFallback]', msg);
        }catch(e){ console.error(e); }
      }
      setTimeout(function(){
        if(typeof React === 'undefined' || typeof ReactDOM === 'undefined'){
          showFallback('Missing React or ReactDOM. Check network / DevTools for failed script loads.');
          return;
        }
        setTimeout(function(){
          var root = document.getElementById('root');
          if(root && root.children.length === 0){
            showFallback('No UI rendered — possible runtime error. Open DevTools Console for details.');
          }
        }, 1200);
      }, 1200);
    })();
  </script>
</body>
</html>
