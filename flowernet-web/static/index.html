<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowerNet Agent Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base: "#F4F2EE",
            ink: "#1E293B",
            slatepanel: "#1C2430",
            peach: "#F5B97A",
            coral: "#EF7C62",
            amberglass: "#F4D8A8"
          },
          boxShadow: {
            neumorph: "16px 16px 36px rgba(144, 116, 86, 0.16), -16px -16px 36px rgba(255, 255, 255, 0.78)",
            glass: "0 18px 40px rgba(80, 55, 28, 0.16)",
            darkcard: "0 18px 38px rgba(3, 8, 20, 0.45)"
          },
          borderRadius: {
            xl2: "1.5rem",
            xl3: "2rem"
          }
        }
      }
    };
  </script>
  <style>
    body {
      margin: 0;
      background: #f4f2ee;
      color: #1e293b;
      font-family: "Plus Jakarta Sans", sans-serif;
      overflow-x: hidden;
    }

    .hero-blob {
      position: absolute;
      border-radius: 9999px;
      filter: blur(45px);
      opacity: 0.68;
      pointer-events: none;
      z-index: 0;
    }

    .font-display {
      font-family: "Space Grotesk", sans-serif;
    }

    .dashed-flow {
      stroke-dasharray: 8 9;
      animation: dashmove 11s linear infinite;
    }

    @keyframes dashmove {
      to {
        stroke-dashoffset: -240;
      }
    }

    .radar-grid {
      fill: none;
      stroke: rgba(30, 41, 59, 0.26);
      stroke-width: 1;
    }

    .radar-shape {
      fill: rgba(239, 124, 98, 0.24);
      stroke: rgba(239, 124, 98, 0.9);
      stroke-width: 2;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/framer-motion/dist/framer-motion.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;
    const MotionLib = window.FramerMotion || window.Motion || {};
    const motion = MotionLib.motion || new Proxy({}, { get: () => "div" });

    const PIPELINE = [
      { id: "outliner", title: "Outliner", subtitle: "结构规划" },
      { id: "generator", title: "Generator", subtitle: "内容生成" },
      { id: "verifier", title: "Verifier", subtitle: "多维质量验证" },
      { id: "controller", title: "Controller", subtitle: "定向修复" }
    ];

    const STATUS_STYLE = {
      Drafting: "bg-amber-100 text-amber-800",
      "Evaluating via UniEval": "bg-sky-100 text-sky-800",
      Repairing: "bg-orange-100 text-orange-800",
      Passed: "bg-emerald-100 text-emerald-800",
      Failed: "bg-rose-100 text-rose-800",
      Waiting: "bg-slate-100 text-slate-700"
    };

    const createEmptyVerifierDetail = () => ({
      is_passed: false,
      relevancy_index: 0,
      redundancy_index: 0,
      rel_threshold: 0,
      red_threshold: 0,
      quality_score: 0,
      quality_score_threshold: 0,
      quality_score_passed: false,
      quality_dimensions: {},
      quality_dimensions_check: {},
      quality_dimensions_failed: [],
      quality_dimensions_passed: false,
      dimension_thresholds: {},
      source_check: { passed: false, reference_count: 0, reason: "" },
      source_check_passed: false,
      source_reference_count: 0,
    });

    function CountUp({ value, digits = 0 }) {
      const [display, setDisplay] = useState(0);
      useEffect(() => {
        let raf = 0;
        const start = performance.now();
        const from = display;
        const duration = 560;
        const tick = (ts) => {
          const p = Math.min(1, (ts - start) / duration);
          const next = from + (value - from) * (1 - Math.pow(1 - p, 3));
          setDisplay(next);
          if (p < 1) {
            raf = requestAnimationFrame(tick);
          }
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [value]);
      return <span>{Number(display).toFixed(digits)}</span>;
    }

    function FlowWidget({ activeNode }) {
      return (
        <div className="rounded-xl3 border border-white/60 bg-white/45 backdrop-blur-lg p-5 shadow-glass">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-display text-lg text-slate-900">Generation Flow</h3>
            <span className="text-xs font-semibold bg-slate-900 text-slate-100 rounded-full px-3 py-1">结构规划 - 小节生成 - 质量验证 - 失败修复 - 文档组装</span>
          </div>
          <div className="relative">
            <svg viewBox="0 0 980 160" className="w-full h-24">
              <path d="M90 80 C 220 20, 320 140, 460 80 S 710 20, 880 80" className="dashed-flow" stroke="#334155" fill="none" strokeWidth="2" />
            </svg>
            <div className="-mt-20 grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
              {PIPELINE.map((node, idx) => {
                const active = activeNode === node.id;
                return (
                  <motion.div
                    key={node.id}
                    animate={{ y: active ? -4 : 0, scale: active ? 1.02 : 1, boxShadow: active ? "0 0 0 2px rgba(14,116,144,0.28), 0 16px 30px rgba(7, 89, 133, 0.2)" : "0 8px 20px rgba(30,41,59,0.08)" }}
                    className="rounded-2xl bg-white border border-slate-200 px-4 py-3"
                  >
                    <div className="text-xs uppercase tracking-wide text-slate-500">Node {idx + 1}</div>
                    <div className="font-display text-slate-900 text-base">{node.title}</div>
                    <div className="text-xs text-slate-600">{node.subtitle}</div>
                    {active && <div className="mt-2 text-[11px] font-semibold text-cyan-700">Active microservice</div>}
                  </motion.div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function RadarMetrics({ metrics, summary, verifierDetail }) {
      const dimensionItems = [
        { key: "topic_alignment", label: "topic_alignment", color: "#fb923c", meaning: "主题对齐度" },
        { key: "coverage_completeness", label: "coverage_completeness", color: "#14b8a6", meaning: "覆盖完整度" },
        { key: "logical_coherence", label: "logical_coherence", color: "#ec4899", meaning: "逻辑连贯性" },
        { key: "evidence_grounding", label: "evidence_grounding", color: "#84cc16", meaning: "证据支撑度" },
        { key: "novelty", label: "novelty", color: "#ef4444", meaning: "创新性" },
        { key: "structure_clarity", label: "structure_clarity", color: "#6366f1", meaning: "结构清晰度" },
      ];
      const radarKeys = dimensionItems.map((item) => item.key);
      const cx = 160;
      const cy = 122;
      const radius = 82;
      const hexagonPoints = (scale = 1) => radarKeys.map((_, i) => {
        const angle = -Math.PI / 2 + (i * Math.PI * 2) / radarKeys.length;
        return [cx + Math.cos(angle) * radius * scale, cy + Math.sin(angle) * radius * scale];
      }).map((p) => p.join(",")).join(" ");
      const valuePoints = radarKeys.map((key, i) => {
        const angle = -Math.PI / 2 + (i * Math.PI * 2) / radarKeys.length;
        const v = Math.max(0, Math.min(1, metrics[key] || 0));
        return [cx + Math.cos(angle) * radius * v, cy + Math.sin(angle) * radius * v];
      }).map((p) => p.join(",")).join(" ");
      const currentSourceCheck = verifierDetail?.source_check || {};
      const qualityPassed = Boolean(verifierDetail?.quality_dimensions_passed);
      const sourcePassed = Boolean(verifierDetail?.source_check_passed);
      return (
        <div className="rounded-xl3 border border-slate-200 bg-white p-5 shadow-neumorph">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-display text-lg">Verifier Quality Control</h3>
            <span className="text-xs px-2 py-1 rounded-full bg-emerald-100 text-emerald-800 font-semibold">Current Subsection Snapshot</span>
          </div>
          <div className="flex flex-col md:flex-row gap-4 mb-4">
            <div className="shrink-0 mx-auto md:mx-0">
              <svg viewBox="0 0 320 260" className="w-48 h-40">
                <polygon className="radar-grid" points={hexagonPoints(1)}></polygon>
                <polygon className="radar-grid" points={hexagonPoints(0.78)}></polygon>
                <polygon className="radar-grid" points={hexagonPoints(0.56)}></polygon>
                <polygon className="radar-grid" points={hexagonPoints(0.34)}></polygon>
                <polygon className="radar-shape" points={valuePoints}></polygon>
              </svg>
            </div>
            <div className="flex-1 rounded-2xl border border-slate-200 bg-slate-50 p-3 text-xs text-slate-600 space-y-1">
              <div className="grid grid-cols-2 gap-x-4 gap-y-1">
                <div><span className="font-semibold text-slate-700">当前小节判定:</span> {verifierDetail?.is_passed ? "通过" : "未通过"}</div>
                <div><span className="font-semibold text-slate-700">UniEval 维度判定:</span> {qualityPassed ? "通过" : "未通过"}</div>
                <div><span className="font-semibold text-slate-700">引用判定:</span> {sourcePassed ? "通过" : "未通过"}</div>
                <div><span className="font-semibold text-slate-700">Relevancy:</span> {Number(verifierDetail?.relevancy_index || 0).toFixed(3)} / {Number(verifierDetail?.rel_threshold || 0).toFixed(2)}</div>
                <div><span className="font-semibold text-slate-700">Redundancy:</span> {Number(verifierDetail?.redundancy_index || 0).toFixed(3)} / {Number(verifierDetail?.red_threshold || 0).toFixed(2)}</div>
                <div><span className="font-semibold text-slate-700">Source refs:</span> {Number(verifierDetail?.source_reference_count || 0)}</div>
                <div><span className="font-semibold text-slate-700">UniEval samples:</span> {summary?.unieval_available_subsections ?? 0}</div>
                <div><span className="font-semibold text-slate-700">UniEval fallback:</span> {summary?.unieval_fallback_subsections ?? 0}</div>
                <div><span className="font-semibold text-slate-700">Quality avg:</span> {(summary?.quality_score_avg ?? 0).toFixed(3)}</div>
                <div><span className="font-semibold text-slate-700">Quality score:</span> {Number(verifierDetail?.quality_score || 0).toFixed(3)} / {Number(verifierDetail?.quality_score_threshold || 0).toFixed(2)} {verifierDetail?.quality_score_passed ? "PASS" : "FAIL"}</div>
              </div>
              <div className="pt-1 text-[11px] text-slate-500 leading-5">
                这里展示的是"当前小节"的 verifier 快照，不是累计平均值。
              </div>
            </div>
          </div>
          <div className="grid grid-cols-3 gap-3">
            {dimensionItems.map((item) => {
              const val = Math.max(0, Math.min(1, metrics[item.key] || 0));
              const detail = verifierDetail?.quality_dimensions_check?.[item.key] || {};
              const threshold = Number(verifierDetail?.dimension_thresholds?.[item.key] ?? 0);
              const passed = Boolean(detail.passed);
              return (
                <div key={item.key} className="rounded-2xl border border-slate-200 bg-slate-50 p-3">
                  <div className="flex items-center justify-between gap-2 mb-1">
                    <div className="text-sm font-semibold text-slate-800">{item.meaning}</div>
                    <span className={`shrink-0 text-[10px] font-semibold rounded-full px-2 py-0.5 ${passed ? "bg-emerald-100 text-emerald-700" : "bg-rose-100 text-rose-700"}`}>{passed ? "PASS" : "FAIL"}</span>
                  </div>
                  <div className="text-[11px] text-slate-400 mb-1">{item.label}</div>
                  <div className="text-[11px] text-slate-500 mb-2">threshold: {threshold.toFixed(2)}</div>
                  <div className="flex items-center justify-between text-[11px] text-slate-500 mb-1">
                    <span>value</span>
                    <span className="font-medium text-slate-700">{val.toFixed(3)}</span>
                  </div>
                  <div className="h-1.5 rounded-full bg-slate-200 overflow-hidden">
                    <motion.div initial={{ width: 0 }} animate={{ width: `${Math.round(val * 100)}%` }} className="h-full rounded-full" style={{ backgroundColor: item.color }} />
                  </div>
                </div>
              );
            })}
          </div>
          <div className="mt-3 text-[11px] text-slate-500 leading-5">
            UniEval + 启发式双通道融合评估：覆盖主题对齐、覆盖完整度、逻辑连贯、证据支撑、创新性、结构清晰度；同时检查 relevancy、redundancy 和引用。PASS/FAIL 基于各维度 value 与 threshold 对比得出。
          </div>
        </div>
      );
    }

    function BanditChart({ data, summary }) {
      const keys = ["llm", "rule", "rule_structured", "defect_topic", "defect_evidence", "defect_structure"];
      const maxLen = Math.max(...keys.map((k) => (data[k] || []).length), 1);
      const chartWidth = 440;
      const chartHeight = 128;
      const legendItems = [
        { key: "llm", label: "llm", note: "LLM 直接改写", color: "bg-red-500" },
        { key: "rule", label: "rule", note: "规则修正", color: "bg-cyan-500" },
        { key: "rule_structured", label: "rule_structured", note: "结构化规则修正", color: "bg-violet-500" },
        { key: "defect_topic", label: "defect_topic", note: "主题定向修复", color: "bg-green-500" },
        { key: "defect_evidence", label: "defect_evidence", note: "证据定向修复", color: "bg-orange-500" },
        { key: "defect_structure", label: "defect_structure", note: "结构定向修复", color: "bg-blue-500" },
      ];
      const modeGuideItems = [
        { key: "epsilon_explore", title: "epsilon_explore", desc: "以 ε 概率随机探索备选策略臂，抑制早期过拟合，适用于模型尚处收敛初期的场景。" },
        { key: "epsilon_greedy", title: "epsilon_greedy", desc: "以贪心方式优先利用当前最优臂，同时保留小概率随机探索，兼顾收敛速度与策略稳健性。" },
        { key: "exploit", title: "exploit", desc: "纯利用模式，持续选取历史累积收益最高的策略臂，适用于奖励分布已趋于稳定的阶段。" },
        { key: "softmax", title: "softmax", desc: "依据各臂累积分数进行 softmax 概率采样，收益越高的臂被选中的概率越大。" },
        { key: "drift_recover", title: "drift_recover", desc: "检测到奖励分布发生漂移时自动提升探索率，触发策略重评估以适应新的数据分布。" },
        { key: "score_exploit", title: "score_exploit", desc: "按当前累积分数对策略臂降序排列，优先调度高分策略执行。" },
        { key: "ucb", title: "ucb", desc: "置信上界策略，优先选择高均值且不确定性大的臂。" },
      ];
      const toPath = (arr, plotMin, plotMax) => {
        if (!arr || arr.length === 0) {
          return "";
        }
        const min = typeof plotMin === 'number' ? plotMin : 0.0;
        const max = typeof plotMax === 'number' && plotMax > min ? plotMax : Math.max(min + 0.0001, 0.1);
        const yTop = 20; // within group coordinates
        const yBottom = 104;
        const range = yBottom - yTop;
        return arr.map((v, i) => {
          const x = 28 + (i / Math.max(maxLen - 1, 1)) * chartWidth;
          const val = Number(v);
          const norm = isFinite(val) ? Math.max(0, Math.min(1, (val - min) / (max - min))) : 0;
          const y = yBottom - norm * range;
          return `${i === 0 ? "M" : "L"}${x} ${y}`;
        }).join(" ");
      };
      const currentMode = String(summary?.bandit_last_selection_mode || "n/a");
      const currentModeItem = modeGuideItems.find((item) => item.key === currentMode);
      return (
        <div className="rounded-xl3 bg-slatepanel p-5 text-slate-100 shadow-darkcard border border-slate-700/70">
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-display text-lg">Controller Strategies (Contextual Bandit)</h3>
            <span className="text-xs px-2 py-1 rounded-full bg-slate-700 text-slate-200">Adaptive Timeout Active</span>
          </div>
          <svg viewBox="0 0 500 190" className="w-full h-56 bg-slate-900/60 rounded-2xl p-2">
            {/* Y-axis */}
            <line x1="55" y1="4" x2="55" y2="168" stroke="#64748b" strokeWidth="1" />
            {/* X-axis */}
            <line x1="55" y1="168" x2="490" y2="168" stroke="#64748b" strokeWidth="1" />
            {/* Dynamic Y-axis label */}
            {
              (() => {
                const pmin = Number(summary?.bandit_plot_y_min ?? 0.0);
                const pmax = Number(summary?.bandit_plot_y_max ?? 0.1);
                const label = `Reward scale (${pmin.toFixed(3)} - ${pmax.toFixed(3)})`;
                return <text x="10" y="86" fontSize="9" fill="#94a3b8" textAnchor="middle" transform="rotate(-90 10 86)">{label}</text>;
              })()
            }
            {/* X-axis label */}
            <text x="490" y="180" fontSize="9" fill="#94a3b8" textAnchor="end">Controller events over time</text>
            {/* Y-axis tick marks and labels (dynamic) */}
            {
              (() => {
                const pmin = Number(summary?.bandit_plot_y_min ?? 0.0);
                const pmax = Number(summary?.bandit_plot_y_max ?? 0.1);
                const min = pmin;
                const max = pmax > min ? pmax : min + 0.0001;
                const yTop = 20;
                const yBottom = 104;
                const range = yBottom - yTop;
                const ticks = 4;
                const nodes = [];
                for (let t = 0; t <= ticks; t += 1) {
                  const frac = t / ticks;
                  const y = yBottom - frac * range;
                  const val = (min + (1 - frac) * (max - min)).toFixed(3);
                  nodes.push(<line key={`tick-${t}`} x1="51" y1={y} x2="55" y2={y} stroke="#64748b" strokeWidth="1" />);
                  nodes.push(<text key={`tick-label-${t}`} x="49" y={y + 4} fontSize="9" fill="#64748b" textAnchor="end">{val}</text>);
                  nodes.push(<line key={`grid-${t}`} x1="55" y1={y} x2="490" y2={y} stroke="#475569" strokeWidth="0.5" strokeDasharray="2,2" />);
                }
                return nodes;
              })()
            }
            {/* Paths with new color scheme */}
            <g transform="translate(55, 4)">
              <path d={toPath(data.llm, summary?.bandit_plot_y_min, summary?.bandit_plot_y_max)} stroke="#ef4444" fill="none" strokeWidth="2.5" />
              <path d={toPath(data.rule, summary?.bandit_plot_y_min, summary?.bandit_plot_y_max)} stroke="#06b6d4" fill="none" strokeWidth="2.5" />
              <path d={toPath(data.rule_structured, summary?.bandit_plot_y_min, summary?.bandit_plot_y_max)} stroke="#8b5cf6" fill="none" strokeWidth="2.5" />
              <path d={toPath(data.defect_topic, summary?.bandit_plot_y_min, summary?.bandit_plot_y_max)} stroke="#10b981" fill="none" strokeWidth="2.5" />
              <path d={toPath(data.defect_evidence, summary?.bandit_plot_y_min, summary?.bandit_plot_y_max)} stroke="#f97316" fill="none" strokeWidth="2.5" />
              <path d={toPath(data.defect_structure, summary?.bandit_plot_y_min, summary?.bandit_plot_y_max)} stroke="#3b82f6" fill="none" strokeWidth="2.5" />
            </g>
          </svg>
          <div className="mt-3 rounded-2xl border border-slate-700/60 bg-slate-950/35 p-3 text-xs text-slate-200">
            <div className="mb-2 flex items-center justify-between gap-3">
              <div className="font-semibold text-slate-100">Legend</div>
              <div className="text-[11px] text-slate-400">Y = 单次 arm 修复收益（reward, 0-1），X = controller 事件时间序列</div>
            </div>
            <div className="grid gap-2 md:grid-cols-2 xl:grid-cols-3">
              {legendItems.map((item) => (
                <div key={item.key} className="flex items-start gap-2 rounded-xl border border-slate-700/60 bg-slate-900/40 px-3 py-2">
                  <span className={`mt-1 inline-block h-2.5 w-2.5 rounded-full ${item.color}`} />
                  <div className="min-w-0">
                    <div className="font-semibold text-slate-100">{item.label}</div>
                    <div className="text-[11px] text-slate-400">{item.note} reward trend</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div className="mt-4 rounded-2xl border border-slate-600/70 bg-slate-950/55 p-3 text-xs text-slate-200 space-y-1">
            <div className="grid md:grid-cols-2 gap-2">
              <div><span className="font-semibold text-white">Last arm:</span> {summary?.bandit_last_selected_arm || 'n/a'}</div>
              <div><span className="font-semibold text-white">Mode:</span> {currentMode}</div>
              <div className="md:col-span-2">
                <div><span className="font-semibold text-white">Counts</span> <span className="text-[11px] text-slate-400">（各策略臂累计被选次数；差异显著属正常表现，高收益臂被调用频次自然更高）</span><span className="font-semibold text-white">：</span> llm {summary?.bandit_selected_arm_counts?.llm || 0} · rule {summary?.bandit_selected_arm_counts?.rule || 0} · rule_structured {summary?.bandit_selected_arm_counts?.rule_structured || 0} · defect_topic {summary?.bandit_selected_arm_counts?.defect_topic || 0} · defect_evidence {summary?.bandit_selected_arm_counts?.defect_evidence || 0} · defect_structure {summary?.bandit_selected_arm_counts?.defect_structure || 0}</div>
              </div>
              <div className="md:col-span-2"><span className="font-semibold text-white">Reward avg:</span> {(summary?.bandit_reward_avg ?? 0).toFixed(3)} <span className="text-[11px] text-slate-400">（正常区间：0.02–0.05；综合质量提升幅度、风险控制系数与约束惩罚项计算所得，单次增量典型幅度 0.01–0.1）</span></div>
            </div>
            <div className="pt-1 text-[11px] text-slate-300 leading-5">
              折线轨迹反映各策略臂的 reward 随 Controller 事件序列的动态变化；count 为该臂的累计选中次数，与 reward 为独立统计维度。
            </div>
            <div className="pt-2">

    function FullMetricsBoard({ loading, error, summary, metrics, currentMetrics, verifierDetail }) {
      const categoryMap = summary?.categories || {};
      const categoryEntries = Object.entries(categoryMap);

      const getMetricKeysForCategory = (categoryName, info) => {
        const direct = Array.isArray(info?.metrics) ? info.metrics : [];
        if (direct.length > 0) return direct;
        return Object.entries(metrics || {})
          .filter(([, metric]) => String(metric?.category || "") === String(categoryName))
          .map(([key]) => key);
      };

      const getRuntimeMetric = (metricKey) => {
        const q = currentMetrics || {};
        const v = verifierDetail || {};
        const sourceCheck = v.source_check || {};
        switch (metricKey) {
          case "relevancy_index":
            return Number(v.relevancy_index ?? 0);
          case "redundancy_index":
            return Number(v.redundancy_index ?? 0);
          case "topic_alignment":
            return Number(q.topic_alignment ?? 0);
          case "coverage_completeness":
            return Number(q.coverage_completeness ?? 0);
          case "logical_coherence":
            return Number(q.logical_coherence ?? 0);
          case "evidence_grounding":
            return Number(q.evidence_grounding ?? 0);
          case "novelty":
            return Number(q.novelty ?? 0);
          case "structure_clarity":
            return Number(q.structure_clarity ?? 0);
          case "quality_score_avg":
            return Number(v.quality_score ?? q.quality_score ?? 0);
          case "source_refs_coverage":
          case "unique_citations":
          case "high_quality_per_section":
            return Number(v.source_reference_count ?? sourceCheck.reference_count ?? 0);
          case "domain_similarity": {
            const sem = sourceCheck.matched_semantic_scores || {};
            const values = Object.values(sem).map((x) => Number(x || 0)).filter((x) => Number.isFinite(x));
            return values.length ? values.reduce((a, b) => a + b, 0) / values.length : 0;
          }
          default:
            return null;
        }
      };

      const formatRuntimeMetric = (metricKey) => {
        const value = getRuntimeMetric(metricKey);
        if (value === null || Number.isNaN(value)) return "N/A";
        if (["unique_citations", "high_quality_per_section", "source_refs_coverage"].includes(metricKey)) {
          return String(Math.round(value));
        }
        return Number(value).toFixed(3);
      };

      return (
        <section className="rounded-xl3 border border-slate-200 bg-white p-5 shadow-neumorph">
          <div className="flex flex-col md:flex-row md:items-end md:justify-between gap-3 mb-4">
            <div>
              <h3 className="font-display text-xl text-slate-900">FlowerNet Full Metrics Board</h3>
              <p className="text-sm text-slate-600 mt-1">展示所有必须检测的质量指标、阈值和通过标准，并解释 FlowerNet 的核心优势。</p>
            </div>
            <div className="text-xs rounded-full bg-slate-900 text-slate-100 px-3 py-1 inline-flex w-fit">
              {summary ? `${summary.total_metrics || 0} metrics · ${summary.total_categories || 0} categories` : "Metrics catalog"}
            </div>
          </div>

          {loading && (
            <div className="rounded-2xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-600">
              正在加载指标定义...
            </div>
          )}

          {!loading && error && (
            <div className="rounded-2xl border border-rose-200 bg-rose-50 p-4 text-sm text-rose-700">
              指标加载失败：{error}
            </div>
          )}

          {!loading && !error && (
            <div className="space-y-4">
              <div className="grid md:grid-cols-3 gap-3">
                <div className="rounded-2xl border border-slate-200 bg-slate-50 p-3">
                  <div className="text-xs text-slate-500">Total Metrics</div>
                  <div className="text-2xl font-display text-slate-900">{summary?.total_metrics || Object.keys(metrics || {}).length}</div>
                </div>
                <div className="rounded-2xl border border-slate-200 bg-slate-50 p-3">
                  <div className="text-xs text-slate-500">Categories</div>
                  <div className="text-2xl font-display text-slate-900">{summary?.total_categories || categoryEntries.length}</div>
                </div>
                <div className="rounded-2xl border border-slate-200 bg-slate-50 p-3">
                  <div className="text-xs text-slate-500">Core Features</div>
                  <div className="text-2xl font-display text-slate-900">{summary?.total_features || 0}</div>
                </div>
              </div>

              {categoryEntries.map(([categoryName, info]) => {
                const metricKeys = getMetricKeysForCategory(categoryName, info);
                return (
                  <div key={categoryName} className="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                    <div className="flex items-center justify-between gap-2 mb-2">
                      <div className="font-semibold text-slate-800">{categoryName}</div>
                      <span className="text-[11px] rounded-full px-2 py-0.5 bg-slate-200 text-slate-700">{metricKeys.length} metrics</span>
                    </div>
                    <div className="text-xs text-slate-600 mb-3">{info?.description || ""}</div>
                    <div className="grid md:grid-cols-2 xl:grid-cols-3 gap-3">
                      {metricKeys.map((metricKey) => {
                        const metric = metrics?.[metricKey] || {};
                        return (
                          <div key={metricKey} className="rounded-xl border border-slate-200 bg-white p-3">
                            <div className="text-sm font-semibold text-slate-800">{metric.name || metricKey}</div>
                            <div className="text-[11px] text-slate-500 mt-1">{metric.description || ""}</div>
                            <div className="mt-2 text-[11px] text-slate-700">
                              <span className="font-semibold">Threshold:</span> {String(metric.threshold ?? "N/A")}
                            </div>
                            <div className="text-[11px] text-slate-700">
                              <span className="font-semibold">Current:</span> {formatRuntimeMetric(metricKey)}
                            </div>
                            <div className="text-[11px] text-slate-700">
                              <span className="font-semibold">Pass:</span> {metric.pass_criteria || "N/A"}
                            </div>
                            <div className="text-[11px] text-slate-500 mt-1">
                              {metric.feature || ""}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </section>
      );
    }

    function App() {
      const banditSeriesKeys = ["llm", "rule", "rule_structured", "defect_topic", "defect_evidence", "defect_structure"];
      const [topic, setTopic] = useState("");
      const [background, setBackground] = useState("Research student in AI systems");
      const [extra, setExtra] = useState("");
      const [chapterCount, setChapterCount] = useState(2);
      const [subCount, setSubCount] = useState(2);
      const [running, setRunning] = useState(false);
      const [statusText, setStatusText] = useState("Ready");
      const [activeNode, setActiveNode] = useState("outliner");
      const [progress, setProgress] = useState({ current: 0, total: 0, percent: 0 });
      const completedSubsectionsRef = useRef(new Set()); // 追踪真正完成的小节（passed/generated 事件）
      const [doc, setDoc] = useState({ title: "", content: "" });
      const [generationStartTime, setGenerationStartTime] = useState(null);
      const [generationElapsedSec, setGenerationElapsedSec] = useState(0);
      const [totalGenerations, setTotalGenerations] = useState(() => {
        const saved = Number(localStorage.getItem("flowernet_total_generations") || "132");
        return Number.isFinite(saved) ? saved : 132;
      });
      const [subsections, setSubsections] = useState([]);
      const [metrics, setMetrics] = useState({
        topic_alignment: 0,
        coverage_completeness: 0,
        logical_coherence: 0,
        evidence_grounding: 0,
        novelty: 0,
        structure_clarity: 0,
        quality_score: 0
      });
      const [verifierDetail, setVerifierDetail] = useState(() => createEmptyVerifierDetail());
      const [qualitySummary, setQualitySummary] = useState({
        quality_score_avg: 0,
        quality_score_count: 0,
        unieval_available_subsections: 0,
        unieval_fallback_subsections: 0,
      });
      const [banditSeries, setBanditSeries] = useState({ llm: [], rule: [], rule_structured: [], defect_topic: [], defect_evidence: [], defect_structure: [] });
      const [banditSummary, setBanditSummary] = useState({
        bandit_selected_arm_counts: {},
        bandit_reward_avg: 0,
        bandit_last_selected_arm: "",
        bandit_last_selection_mode: "",
        bandit_event_count: 0,
        bandit_plot_y_min: 0.0,
        bandit_plot_y_max: 0.1,
      });
      const [metricsCatalogSummary, setMetricsCatalogSummary] = useState(null);
      const [metricsCatalogAll, setMetricsCatalogAll] = useState({});
      const [metricsCatalogLoading, setMetricsCatalogLoading] = useState(true);
      const [metricsCatalogError, setMetricsCatalogError] = useState("");
      const sseRef = useRef(null);
      const streamEndedRef = useRef(false);
      const documentIdRef = useRef("");

      useEffect(() => {
        localStorage.setItem("flowernet_total_generations", String(totalGenerations));
      }, [totalGenerations]);

      useEffect(() => {
        const timer = setInterval(() => {
          if (generationStartTime && running) {
            setGenerationElapsedSec(Math.floor((Date.now() - generationStartTime) / 1000));
          }
        }, 1000);
        return () => clearInterval(timer);
      }, [generationStartTime, running]);

      useEffect(() => {
        let cancelled = false;
        const loadMetricsCatalog = async () => {
          setMetricsCatalogLoading(true);
          setMetricsCatalogError("");
          try {
            const [summaryResp, allResp] = await Promise.all([
              fetch("/api/metrics/dashboard-summary"),
              fetch("/api/metrics/all"),
            ]);
            if (!summaryResp.ok || !allResp.ok) {
              throw new Error(`HTTP ${summaryResp.status}/${allResp.status}`);
            }
            const summaryJson = await summaryResp.json();
            const allJson = await allResp.json();
            if (!cancelled) {
              setMetricsCatalogSummary(summaryJson?.summary || null);
              setMetricsCatalogAll(allJson?.metrics || {});
            }
          } catch (err) {
            if (!cancelled) {
              setMetricsCatalogError(String(err?.message || err || "unknown error"));
            }
          } finally {
            if (!cancelled) {
              setMetricsCatalogLoading(false);
            }
          }
        };
        loadMetricsCatalog();
        return () => {
          cancelled = true;
        };
      }, []);

      const generationTimeText = useMemo(() => {
        const h = Math.floor(generationElapsedSec / 3600);
        const m = Math.floor((generationElapsedSec % 3600) / 60);
        const s = generationElapsedSec % 60;
        return `${h}h ${m}m ${s}s`;
      }, [generationElapsedSec]);

      const badges = ["Deployed on Render", "UniEval Connected", "Adaptive Timeout Active"];

      const closeSse = () => {
        if (sseRef.current) {
          sseRef.current.close();
          sseRef.current = null;
        }
      };

      const parseStage = (stage) => {
        if (stage.includes("outline")) return "outliner";
        if (stage.includes("generator") || stage.includes("subsection_start")) return "generator";
        if (stage.includes("verifier")) return "verifier";
        if (stage.includes("controller")) return "controller";
        return "outliner";
      };

      const stageToLabel = (stage) => {
        if (stage === "subsection_start" || stage === "generator_start") return "Drafting";
        if (stage === "verifier_start") return "Evaluating via UniEval";
        if (stage === "verifier_failed" || stage === "controller_start") return "Repairing";
        if (stage === "subsection_passed" || stage === "verifier_passed") return "Passed";
        if (stage === "subsection_failed" || stage === "subsection_forced_pass") return "Failed";
        return "Waiting";
      };

      const handleStart = () => {
        if (!topic.trim()) {
          setStatusText("Please enter a topic first.");
          return;
        }
        closeSse();
        streamEndedRef.current = false;
        documentIdRef.current = "";
        setRunning(true);
        setGenerationStartTime(Date.now());
        setGenerationElapsedSec(0);
        setStatusText("Starting generation flow...");
        setActiveNode("outliner");
        completedSubsectionsRef.current = new Set();
        const total = Math.max(1, Number(chapterCount) * Number(subCount));
        setProgress({ current: 0, total, percent: 0 });
        setSubsections([]);
        setDoc({ title: "", content: "" });
        setMetrics({ topic_alignment: 0, coverage_completeness: 0, logical_coherence: 0, evidence_grounding: 0, novelty: 0, structure_clarity: 0, quality_score: 0 });
        setVerifierDetail(createEmptyVerifierDetail());
        setQualitySummary({ quality_score_avg: 0, quality_score_count: 0, unieval_available_subsections: 0, unieval_fallback_subsections: 0 });
        setBanditSeries({ llm: [], rule: [], rule_structured: [], defect_topic: [], defect_evidence: [], defect_structure: [] });
        setBanditSummary({ bandit_selected_arm_counts: {}, bandit_reward_avg: 0, bandit_last_selected_arm: "", bandit_last_selection_mode: "", bandit_event_count: 0 });

        const params = new URLSearchParams({
          topic,
          chapter_count: String(chapterCount),
          subsection_count: String(subCount),
          user_background: background,
          extra_requirements: extra
        });

        const source = new EventSource(`/api/generate-stream?${params.toString()}`);
        sseRef.current = source;

        source.addEventListener("message", (evt) => {
          let data;
          try {
            data = JSON.parse(evt.data);
          } catch {
            return;
          }

          if (data.type === "detail") {
            const stage = data.stage || "";
            const meta = data.metadata || {};
            if (stage === "outline_document_ready" && meta.document_id) {
              documentIdRef.current = String(meta.document_id);
            }
            setActiveNode(parseStage(stage));
            const section = meta.section_title || meta.section_id || "Section";
            const sub = meta.subsection_title || meta.subsection_id || "Subsection";
            const key = `${section}-${sub}`;
            const stageLabel = stageToLabel(stage);

            setSubsections((prev) => {
              const next = [...prev];
              const idx = next.findIndex((x) => x.key === key);
              const stepMap = { "Drafting": 34, "Evaluating via UniEval": 62, "Repairing": 81, "Passed": 100, "Failed": 100, "Waiting": 0 };
              if (idx === -1) {
                next.push({ key, name: `${section} / ${sub}`, stage: stageLabel, progress: stepMap[stageLabel] || 0 });
              } else {
                next[idx] = {
                  ...next[idx],
                  stage: stageLabel,
                  progress: Math.max(next[idx].progress, stepMap[stageLabel] || 0)
                };
              }
              return next.sort((a, b) => a.name.localeCompare(b.name));
            });

            if (stage === "verifier_result") {
              const q = meta.quality_dimensions || {};
              setMetrics({
                topic_alignment: Number(q.topic_alignment ?? 0),
                coverage_completeness: Number(q.coverage_completeness ?? 0),
                logical_coherence: Number(q.logical_coherence ?? 0),
                evidence_grounding: Number(q.evidence_grounding ?? 0),
                novelty: Number(q.novelty ?? 0),
                structure_clarity: Number(q.structure_clarity ?? 0),
                quality_score: Number(meta.quality_score ?? 0),
              });
              setVerifierDetail({
                is_passed: Boolean(meta.is_passed),
                relevancy_index: Number(meta.relevancy_index ?? 0),
                redundancy_index: Number(meta.redundancy_index ?? 0),
                rel_threshold: Number(meta.rel_threshold ?? 0),
                red_threshold: Number(meta.red_threshold ?? 0),
                quality_score: Number(meta.quality_score ?? 0),
                quality_score_threshold: Number(meta.quality_score_threshold ?? 0),
                quality_score_passed: Boolean(meta.quality_score_passed),
                quality_dimensions: q,
                quality_dimensions_check: meta.quality_dimensions_check || {},
                quality_dimensions_failed: meta.quality_dimensions_failed || [],
                quality_dimensions_passed: Boolean(meta.quality_dimensions_passed),
                dimension_thresholds: meta.dimension_thresholds || {},
                source_check: meta.source_check || { passed: Boolean(meta.source_check_passed), reference_count: Number(meta.source_reference_count || 0) },
                source_check_passed: Boolean(meta.source_check_passed),
                source_reference_count: Number(meta.source_reference_count ?? 0),
              });
            }

            if (stage === "controller_result") {
              const arm = String(meta.selected_arm || "");
              const reward = Math.max(0, Math.min(1, Number(meta.reward ?? 0)));
              const selectionMode = String(meta.selection_mode || "");
              console.log(`🎯 [Frontend Handler] controller_result: arm="${arm}", reward=${reward}, mode="${selectionMode}", meta=`, meta);
              setBanditSummary((prev) => ({
                ...prev,
                bandit_last_selected_arm: arm || prev.bandit_last_selected_arm,
                bandit_last_selection_mode: selectionMode || prev.bandit_last_selection_mode,
                bandit_selected_arm_counts: {
                  ...(prev.bandit_selected_arm_counts || {}),
                  ...(arm ? { [arm]: Number(prev?.bandit_selected_arm_counts?.[arm] || 0) + 1 } : {}),
                },
                bandit_event_count: Number(prev.bandit_event_count || 0) + (arm ? 1 : 0),
                bandit_reward_avg: (() => {
                  const prevN = Number(prev.bandit_event_count || 0);
                  const nextN = prevN + (arm ? 1 : 0);
                  if (nextN <= 0) return Number(prev.bandit_reward_avg || 0);
                  return ((Number(prev.bandit_reward_avg || 0) * prevN) + (arm ? reward : 0)) / nextN;
                })(),
                bandit_plot_y_min: Number(meta.plot_y_min ?? prev.bandit_plot_y_min ?? 0.0),
                bandit_plot_y_max: Number(meta.plot_y_max ?? prev.bandit_plot_y_max ?? 0.1),
              }));
              if (arm) {
                setBanditSeries((s) => {
                  const next = {
                    llm: [...(s.llm || [])],
                    rule: [...(s.rule || [])],
                    rule_structured: [...(s.rule_structured || [])],
                    defect_topic: [...(s.defect_topic || [])],
                    defect_evidence: [...(s.defect_evidence || [])],
                    defect_structure: [...(s.defect_structure || [])],
                  };
                  for (const k of banditSeriesKeys) {
                    const arr = next[k];
                    const last = arr.length ? arr[arr.length - 1] : 0;
                    if (k === arm) {
                      arr.push(reward);
                    } else {
                      arr.push(last);
                    }
                  }
                  next.llm = next.llm.slice(-24);
                  next.rule = next.rule.slice(-24);
                  next.rule_structured = next.rule_structured.slice(-24);
                  next.defect_topic = next.defect_topic.slice(-24);
                  next.defect_evidence = next.defect_evidence.slice(-24);
                  next.defect_structure = next.defect_structure.slice(-24);
                  console.log(`🎯 [Updated Bandit Series]`, next);
                  return next;
                });
              } else {
                console.log(`⚠️ [Empty Arm] Skipping bandit update - arm is empty, reward=${reward}`);
              }
            }

            // 只在最终完成事件时计入进度，避免把 verifier/controller 中间事件也算进去
            const subsectionKey = `${data.metadata?.section_id}:${data.metadata?.subsection_id}`;
            const isFinalSubsectionStage = stage === "subsection_passed" || stage === "subsection_forced_pass" || stage === "subsection_failed";
            if (subsectionKey && isFinalSubsectionStage) {
              if (!completedSubsectionsRef.current.has(subsectionKey)) {
                completedSubsectionsRef.current.add(subsectionKey);
                setProgress((p) => {
                  const cur = Math.min(p.total || 0, completedSubsectionsRef.current.size);
                  const pct = p.total > 0 ? Math.min(100, Math.round((cur / p.total) * 100)) : 0;
                  return { ...p, current: cur, percent: pct };
                });
              }
            }

            // 不再使用随机曲线，Verifier 面板仅展示当前小节的真实 verifier_result 快照。
          }

          if (data.type === "progress") {
            const msg = String(data.message || "");
            // 注意：只更新状态文本，不要从消息中解析百分比
            // 因为消息中的百分比可能是基于 history 中的项目数，不一定准确
            // 真正的进度应该基于实际收到的 subsection_passed/generated 事件数量
            setStatusText(msg || "Generating...");
          }

          if (data.type === "start") {
            const startMeta = data.metadata || {};
            if (startMeta.document_id) {
              documentIdRef.current = String(startMeta.document_id);
            }
            setStatusText(String(data.message || "Starting generation flow..."));
          }

          if (data.type === "heartbeat") {
            setStatusText(String(data.message || "Still generating..."));
          }

          if (data.type === "warning") {
            setStatusText(String(data.message || "Generation warning"));
          }

          if (data.type === "complete") {
            streamEndedRef.current = true;
            const result = data.result || {};
            const stats = result.stats || {};
            const dims = stats.quality_dimension_avgs || {};
            
            // 不要立即设为 100%，而是基于实际完成的小节数
            const expected = Math.max(1, Number(stats.expected_subsections || progress.total || 0));
            const actualCompleted = completedSubsectionsRef.current.size;
            const finalCurrent = Math.min(expected, Math.max(actualCompleted, Number(stats.passed_subsections || 0)));
            const finalPercent = expected > 0 ? Math.min(100, Math.round((finalCurrent / expected) * 100)) : 100;
            
            setQualitySummary({
              quality_score_avg: Number(stats.quality_score_avg || 0),
              quality_score_count: Number(stats.quality_score_count || 0),
              unieval_available_subsections: Number(stats.unieval_available_subsections || 0),
              unieval_fallback_subsections: Number(stats.unieval_fallback_subsections || 0),
            });
            setBanditSummary((prev) => ({
              ...prev,
              bandit_selected_arm_counts: stats.bandit_selected_arm_counts || prev.bandit_selected_arm_counts || {},
              bandit_reward_avg: Number(stats.bandit_reward_avg || prev.bandit_reward_avg || 0),
              bandit_last_selected_arm: String(stats.bandit_last_selected_arm || prev.bandit_last_selected_arm || ""),
              bandit_last_selection_mode: String(stats.bandit_last_selection_mode || prev.bandit_last_selection_mode || ""),
              bandit_event_count: Object.values(stats.bandit_selected_arm_counts || {}).reduce((acc, n) => acc + Number(n || 0), 0) || Number(prev.bandit_event_count || 0),
              bandit_plot_y_min: Number(stats.plot_y_min ?? prev.bandit_plot_y_min ?? 0.0),
              bandit_plot_y_max: Number(stats.plot_y_max ?? prev.bandit_plot_y_max ?? 0.1),
            }));
            setBanditSeries((prev) => {
              const hasRealData = banditSeriesKeys.reduce((sum, k) => sum + ((prev[k]?.length || 0)), 0) > 0;
              if (hasRealData) {
                return prev;
              }
              const reward = Number(stats.bandit_reward_avg || 0);
              const arm = String(stats.bandit_last_selected_arm || "");
              const s = { llm: [], rule: [], rule_structured: [], defect_topic: [], defect_evidence: [], defect_structure: [] };
              if (arm && s[arm]) {
                s[arm].push(reward);
              }
              return s;
            });
            setDoc({ title: result.title || "", content: result.content || "" });
            setProgress({ current: finalCurrent, total: expected, percent: finalPercent });
            setSubsections((prev) => {
              const completed = prev.map((item) => ({
                ...item,
                progress: 100,
                stage: item.stage === "Waiting" ? "Failed" : item.stage,
              }));
              const need = Math.max(0, expected - completed.length);
              for (let i = 0; i < need; i += 1) {
                completed.push({
                  key: `final-${i}`,
                  name: `Section / Subsection ${completed.length + 1}`,
                  stage: "Failed",
                  progress: 100,
                });
              }
              return completed;
            });
            setActiveNode("controller");
            setStatusText("Generation completed successfully.");
            setRunning(false);
            setTotalGenerations((n) => n + 1);
            closeSse();
          }

          if (data.type === "error") {
            streamEndedRef.current = true;
            setStatusText(`Error: ${data.message || "unknown"}`);
            setRunning(false);
            closeSse();
          }
        });

        source.addEventListener("error", async () => {
          if (streamEndedRef.current) {
            return;
          }
          setRunning(false);
          closeSse();

          const docId = documentIdRef.current;
          if (docId) {
            try {
              const resp = await fetch(`/api/recover-document?document_id=${encodeURIComponent(docId)}`);
              if (resp.ok) {
                const recovered = await resp.json();
                if (recovered && recovered.success) {
                  const stats = recovered.stats || {};
                  const expected = Math.max(1, Number(stats.expected_subsections || progress.total || 0));
                  const passed = Math.min(expected, Number(stats.passed_subsections || 0));
                  setDoc({ title: recovered.title || "", content: recovered.content || "" });
                  setProgress({
                    current: passed,
                    total: expected,
                    percent: expected > 0 ? Math.min(100, Math.round((passed / expected) * 100)) : 0
                  });
                  setStatusText(`Stream disconnected, recovered ${passed}/${expected || passed} subsections.`);
                  return;
                }
              }
            } catch {
              // fall through to generic status text
            }
          }

          setStatusText("Stream disconnected before completion. Possible service restart or upstream timeout.");
        });
      };

      const downloadDocument = async (format) => {
        if (!doc.title || !doc.content) {
          return;
        }
        const isPdf = format === "pdf";
        setStatusText(isPdf ? "Preparing PDF download..." : "Preparing DOCX download...");
        try {
          const resp = await fetch(isPdf ? "/api/download-pdf" : "/api/download-docx", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: doc.title, content: doc.content })
          });
          if (!resp.ok) {
            throw new Error(await resp.text());
          }
          const blob = await resp.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `${doc.title}.${isPdf ? "pdf" : "docx"}`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
          setStatusText(isPdf ? "PDF downloaded." : "DOCX downloaded.");
        } catch (err) {
          setStatusText(`Download failed: ${err.message}`);
        }
      };

      const handleDownload = () => downloadDocument("docx");
      const handleDownloadPdf = () => downloadDocument("pdf");

      useEffect(() => () => closeSse(), []);

      const qualityMean = (metrics.topic_alignment + metrics.coverage_completeness + metrics.logical_coherence + metrics.evidence_grounding + metrics.novelty + metrics.structure_clarity) / 6;
      const normalizedStatusText = running
        ? `进度: ${progress.current}/${progress.total || 0} 小节已处理 (${progress.percent}%)`
        : statusText;

      return (
        <div className="min-h-screen relative">
          <div className="hero-blob w-80 h-80 bg-[#ffd79b] top-[-8rem] left-[-3rem]"></div>
          <div className="hero-blob w-96 h-96 bg-[#f3a581] top-40 right-[-6rem]"></div>
          <div className="hero-blob w-72 h-72 bg-[#ef7c62] bottom-[-7rem] left-1/3"></div>

          <div className="relative z-10 p-4 md:p-6 lg:p-8 max-w-[1520px] mx-auto">
            <div className="grid lg:grid-cols-[260px_minmax(0,1fr)] gap-4 md:gap-6">
              <aside className="rounded-xl3 bg-slatepanel text-slate-100 p-4 md:p-5 shadow-darkcard border border-slate-700/80 h-fit">
                <div className="font-display text-xl mb-5">FlowerNet</div>
                <div className="space-y-2 text-sm">
                  <div className="bg-slate-800/80 rounded-xl p-3">Dashboard Core</div>
                  <div className="bg-slate-800/60 rounded-xl p-3">Generation Lab</div>
                  <div className="bg-slate-800/60 rounded-xl p-3">Quality Board</div>
                  <div className="bg-slate-800/60 rounded-xl p-3">Bandit Analytics</div>
                </div>
                <div className="mt-6 text-xs text-slate-300 leading-5">
                  Enterprise-grade AI research console for high-quality long-document generation.
                </div>
              </aside>

              <main className="space-y-5 md:space-y-6">
                <motion.section initial={{ opacity: 0, y: 16 }} animate={{ opacity: 1, y: 0 }} className="rounded-xl3 bg-white/55 backdrop-blur-lg border border-white/70 p-5 md:p-6 shadow-glass">
                  <div className="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
                    <div>
                      <h1 className="font-display text-2xl md:text-4xl text-slate-900">FlowerNet Agent: High-Quality Long Document Generation</h1>
                      <p className="mt-2 text-sm md:text-base text-slate-700 max-w-3xl">稳定地产出结构正确、主题对齐、低重复、可验证、可追踪、可恢复的长文档。</p>
                    </div>
                    <div className="flex flex-wrap gap-2">
                      {badges.map((b) => <span key={b} className="text-xs font-semibold rounded-full px-3 py-1 bg-white border border-slate-200">{b}</span>)}
                    </div>
                  </div>
                  <div className="grid sm:grid-cols-3 gap-3 mt-5">
                    <div className="rounded-2xl bg-white border border-slate-200 p-3">
                      <div className="text-xs text-slate-500">Total Generations</div>
                      <div className="text-2xl font-display text-slate-900"><CountUp value={totalGenerations} /></div>
                    </div>
                    <div className="rounded-2xl bg-white border border-slate-200 p-3">
                      <div className="text-xs text-slate-500">Generation Duration</div>
                      <div className="text-2xl font-display text-slate-900">{running ? generationTimeText : (generationElapsedSec > 0 ? generationTimeText : "待开始")}</div>
                    </div>
                    <div className="rounded-2xl bg-white border border-slate-200 p-3">
                      <div className="text-xs text-slate-500">Global Quality Index</div>
                      <div className="text-2xl font-display text-slate-900"><CountUp value={qualityMean} digits={3} /></div>
                    </div>
                  </div>
                </motion.section>

                <section className="grid xl:grid-cols-12 gap-4 md:gap-6">
                  <div className="xl:col-span-8 flex flex-col gap-4 md:gap-6">
                    <FlowWidget activeNode={activeNode} />
                    <MethodologyPanel />
                  </div>
                  <div className="xl:col-span-4 rounded-xl3 bg-white p-5 border border-slate-200 shadow-neumorph">
                    <h3 className="font-display text-lg mb-4">Run Generation</h3>
                      <div className="space-y-3">
                      <input className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm" value={topic} onChange={(e) => setTopic(e.target.value)} placeholder="Document topic" />
                      <input className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm" value={background} onChange={(e) => setBackground(e.target.value)} placeholder="User background" />
                      <textarea className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm h-24" value={extra} onChange={(e) => setExtra(e.target.value)} placeholder="Extra requirements" />
                      <div className="grid grid-cols-2 gap-2">
                        <input type="number" min="1" max="10" className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm" value={chapterCount} onChange={(e) => setChapterCount(Number(e.target.value))} />
                        <input type="number" min="1" max="8" className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm" value={subCount} onChange={(e) => setSubCount(Number(e.target.value))} />
                      </div>
                      <div className="h-2 rounded-full bg-slate-200 overflow-hidden">
                        <motion.div animate={{ width: `${progress.percent}%` }} className="h-full bg-gradient-to-r from-coral to-peach" />
                      </div>
                      <div className="text-xs text-slate-600">{progress.current}/{progress.total || 0} subsections · {progress.percent}%</div>
                      <div className="flex gap-2">
                        <button onClick={handleStart} disabled={running} className="flex-1 rounded-xl bg-slate-900 text-white text-sm font-semibold py-2 disabled:opacity-50">{running ? "Running..." : "Start"}</button>
                        <button onClick={handleDownload} disabled={!doc.content} className="flex-1 rounded-xl bg-emerald-600 text-white text-sm font-semibold py-2 disabled:opacity-50">Download DOCX</button>
                        <button onClick={handleDownloadPdf} disabled={!doc.content} className="flex-1 rounded-xl bg-cyan-700 text-white text-sm font-semibold py-2 disabled:opacity-50">Download PDF</button>
                      </div>
                      <div className="text-xs rounded-xl px-3 py-2 bg-slate-100 text-slate-700">{normalizedStatusText}</div>
                    </div>
                  </div>
                </section>

                <section className="grid xl:grid-cols-12 gap-4 md:gap-6">
                  <div className="xl:col-span-5"><SubsectionTracker items={subsections} /></div>
                  <div className="xl:col-span-7"><RadarMetrics metrics={metrics} summary={qualitySummary} verifierDetail={verifierDetail} /></div>
                </section>

                <FullMetricsBoard
                  loading={metricsCatalogLoading}
                  error={metricsCatalogError}
                  summary={metricsCatalogSummary}
                  metrics={metricsCatalogAll}
                  currentMetrics={metrics}
                  verifierDetail={verifierDetail}
                />

                <section>
                  <BanditChart data={banditSeries} summary={banditSummary} />
                </section>
              </main>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script>
    (function(){
      if (window.__FLOWERNET_FALLBACK_DONE) return; window.__FLOWERNET_FALLBACK_DONE = true;
      function showFallback(msg){
        try{
          var root = document.getElementById('root');
          if(root){
            root.innerHTML = '<div style="padding:40px;font-family:Plus Jakarta Sans, sans-serif;color:#334155">Front-end failed to initialize.<br/>' + (msg?('<small style="color:#7b8794">'+msg+'</small>'):'') + '</div>';
          }
          console.error('[WebFallback]', msg);
        }catch(e){ console.error(e); }
      }
      setTimeout(function(){
        if(typeof React === 'undefined' || typeof ReactDOM === 'undefined'){
          showFallback('Missing React or ReactDOM. Check network / DevTools for failed script loads.');
          return;
        }
        setTimeout(function(){
          var root = document.getElementById('root');
          if(root && root.children.length === 0){
            showFallback('No UI rendered — possible runtime error. Open DevTools Console for details.');
          }
        }, 1200);
      }, 1200);
    })();
  </script>
</body>
</html>
