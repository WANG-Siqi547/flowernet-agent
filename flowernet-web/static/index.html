<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowerNet 文档生成器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif;
      background: radial-gradient(1200px 600px at 15% -10%, #1f3b8f22 0%, transparent 60%), #f4f7fb;
      min-height: 100vh;
      padding: 28px;
      color: #111827;
    }
    
    .container {
      max-width: 1080px;
      margin: 0 auto;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 24px;
      color: #0f172a;
      gap: 12px;
    }
    
    .header h1 {
      font-size: 34px;
      font-weight: 750;
      margin-bottom: 4px;
      letter-spacing: -0.4px;
    }
    
    .header p {
      font-size: 14px;
      color: #475569;
      font-weight: 500;
      max-width: 520px;
    }

    .badge {
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    
    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 32px;
      box-shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
      margin-bottom: 18px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.65px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    
    @media (max-width: 768px) {
      .form-row { grid-template-columns: 1fr; }
    }
    
    input, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 9px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s ease;
      background: #f8fafc;
      color: #0f172a;
    }
    
    input:focus, textarea:focus {
      outline: none;
      border-color: #1d4ed8;
      background: white;
      box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.14);
    }
    
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    
    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 28px;
    }

    .estimate-box {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      background: linear-gradient(135deg, #eff6ff 0%, #f8fafc 100%);
      border: 1px solid #c7d2fe;
      color: #1e3a8a;
      font-size: 13px;
      line-height: 1.6;
    }

    .progress-wrap {
      margin-top: 14px;
    }

    .progress-topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #475569;
      font-weight: 600;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #cbd5e1;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #1d4ed8 0%, #0ea5e9 55%, #14b8a6 100%);
      transition: width 0.35s ease;
    }

    .progress-note {
      margin-top: 8px;
      font-size: 12px;
      color: #64748b;
      line-height: 1.5;
    }
    
    button {
      padding: 14px 24px;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.12);
    }
    
    #startBtn {
      background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
      color: white;
    }
    
    #startBtn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(30, 64, 175, 0.3);
    }
    
    #startBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    #downloadBtn {
      background: linear-gradient(135deg, #0f766e 0%, #0e7490 100%);
      color: white;
    }
    
    #downloadBtn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(15, 118, 110, 0.28);
    }
    
    #downloadBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .status {
      margin-top: 16px;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      min-height: 42px;
      display: flex;
      align-items: center;
    }
    
    .status.ok {
      background: #ecfdf5;
      color: #047857;
      border-left: 4px solid #10b981;
    }
    
    .status.err {
      background: #fef2f2;
      color: #b91c1c;
      border-left: 4px solid #ef4444;
    }
    
    .meta {
      font-size: 12px;
      color: #475569;
      margin-bottom: 16px;
      padding: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      line-height: 1.6;
      word-break: break-all;
    }
    
    pre {
      background: #0b1220;
      color: #dbe7ff;
      padding: 20px;
      border-radius: 12px;
      max-height: 600px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      scrollbar-width: thin;
      scrollbar-color: #2563eb #1e293b;
      border: 1px solid #1e293b;
    }
    
    pre::-webkit-scrollbar {
      width: 8px;
    }
    
    pre::-webkit-scrollbar-track {
      background: #1e293b;
    }
    
    pre::-webkit-scrollbar-thumb {
      background: #2563eb;
      border-radius: 4px;
    }
    
    .result-label {
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }
    
    h2 {
      color: #0f172a;
      margin-bottom: 24px;
      font-size: 24px;
      font-weight: 750;
      letter-spacing: -0.2px;
    }

    @media (max-width: 768px) {
      body { padding: 16px; }
      .header { flex-direction: column; align-items: flex-start; }
      .header h1 { font-size: 28px; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>FlowerNet</h1>
        <p>文档生成工作台 · 稳定、可追踪、面向长文档场景</p>
      </div>
      <div class="badge">Production Ready UI</div>
    </div>

    <div class="card">
      <h2>生成参数</h2>
      
      <div class="form-row">
        <div class="form-group">
          <label for="topic">文档主题 *</label>
          <input id="topic" placeholder="例如：当下青年的精神寄托与宗教意识形态影响" />
        </div>
        <div class="form-group">
          <label for="chapterCount">章节数</label>
          <input id="chapterCount" type="number" min="1" max="10" value="3" />
        </div>
        <div class="form-group">
          <label for="subCount">每章小节数</label>
          <input id="subCount" type="number" min="1" max="8" value="3" />
        </div>
      </div>

      <div class="form-group">
        <label for="background">用户背景</label>
        <textarea id="background" placeholder="例如：我是研究生，具有哲学、宗教学背景，希望了解当代青年群体的精神需求">普通读者</textarea>
      </div>

      <div class="form-group">
        <label for="extra">附加要求（可选）</label>
        <textarea id="extra" placeholder="例如：提供案例分析、对比不同宗教观点、结合实际数据、8000-12000字"></textarea>
      </div>

      <div class="button-group">
        <button id="startBtn">开始生成</button>
        <button id="downloadBtn" disabled>下载 DOCX</button>
      </div>

      <div id="estimateBox" class="estimate-box">预估时长会在点击“开始生成”后显示。</div>

      <div class="progress-wrap">
        <div class="progress-topline">
          <span id="progressLabel">进度：0%</span>
          <span id="progressHint">等待开始</span>
        </div>
        <div class="progress-bar" aria-label="生成进度条">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <div id="progressNote" class="progress-note">当前尚未开始生成。</div>
      </div>

      <div id="status" class="status"></div>
    </div>

    <div class="card">
      <div class="result-label">生成结果</div>
      <div id="meta" class="meta"></div>
      <pre id="result">生成结果会显示在这里...</pre>
    </div>
  </div>

  <script>
    const startBtn = document.getElementById('startBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const metaEl = document.getElementById('meta');
    const estimateBoxEl = document.getElementById('estimateBox');
    const progressFillEl = document.getElementById('progressFill');
    const progressLabelEl = document.getElementById('progressLabel');
    const progressHintEl = document.getElementById('progressHint');
    const progressNoteEl = document.getElementById('progressNote');

    let currentTitle = '';
    let currentContent = '';
    let eventSource = null;
    let seenSubsectionEvents = new Set();
    let completedSubsections = new Set();
    let expectedSubsections = 0;
    let generationStartAt = 0;
    let estimateMinSeconds = 0;
    let estimateMaxSeconds = 0;

    function formatDuration(seconds) {
      const total = Math.max(0, Math.round(seconds));
      const minutes = Math.floor(total / 60);
      const remaining = total % 60;
      if (minutes <= 0) {
        return `${remaining} 秒`;
      }
      if (remaining === 0) {
        return `${minutes} 分钟`;
      }
      return `${minutes} 分 ${remaining} 秒`;
    }

    function estimateDuration(chapters, subsections) {
      const total = Math.max(1, chapters * subsections);
      const minSeconds = Math.max(45, (total * 50) + (chapters * 20));
      const maxSeconds = Math.max(minSeconds + 45, (total * 120) + (chapters * 40));
      return {
        minSeconds,
        maxSeconds,
        text: `当前配置约需 ${formatDuration(minSeconds)} ~ ${formatDuration(maxSeconds)}。实际耗时会受主题复杂度、网络和模型重试影响。`,
      };
    }

    function resetProgress() {
      completedSubsections = new Set();
      expectedSubsections = 0;
      setProgress(0, 0, '等待开始', '当前尚未开始生成。');
    }

    function setEstimateText(text) {
      estimateBoxEl.textContent = text;
    }

    function setProgress(current, total, hint, note) {
      const safeTotal = Math.max(0, Number(total) || 0);
      const safeCurrent = Math.max(0, Number(current) || 0);
      const percent = safeTotal > 0 ? Math.min(100, Math.round((safeCurrent / safeTotal) * 100)) : 0;
      progressFillEl.style.width = `${percent}%`;
      progressLabelEl.textContent = `进度：${percent}% (${safeCurrent}/${safeTotal || 0})`;
      progressHintEl.textContent = hint || '进行中';
      progressNoteEl.textContent = note || '';
    }

    function computeRemainingText() {
      if (!generationStartAt || (!estimateMinSeconds && !estimateMaxSeconds)) {
        return '';
      }
      const elapsed = Math.max(0, Math.floor((Date.now() - generationStartAt) / 1000));
      const remainMin = Math.max(0, estimateMinSeconds - elapsed);
      const remainMax = Math.max(0, estimateMaxSeconds - elapsed);
      return `预计剩余 ${formatDuration(remainMin)} ~ ${formatDuration(remainMax)}`;
    }

    function parseProgressMessage(message) {
      const match = String(message || '').match(/(\d+)\/(\d+)\s*小节已完成\s*\((\d+)%\)/);
      if (!match) return null;
      return {
        current: Number(match[1]),
        total: Number(match[2]),
        percent: Number(match[3]),
      };
    }

    function completionKey(data) {
      const meta = data.metadata || {};
      const sectionId = meta.section_id || '';
      const subsectionId = meta.subsection_id || '';
      const order = meta.subsection_order || '';
      return `${sectionId}::${subsectionId}::${order}`;
    }

    function handleCompletedSubsection(data, fallbackTotal) {
      const key = completionKey(data);
      if (!completedSubsections.has(key)) {
        completedSubsections.add(key);
      }
      const total = expectedSubsections || Number(fallbackTotal) || 0;
      return {
        current: completedSubsections.size,
        total,
      };
    }

    function stripEmojis(text) {
      if (!text) return '';
      return text
        .replace(/[\u{1F300}-\u{1FAFF}]/gu, '')
        .replace(/[\u{2600}-\u{27BF}]/gu, '')
        .replace(/[\u{FE00}-\u{FE0F}]/gu, '')
        .replace(/[\u{1F1E6}-\u{1F1FF}]/gu, '')
        .replace(/\s{2,}/g, ' ')
        .trim();
    }

    function setStatus(text, type = '') {
      statusEl.className = 'status ' + type;
      statusEl.textContent = text;
    }

    function appendLog(text) {
      const cleanText = stripEmojis(text);
      resultEl.textContent += cleanText + '\n';
      resultEl.scrollTop = resultEl.scrollHeight;
    }

    function buildSubsectionEventKey(stage, data) {
      const meta = data.metadata || {};
      const sectionId = meta.section_id || '';
      const subsectionId = meta.subsection_id || '';
      const order = meta.subsection_order || '';
      return `${stage}|${sectionId}|${subsectionId}|${order}|${data.message || ''}`;
    }

    function formatDetailLine(data) {
      const stage = data.stage || '';
      const meta = data.metadata || {};
      const stageLabel = mapStageLabel(stage);
      const order = Number(meta.subsection_order || 0);
      const globalOrder = Number(meta.global_subsection_order || 0);
      const total = Number(meta.section_subsection_total || 0);
      const totalGlobal = Number(meta.global_subsection_total || meta.total_subsections || 0);
      const sectionTitle = (meta.section_title || '').trim();
      const subsectionTitle = (meta.subsection_title || '').trim();
      const synthetic = meta.synthetic === true;
      const orderTextGlobal = globalOrder > 0 && totalGlobal > 0 ? `#${globalOrder}/${totalGlobal}` : '';

      if (stage === 'subsection_start' || stage === 'subsection_passed') {
        const key = buildSubsectionEventKey(stage, data);
        if (seenSubsectionEvents.has(key)) {
          return null;
        }
        seenSubsectionEvents.add(key);

        const orderText = order > 0 && total > 0 ? `#${order}/${total}` : '#?';
        const titleText = sectionTitle && subsectionTitle
          ? `${sectionTitle} > ${subsectionTitle}`
          : (data.message || '').trim();
        const sourceText = synthetic ? ' · 保底日志' : '';
        return `[${stageLabel}] ${orderText} ${titleText}${sourceText}`;
      }

      if (stage === 'subsection_outline_ready') {
        const key = buildSubsectionEventKey(stage, data);
        if (seenSubsectionEvents.has(key)) {
          return null;
        }
        seenSubsectionEvents.add(key);
        const titleText = sectionTitle && subsectionTitle
          ? `${sectionTitle} > ${subsectionTitle}`
          : (data.message || '').trim();
        const tag = orderTextGlobal || (order > 0 && total > 0 ? `#${order}/${total}` : '#?');
        return `[${stageLabel}] ${tag} ${titleText}`;
      }

      if (stage === 'outline_document_ready' || stage === 'section_outline_ready' || stage === 'subsection_outline_ready') {
        return `[${stageLabel}] ${data.message || ''}`;
      }

      if (stage === 'history_loaded' || stage === 'history_saved') {
        const tag = orderTextGlobal || (order > 0 ? `#${order}` : '');
        const suffix = tag ? ` ${tag}` : '';
        return `[${stageLabel}]${suffix} ${data.message || ''}`.trim();
      }

      if (stage === 'verifier_failed' || stage === 'controller_start' || stage === 'controller_success' || stage === 'controller_error' || stage === 'verifier_passed') {
        const iteration = meta.iteration ? ` · 轮次${meta.iteration}` : '';
        const retry = meta.controller_retry ? ` · 控制器重试${meta.controller_retry}` : '';
        const tag = orderTextGlobal || (order > 0 ? `#${order}` : '');
        return `[${stageLabel}] ${tag} ${(data.message || '').trim()}${iteration}${retry}`.replace(/\s{2,}/g, ' ').trim();
      }

      if (stage === 'generator_start') {
        const iteration = meta.iteration ? ` · 轮次${meta.iteration}` : '';
        const regen = meta.is_regeneration ? ' · 重新生成' : '';
        const tag = orderTextGlobal || (order > 0 ? `#${order}` : '');
        return `[${stageLabel}] ${tag} ${(data.message || '').trim()}${iteration}${regen}`.replace(/\s{2,}/g, ' ').trim();
      }

      return `[${stageLabel}] ${data.message || ''}`;
    }

    function mapStageLabel(stage) {
      const stageMap = {
        document_start: '文档',
        outline_document_ready: '全文大纲',
        section_outline_ready: '章节大纲',
        subsection_outline_ready: '小节大纲',
        subsection_start: '小节开始',
        generator_start: '生成器',
        generator_error: '生成器错误',
        verifier_start: '校验器',
        verifier_passed: '校验通过',
        verifier_failed: '校验未通过',
        verifier_error: '校验异常',
        controller_start: '控制器',
        controller_success: '控制器完成',
        controller_error: '控制器重试',
        history_loaded: '历史加载',
        history_saved: '写入History',
        subsection_passed: '小节完成',
        subsection_failed: '小节失败',
        subsection_exception: '小节异常',
        document_complete: '文档完成'
      };
      return stageMap[stage] || '流程';
    }

    startBtn.addEventListener('click', async () => {
      const topic = document.getElementById('topic').value.trim();
      const chapterCount = Number(document.getElementById('chapterCount').value);
      const subsectionCount = Number(document.getElementById('subCount').value);
      const userBackground = document.getElementById('background').value.trim() || '普通读者';
      const extraRequirements = document.getElementById('extra').value.trim();
      const safeChapterCount = Number.isFinite(chapterCount) && chapterCount > 0 ? chapterCount : 1;
      const safeSubsectionCount = Number.isFinite(subsectionCount) && subsectionCount > 0 ? subsectionCount : 1;

      if (!topic) {
        setStatus('请先输入主题。', 'err');
        return;
      }

      startBtn.disabled = true;
      downloadBtn.disabled = true;
      resetProgress();
      setStatus('正在生成中，请等待（可能需要 1-5 分钟）...');
      resultEl.textContent = '正在连接到生成服务...\n';
      metaEl.textContent = '';
      seenSubsectionEvents = new Set();
      expectedSubsections = Math.max(1, safeChapterCount * safeSubsectionCount);
      generationStartAt = Date.now();

      const estimate = estimateDuration(safeChapterCount, safeSubsectionCount);
      estimateMinSeconds = estimate.minSeconds;
      estimateMaxSeconds = estimate.maxSeconds;
      setEstimateText(`预估时长：${estimate.text}`);
      setProgress(0, expectedSubsections, '已开始', `预计 ${formatDuration(estimate.minSeconds)} ~ ${formatDuration(estimate.maxSeconds)} 完成。`);

      // 构建查询参数
      const params = new URLSearchParams({
        topic,
        chapter_count: safeChapterCount,
        subsection_count: safeSubsectionCount,
        user_background: userBackground,
        extra_requirements: extraRequirements
      });

      try {
        // 使用 EventSource 监听 SSE 流
        eventSource = new EventSource(`/api/generate-stream?${params.toString()}`);

        eventSource.addEventListener('message', (event) => {
          try {
            const data = JSON.parse(event.data);
            
            if (data.type === 'start') {
              appendLog(`[开始] ${data.message}`);
              setProgress(0, expectedSubsections, '开始生成', `${computeRemainingText()}。`);
            } else if (data.type === 'progress') {
              appendLog(`[进度] ${data.message}`);
              const parsed = parseProgressMessage(data.message);
              if (parsed) {
                const total = parsed.total || expectedSubsections;
                setProgress(parsed.current, total, '生成中', `当前已完成 ${parsed.current}/${total} 个小节，${computeRemainingText()}。`);
              }
            } else if (data.type === 'outline') {
              appendLog(`[大纲] ${data.message}`);
              setProgress(0, expectedSubsections, '大纲已完成', `正在进入正文生成阶段，${computeRemainingText()}。`);
            } else if (data.type === 'detail') {
              const stage = data.stage || '';
              if (stage === 'subsection_passed' || stage === 'subsection_forced_pass' || stage === 'subsection_exception' || stage === 'subsection_failed') {
                const snapshot = handleCompletedSubsection(data, expectedSubsections);
                setProgress(snapshot.current, snapshot.total, '正在生成中', `已完成 ${snapshot.current}/${snapshot.total || 0} 个小节，${computeRemainingText()}。`);
              }
              const line = formatDetailLine(data);
              if (line) {
                appendLog(line);
              }
            } else if (data.type === 'complete') {
              const result = data.result;
              currentTitle = result.title;
              currentContent = result.content;
              
              appendLog('\n[完成] 文档生成成功\n');
              appendLog(`\n=== 最终文档 ===\n`);
              appendLog(result.content);
              
              const stats = result.stats;
              const expected = stats.expected_subsections || 0;
              const passed = stats.passed_subsections || 0;
              const failed = stats.failed_subsections || 0;
              const generated = stats.total_generated || (passed + failed);
              const statusStr = expected > 0 ? `${generated}/${expected}` : `${passed}`;
              
              metaEl.textContent = `文档ID: ${result.document_id} | 标题: ${result.title} | 小节: ${statusStr} (通过: ${passed}, 失败: ${failed}) | 迭代: ${stats.total_iterations} | 耗时: ${stats.generation_time}`;
              setProgress(expected, expected, '完成', `已完成 ${expected}/${expected} 个小节。`);
              estimateMinSeconds = 0;
              estimateMaxSeconds = 0;
              generationStartAt = 0;
              setStatus('生成成功，可以下载 DOCX。', 'ok');
              downloadBtn.disabled = false;
              startBtn.disabled = false;
              eventSource.close();
            } else if (data.type === 'error') {
              appendLog(`[错误] ${data.message}`);
              setProgress(completedSubsections.size, expectedSubsections, '生成失败', data.message || '生成失败。');
              estimateMinSeconds = 0;
              estimateMaxSeconds = 0;
              generationStartAt = 0;
              setStatus('生成失败：' + data.message, 'err');
              startBtn.disabled = false;
              eventSource.close();
            }
          } catch (err) {
            console.error('解析消息失败:', err);
          }
        });

        eventSource.addEventListener('error', (event) => {
          setStatus('连接错误，生成可能失败。', 'err');
          appendLog('\n[错误] 连接中断\n');
          setProgress(completedSubsections.size, expectedSubsections, '连接中断', 'SSE 连接中断，可能仍在后台生成。');
          estimateMinSeconds = 0;
          estimateMaxSeconds = 0;
          generationStartAt = 0;
          if (eventSource) {
            eventSource.close();
          }
          startBtn.disabled = false;
        });

      } catch (err) {
        setStatus('启动生成失败：' + err.message, 'err');
        resultEl.textContent = '';
        startBtn.disabled = false;
      }
    });

    downloadBtn.addEventListener('click', async () => {
      if (!currentTitle || !currentContent) return;
      setStatus('正在生成 DOCX 文件...');

      try {
        const resp = await fetch('/api/download-docx', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: currentTitle, content: currentContent })
        });

        if (!resp.ok) {
          const err = await resp.text();
          throw new Error(err);
        }

        const blob = await resp.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${currentTitle}.docx`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
        setStatus('DOCX 下载完成。', 'ok');
      } catch (err) {
        setStatus('下载失败：' + err.message, 'err');
      }
    });
  </script>
</body>
</html>
