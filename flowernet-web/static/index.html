<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowerNet 文档生成器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif;
      background: radial-gradient(1200px 600px at 15% -10%, #1f3b8f22 0%, transparent 60%), #f4f7fb;
      min-height: 100vh;
      padding: 28px;
      color: #111827;
    }
    
    .container {
      max-width: 1080px;
      margin: 0 auto;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 24px;
      color: #0f172a;
      gap: 12px;
    }
    
    .header h1 {
      font-size: 34px;
      font-weight: 750;
      margin-bottom: 4px;
      letter-spacing: -0.4px;
    }
    
    .header p {
      font-size: 14px;
      color: #475569;
      font-weight: 500;
      max-width: 520px;
    }

    .badge {
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    
    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 32px;
      box-shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
      margin-bottom: 18px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.65px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    
    @media (max-width: 768px) {
      .form-row { grid-template-columns: 1fr; }
    }
    
    input, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 9px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s ease;
      background: #f8fafc;
      color: #0f172a;
    }
    
    input:focus, textarea:focus {
      outline: none;
      border-color: #1d4ed8;
      background: white;
      box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.14);
    }
    
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    
    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 28px;
    }
    
    button {
      padding: 14px 24px;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.12);
    }
    
    #startBtn {
      background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
      color: white;
    }
    
    #startBtn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(30, 64, 175, 0.3);
    }
    
    #startBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    #downloadBtn {
      background: linear-gradient(135deg, #0f766e 0%, #0e7490 100%);
      color: white;
    }
    
    #downloadBtn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(15, 118, 110, 0.28);
    }
    
    #downloadBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .status {
      margin-top: 16px;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      min-height: 42px;
      display: flex;
      align-items: center;
    }
    
    .status.ok {
      background: #ecfdf5;
      color: #047857;
      border-left: 4px solid #10b981;
    }
    
    .status.err {
      background: #fef2f2;
      color: #b91c1c;
      border-left: 4px solid #ef4444;
    }
    
    .meta {
      font-size: 12px;
      color: #475569;
      margin-bottom: 16px;
      padding: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      line-height: 1.6;
      word-break: break-all;
    }
    
    pre {
      background: #0b1220;
      color: #dbe7ff;
      padding: 20px;
      border-radius: 12px;
      max-height: 600px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      scrollbar-width: thin;
      scrollbar-color: #2563eb #1e293b;
      border: 1px solid #1e293b;
    }
    
    pre::-webkit-scrollbar {
      width: 8px;
    }
    
    pre::-webkit-scrollbar-track {
      background: #1e293b;
    }
    
    pre::-webkit-scrollbar-thumb {
      background: #2563eb;
      border-radius: 4px;
    }
    
    .result-label {
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }
    
    h2 {
      color: #0f172a;
      margin-bottom: 24px;
      font-size: 24px;
      font-weight: 750;
      letter-spacing: -0.2px;
    }

    @media (max-width: 768px) {
      body { padding: 16px; }
      .header { flex-direction: column; align-items: flex-start; }
      .header h1 { font-size: 28px; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>FlowerNet</h1>
        <p>文档生成工作台 · 稳定、可追踪、面向长文档场景</p>
      </div>
      <div class="badge">Production Ready UI</div>
    </div>

    <div class="card">
      <h2>生成参数</h2>
      
      <div class="form-row">
        <div class="form-group">
          <label for="topic">文档主题 *</label>
          <input id="topic" placeholder="例如：当下青年的精神寄托与宗教意识形态影响" />
        </div>
        <div class="form-group">
          <label for="chapterCount">章节数</label>
          <input id="chapterCount" type="number" min="1" max="10" value="3" />
        </div>
        <div class="form-group">
          <label for="subCount">每章小节数</label>
          <input id="subCount" type="number" min="1" max="8" value="3" />
        </div>
      </div>

      <div class="form-group">
        <label for="background">用户背景</label>
        <textarea id="background" placeholder="例如：我是研究生，具有哲学、宗教学背景，希望了解当代青年群体的精神需求">普通读者</textarea>
      </div>

      <div class="form-group">
        <label for="extra">附加要求（可选）</label>
        <textarea id="extra" placeholder="例如：提供案例分析、对比不同宗教观点、结合实际数据、8000-12000字"></textarea>
      </div>

      <div class="button-group">
        <button id="startBtn">开始生成</button>
        <button id="downloadBtn" disabled>下载 DOCX</button>
      </div>

      <div id="status" class="status"></div>
    </div>

    <div class="card">
      <div class="result-label">生成结果</div>
      <div id="meta" class="meta"></div>
      <pre id="result">生成结果会显示在这里...</pre>
    </div>
  </div>

  <script>
    const startBtn = document.getElementById('startBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const metaEl = document.getElementById('meta');

    let currentTitle = '';
    let currentContent = '';
    let eventSource = null;

    function stripEmojis(text) {
      if (!text) return '';
      return text
        .replace(/[\u{1F300}-\u{1FAFF}]/gu, '')
        .replace(/[\u{2600}-\u{27BF}]/gu, '')
        .replace(/[\u{FE00}-\u{FE0F}]/gu, '')
        .replace(/[\u{1F1E6}-\u{1F1FF}]/gu, '')
        .replace(/\s{2,}/g, ' ')
        .trim();
    }

    function setStatus(text, type = '') {
      statusEl.className = 'status ' + type;
      statusEl.textContent = text;
    }

    function appendLog(text) {
      const cleanText = stripEmojis(text);
      resultEl.textContent += cleanText + '\n';
      resultEl.scrollTop = resultEl.scrollHeight;
    }

    function mapStageLabel(stage) {
      const stageMap = {
        document_start: '文档',
        subsection_start: '小节开始',
        generator_start: '生成器',
        generator_error: '生成器错误',
        verifier_start: '校验器',
        verifier_passed: '校验通过',
        verifier_failed: '校验未通过',
        verifier_error: '校验异常',
        controller_start: '控制器',
        controller_success: '控制器完成',
        controller_error: '控制器重试',
        subsection_passed: '小节完成',
        subsection_failed: '小节失败',
        subsection_exception: '小节异常',
        document_complete: '文档完成'
      };
      return stageMap[stage] || '流程';
    }

    startBtn.addEventListener('click', async () => {
      const topic = document.getElementById('topic').value.trim();
      const chapterCount = Number(document.getElementById('chapterCount').value);
      const subsectionCount = Number(document.getElementById('subCount').value);
      const userBackground = document.getElementById('background').value.trim() || '普通读者';
      const extraRequirements = document.getElementById('extra').value.trim();

      if (!topic) {
        setStatus('请先输入主题。', 'err');
        return;
      }

      startBtn.disabled = true;
      downloadBtn.disabled = true;
      setStatus('正在生成中，请等待（可能需要 1-5 分钟）...');
      resultEl.textContent = '正在连接到生成服务...\n';
      metaEl.textContent = '';

      // 构建查询参数
      const params = new URLSearchParams({
        topic,
        chapter_count: chapterCount,
        subsection_count: subsectionCount,
        user_background: userBackground,
        extra_requirements: extraRequirements
      });

      try {
        // 使用 EventSource 监听 SSE 流
        eventSource = new EventSource(`/api/generate-stream?${params.toString()}`);

        eventSource.addEventListener('message', (event) => {
          try {
            const data = JSON.parse(event.data);
            
            if (data.type === 'start') {
              appendLog(`[开始] ${data.message}`);
            } else if (data.type === 'progress') {
              appendLog(`[进度] ${data.message}`);
            } else if (data.type === 'outline') {
              appendLog(`[大纲] ${data.message}`);
            } else if (data.type === 'detail') {
              const stageLabel = mapStageLabel(data.stage || '');
              appendLog(`[${stageLabel}] ${data.message || ''}`);
            } else if (data.type === 'complete') {
              const result = data.result;
              currentTitle = result.title;
              currentContent = result.content;
              
              appendLog('\n[完成] 文档生成成功\n');
              appendLog(`\n=== 最终文档 ===\n`);
              appendLog(result.content);
              
              const stats = result.stats;
              const expected = stats.expected_subsections || 0;
              const passed = stats.passed_subsections || 0;
              const failed = stats.failed_subsections || 0;
              const generated = stats.total_generated || (passed + failed);
              const statusStr = expected > 0 ? `${generated}/${expected}` : `${passed}`;
              
              metaEl.textContent = `文档ID: ${result.document_id} | 标题: ${result.title} | 小节: ${statusStr} (通过: ${passed}, 失败: ${failed}) | 迭代: ${stats.total_iterations} | 耗时: ${stats.generation_time}`;
              setStatus('生成成功，可以下载 DOCX。', 'ok');
              downloadBtn.disabled = false;
              startBtn.disabled = false;
              eventSource.close();
            } else if (data.type === 'error') {
              appendLog(`[错误] ${data.message}`);
              setStatus('生成失败：' + data.message, 'err');
              startBtn.disabled = false;
              eventSource.close();
            }
          } catch (err) {
            console.error('解析消息失败:', err);
          }
        });

        eventSource.addEventListener('error', (event) => {
          setStatus('连接错误，生成可能失败。', 'err');
          appendLog('\n[错误] 连接中断\n');
          if (eventSource) {
            eventSource.close();
          }
          startBtn.disabled = false;
        });

      } catch (err) {
        setStatus('启动生成失败：' + err.message, 'err');
        resultEl.textContent = '';
        startBtn.disabled = false;
      }
    });

    downloadBtn.addEventListener('click', async () => {
      if (!currentTitle || !currentContent) return;
      setStatus('正在生成 DOCX 文件...');

      try {
        const resp = await fetch('/api/download-docx', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: currentTitle, content: currentContent })
        });

        if (!resp.ok) {
          const err = await resp.text();
          throw new Error(err);
        }

        const blob = await resp.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${currentTitle}.docx`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
        setStatus('DOCX 下载完成。', 'ok');
      } catch (err) {
        setStatus('下载失败：' + err.message, 'err');
      }
    });
  </script>
</body>
</html>
