<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowerNet Agent Dashboard</title>
  <script>
    window.__FLOWERNET_LOCAL_URL = "http://127.0.0.1:8010/";
    if (window.location.protocol === "file:") {
      window.__FLOWERNET_FILE_MODE = true;
      window.location.replace(window.__FLOWERNET_LOCAL_URL);
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.0/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10/dist/framer-motion.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base: "#F4F2EE",
            ink: "#1E293B",
            slatepanel: "#1C2430",
            peach: "#F5B97A",
            coral: "#EF7C62",
            amberglass: "#F4D8A8"
          },
          boxShadow: {
            neumorph: "16px 16px 36px rgba(144, 116, 86, 0.16), -16px -16px 36px rgba(255, 255, 255, 0.78)",
            glass: "0 18px 40px rgba(80, 55, 28, 0.16)",
            darkcard: "0 18px 38px rgba(3, 8, 20, 0.45)"
          },
          borderRadius: {
            xl2: "1.5rem",
            xl3: "2rem"
          }
        }
      }
    };
  </script>
  <style>
    body {
      margin: 0;
      background: #f4f2ee;
      color: #1e293b;
      font-family: "Plus Jakarta Sans", sans-serif;
      overflow-x: hidden;
    }

    .hero-blob {
      position: absolute;
      border-radius: 9999px;
      filter: blur(45px);
      opacity: 0.68;
      pointer-events: none;
      z-index: 0;
    }

    .font-display {
      font-family: "Space Grotesk", sans-serif;
    }

    .dashed-flow {
      stroke-dasharray: 8 9;
      animation: dashmove 11s linear infinite;
    }

    @keyframes dashmove {
      to {
        stroke-dashoffset: -240;
      }
    }

    .radar-grid {
      fill: none;
      stroke: rgba(30, 41, 59, 0.26);
      stroke-width: 1;
    }

    .radar-shape {
      fill: rgba(239, 124, 98, 0.24);
      stroke: rgba(239, 124, 98, 0.9);
      stroke-width: 2;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    // Create motion components for framer-motion compatibility
    const motion = {
      div: ({ children, animate, className, ...props }) => {
        const ref = useRef(null);
        useEffect(() => {
          if (animate && ref.current) {
            Object.entries(animate).forEach(([key, value]) => {
              if (key === 'y' || key === 'x') {
                ref.current.style.transform = `translate${key === 'y' ? 'Y' : 'X'}(${value}px)`;
              } else if (key === 'scale') {
                ref.current.style.transform = `${ref.current.style.transform || ''} scale(${value})`.trim();
              } else if (key === 'boxShadow') {
                ref.current.style.boxShadow = value;
              } else {
                ref.current.style[key] = value;
              }
            });
          }
        }, [animate]);
        return <div ref={ref} className={className} {...props}>{children}</div>;
      },
      section: ({ children, animate, className, ...props }) => (
        <section className={className} {...props}>{children}</section>
      )
    };

    const PIPELINE = [
      { id: "outliner", title: "Outliner", subtitle: "结构规划" },
      { id: "generator", title: "Generator", subtitle: "内容生成" },
      { id: "verifier", title: "Verifier", subtitle: "多维质量验证" },
      { id: "controller", title: "Controller", subtitle: "定向修复" }
    ];

    const STATUS_STYLE = {
      Drafting: "bg-amber-100 text-amber-800",
      "Evaluating via UniEval": "bg-sky-100 text-sky-800",
      Repairing: "bg-orange-100 text-orange-800",
      Passed: "bg-emerald-100 text-emerald-800",
      Failed: "bg-rose-100 text-rose-800",
      Waiting: "bg-slate-100 text-slate-700"
    };

    const ARM_LABELS = {
      llm: "LLM direct rewrite",
      rule: "rule repair",
      rule_structured: "structured rule repair",
      defect_topic: "topic-focused repair",
      defect_evidence: "evidence-focused repair",
      defect_structure: "structure-focused repair",
    };

    const compactReason = (text, fallback = "") => {
      const value = String(text || "").trim();
      return value || fallback;
    };

    const getPassReason = (item = {}) => {
      const stage = String(item.stage || "");
      const reason = compactReason(item.passReason || item.pass_reason || item.acceptanceReason || item.reason);
      const arm = item.selectedArm || item.selected_arm || item.controllerArm || item.controller_arm || "";
      const armLabel = ARM_LABELS[arm] || arm;
      const attempts = Number(item.attempts || item.attempt || item.attemptsUsed || item.attempts_used || 0);
      const maxAttempts = Number(item.maxAttempts || item.max_attempts || item.max_attempts_reached || 0);
      const failedDims = Array.isArray(item.failedDimensions || item.quality_dimensions_failed) ? (item.failedDimensions || item.quality_dimensions_failed) : [];
      const sourceRefs = Number(item.sourceRefs || item.source_reference_count || 0);
      if (stage === "Passed") {
        if (reason) return reason;
        if (item.acceptedByBestDraft || item.accepted_by_best_real_draft || item.bestEffort || item.best_effort || item.forcedPass || item.forced_pass) {
          const retryText = maxAttempts ? ` after reaching ${maxAttempts} attempts` : " after exhausting retry budget";
          return `Accepted as best real draft${retryText}; no template fallback was used.`;
        }
        if (armLabel) return `Passed after Controller selected ${armLabel} and the repaired draft was accepted.`;
        if (failedDims.length > 0) return `Passed by final acceptance policy although ${failedDims.join(", ")} still needed trade-off handling; the best real draft satisfied the hard document assembly constraints.`;
        if (sourceRefs > 0) return `Passed because verifier gates and citation floor were satisfied (${sourceRefs} source refs detected).`;
        return "Passed because all active quality gates accepted this subsection.";
      }
      if (stage === "Repairing") {
        return armLabel ? `Controller is repairing this subsection with ${armLabel}.` : "Controller is repairing failed quality dimensions before final acceptance.";
      }
      if (stage === "Evaluating via UniEval") return "Verifier is checking UniEval/heuristic dimensions, citation floor, relevancy, redundancy, and source grounding.";
      if (stage === "Drafting") return "Generator is drafting this subsection before verification.";
      if (stage === "Failed") {
        if (attempts || maxAttempts) return `Not accepted yet; attempts ${attempts || "?"}/${maxAttempts || "?"}.`;
        return "This subsection was not accepted by the final policy.";
      }
      return "Waiting for generation events.";
    };

    const createEmptyVerifierDetail = () => ({
      is_passed: false,
      relevancy_index: 0,
      redundancy_index: 0,
      rel_threshold: 0,
      red_threshold: 0,
      quality_score: 0,
      quality_score_threshold: 0,
      quality_score_passed: false,
      quality_dimensions: {},
      quality_dimensions_check: {},
      quality_dimensions_failed: [],
      quality_dimensions_passed: false,
      dimension_thresholds: {},
      source_check: { passed: false, reference_count: 0, reason: "" },
      source_check_passed: false,
      source_reference_count: 0,
      acceptance_reason: "",
      selected_arm: "",
      attempts: 0,
      max_attempts: 0,
      accepted_by_best_real_draft: false,
    });

    function CountUp({ value, digits = 0 }) {
      const [display, setDisplay] = useState(0);
      useEffect(() => {
        let raf = 0;
        const start = performance.now();
        const from = display;
        const duration = 560;
        const tick = (ts) => {
          const p = Math.min(1, (ts - start) / duration);
          const next = from + (value - from) * (1 - Math.pow(1 - p, 3));
          setDisplay(next);
          if (p < 1) {
            raf = requestAnimationFrame(tick);
          }
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [value]);
      return <span>{Number(display).toFixed(digits)}</span>;
    }

    function FlowWidget({ activeNode }) {
      return (
        <div className="rounded-xl3 border border-white/60 bg-white/45 backdrop-blur-lg p-5 shadow-glass">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-display text-lg text-slate-900">Generation Flow</h3>
            <span className="text-xs font-semibold bg-slate-900 text-slate-100 rounded-full px-3 py-1">结构规划 - 小节生成 - 质量验证 - 失败修复 - 文档组装</span>
          </div>
          <div className="relative">
            <svg viewBox="0 0 980 160" className="w-full h-24">
              <path d="M90 80 C 220 20, 320 140, 460 80 S 710 20, 880 80" className="dashed-flow" stroke="#334155" fill="none" strokeWidth="2" />
            </svg>
            <div className="-mt-20 grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
              {PIPELINE.map((node, idx) => {
                const active = activeNode === node.id;
                return (
                  <motion.div
                    key={node.id}
                    animate={{ y: active ? -4 : 0, scale: active ? 1.02 : 1, boxShadow: active ? "0 0 0 2px rgba(14,116,144,0.28), 0 16px 30px rgba(7, 89, 133, 0.2)" : "0 8px 20px rgba(30,41,59,0.08)" }}
                    className="rounded-2xl bg-white border border-slate-200 px-4 py-3"
                  >
                    <div className="text-xs uppercase tracking-wide text-slate-500">Node {idx + 1}</div>
                    <div className="font-display text-slate-900 text-base">{node.title}</div>
                    <div className="text-xs text-slate-600">{node.subtitle}</div>
                    {active && <div className="mt-2 text-[11px] font-semibold text-cyan-700">Active microservice</div>}
                  </motion.div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function RadarMetrics({ metrics, summary, verifierDetail }) {
      const dimensionItems = [
        { key: "topic_alignment", label: "topic_alignment", color: "#fb923c", meaning: "主题对齐度" },
        { key: "coverage_completeness", label: "coverage_completeness", color: "#14b8a6", meaning: "覆盖完整度" },
        { key: "logical_coherence", label: "logical_coherence", color: "#ec4899", meaning: "逻辑连贯性" },
        { key: "evidence_grounding", label: "evidence_grounding", color: "#84cc16", meaning: "证据支撑度" },
        { key: "novelty", label: "novelty", color: "#ef4444", meaning: "创新性" },
        { key: "structure_clarity", label: "structure_clarity", color: "#6366f1", meaning: "结构清晰度" },
      ];
      const radarKeys = dimensionItems.map((item) => item.key);
      const cx = 160;
      const cy = 122;
      const radius = 82;
      const hexagonPoints = (scale = 1) => radarKeys.map((_, i) => {
        const angle = -Math.PI / 2 + (i * Math.PI * 2) / radarKeys.length;
        return [cx + Math.cos(angle) * radius * scale, cy + Math.sin(angle) * radius * scale];
      }).map((p) => p.join(",")).join(" ");
      const valuePoints = radarKeys.map((key, i) => {
        const angle = -Math.PI / 2 + (i * Math.PI * 2) / radarKeys.length;
        const v = Math.max(0, Math.min(1, metrics[key] || 0));
        return [cx + Math.cos(angle) * radius * v, cy + Math.sin(angle) * radius * v];
      }).map((p) => p.join(",")).join(" ");
      const currentSourceCheck = verifierDetail?.source_check || {};
      const qualityPassed = Boolean(verifierDetail?.quality_dimensions_passed);
      const sourcePassed = Boolean(verifierDetail?.source_check_passed);
      const failedDimensionText = Array.isArray(verifierDetail?.quality_dimensions_failed) && verifierDetail.quality_dimensions_failed.length
        ? verifierDetail.quality_dimensions_failed.join(", ")
        : "none";
      const currentReason = compactReason(
        verifierDetail?.acceptance_reason,
        verifierDetail?.is_passed
          ? (qualityPassed && sourcePassed && verifierDetail?.quality_score_passed
            ? "All verifier gates passed for the current subsection snapshot."
            : "The current subsection is accepted by the final workflow policy; failed local checks were resolved by controller repair or best-real draft selection.")
          : "This snapshot is not accepted yet; Controller may repair it until retry budget is exhausted."
      );
      return (
        <div id="panel-verifier" className="rounded-xl3 border border-slate-200 bg-white p-5 shadow-neumorph scroll-mt-6">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-display text-lg">Verifier Quality Control</h3>
            <span className="text-xs px-2 py-1 rounded-full bg-emerald-100 text-emerald-800 font-semibold">Current Subsection Snapshot</span>
          </div>
          <div className="flex flex-col md:flex-row gap-4 mb-4">
            <div className="shrink-0 mx-auto md:mx-0">
              <svg viewBox="0 0 320 260" className="w-48 h-40">
                <polygon className="radar-grid" points={hexagonPoints(1)}></polygon>
                <polygon className="radar-grid" points={hexagonPoints(0.78)}></polygon>
                <polygon className="radar-grid" points={hexagonPoints(0.56)}></polygon>
                <polygon className="radar-grid" points={hexagonPoints(0.34)}></polygon>
                <polygon className="radar-shape" points={valuePoints}></polygon>
              </svg>
            </div>
            <div className="flex-1 rounded-2xl border border-slate-200 bg-slate-50 p-3 text-xs text-slate-600 space-y-1">
              <div className="grid grid-cols-2 gap-x-4 gap-y-1">
                <div><span className="font-semibold text-slate-700">当前小节判定:</span> {verifierDetail?.is_passed ? "通过" : "未通过"}</div>
                <div><span className="font-semibold text-slate-700">UniEval 维度判定:</span> {qualityPassed ? "通过" : "未通过"}</div>
                <div><span className="font-semibold text-slate-700">引用判定:</span> {sourcePassed ? "通过" : "未通过"}</div>
                <div><span className="font-semibold text-slate-700">Relevancy:</span> {Number(verifierDetail?.relevancy_index || 0).toFixed(3)} / {Number(verifierDetail?.rel_threshold || 0).toFixed(2)}</div>
                <div><span className="font-semibold text-slate-700">Redundancy:</span> {Number(verifierDetail?.redundancy_index || 0).toFixed(3)} / {Number(verifierDetail?.red_threshold || 0).toFixed(2)}</div>
                <div><span className="font-semibold text-slate-700">Source refs:</span> {Number(verifierDetail?.source_reference_count || 0)}</div>
                <div><span className="font-semibold text-slate-700">UniEval samples:</span> {summary?.unieval_available_subsections ?? 0}</div>
                <div><span className="font-semibold text-slate-700">UniEval fallback:</span> {summary?.unieval_fallback_subsections ?? 0}</div>
                <div><span className="font-semibold text-slate-700">Quality avg:</span> {(summary?.quality_score_avg ?? 0).toFixed(3)}</div>
                <div><span className="font-semibold text-slate-700">Quality score:</span> {Number(verifierDetail?.quality_score || 0).toFixed(3)} / {Number(verifierDetail?.quality_score_threshold || 0).toFixed(2)} {verifierDetail?.quality_score_passed ? "PASS" : "FAIL"}</div>
              </div>
              <div className="pt-1 text-[11px] text-slate-500 leading-5">
                这里展示的是"当前小节"的 verifier 快照，不是累计平均值。
              </div>
            </div>
          </div>
          <div className="mb-4 rounded-2xl border border-cyan-100 bg-cyan-50/80 p-3 text-xs text-slate-700 leading-5">
            <div className="font-semibold text-cyan-900 mb-1">为什么局部 FAIL 仍可能最终 Passed?</div>
            <div>
              Verifier 面板显示的是当前小节某一次评估快照；最终小节判定还会综合引用底线、最大重试次数、Controller 修复收益和 best-real draft 策略。
              因此某些 UniEval 或启发式指标显示 FAIL 时，只代表该快照没有完全满足局部门槛，不等于最终文档无法接受。
            </div>
            <div className="mt-1">
              当前解释: <span className="font-semibold text-slate-900">{currentReason}</span>
              <span className="ml-2 text-slate-500">Failed dimensions: {failedDimensionText}</span>
            </div>
          </div>
          <div className="grid grid-cols-3 gap-3">
            {dimensionItems.map((item) => {
              const val = Math.max(0, Math.min(1, metrics[item.key] || 0));
              const detail = verifierDetail?.quality_dimensions_check?.[item.key] || {};
              const threshold = Number(verifierDetail?.dimension_thresholds?.[item.key] ?? 0);
              const passed = Boolean(detail.passed);
              return (
                <div key={item.key} className="rounded-2xl border border-slate-200 bg-slate-50 p-3">
                  <div className="flex items-center justify-between gap-2 mb-1">
                    <div className="text-sm font-semibold text-slate-800">{item.meaning}</div>
                    <span className={`shrink-0 text-[10px] font-semibold rounded-full px-2 py-0.5 ${passed ? "bg-emerald-100 text-emerald-700" : "bg-rose-100 text-rose-700"}`}>{passed ? "PASS" : "FAIL"}</span>
                  </div>
                  <div className="text-[11px] text-slate-400 mb-1">{item.label}</div>
                  <div className="text-[11px] text-slate-500 mb-2">threshold: {threshold.toFixed(2)}</div>
                  <div className="flex items-center justify-between text-[11px] text-slate-500 mb-1">
                    <span>value</span>
                    <span className="font-medium text-slate-700">{val.toFixed(3)}</span>
                  </div>
                  <div className="h-1.5 rounded-full bg-slate-200 overflow-hidden">
                    <motion.div initial={{ width: 0 }} animate={{ width: `${Math.round(val * 100)}%` }} className="h-full rounded-full" style={{ backgroundColor: item.color }} />
                  </div>
                </div>
              );
            })}
          </div>
          <div className="mt-3 text-[11px] text-slate-500 leading-5">
            UniEval + 启发式双通道融合评估：覆盖主题对齐、覆盖完整度、逻辑连贯、证据支撑、创新性、结构清晰度；同时检查 relevancy、redundancy 和引用。PASS/FAIL 基于各维度 value 与 threshold 对比得出。
          </div>
        </div>
      );
    }

    function BanditChart({ data, summary }) {
      const keys = ["llm", "rule", "rule_structured", "defect_topic", "defect_evidence", "defect_structure"];
      const maxLen = Math.max(...keys.map((k) => (data[k] || []).length), 1);
      const chartWidth = 440;
      const chartHeight = 128;
      const armColors = {
        llm: "#ef4444",
        rule: "#06b6d4",
        rule_structured: "#8b5cf6",
        defect_topic: "#10b981",
        defect_evidence: "#f97316",
        defect_structure: "#3b82f6",
      };
      const armVisualYOffset = {
        llm: -5,
        rule: -3,
        rule_structured: -1,
        defect_topic: 1,
        defect_evidence: 3,
        defect_structure: 5,
      };
      const legendItems = [
        { key: "llm", label: "llm", note: "LLM 直接改写", color: "bg-red-500" },
        { key: "rule", label: "rule", note: "规则修正", color: "bg-cyan-500" },
        { key: "rule_structured", label: "rule_structured", note: "结构化规则修正", color: "bg-violet-500" },
        { key: "defect_topic", label: "defect_topic", note: "主题定向修复", color: "bg-green-500" },
        { key: "defect_evidence", label: "defect_evidence", note: "证据定向修复", color: "bg-orange-500" },
        { key: "defect_structure", label: "defect_structure", note: "结构定向修复", color: "bg-blue-500" },
      ];
      const modeGuideItems = [
        { key: "epsilon_explore", title: "epsilon_explore", desc: "以 ε 概率随机探索备选策略臂，抑制早期过拟合，适用于模型尚处收敛初期的场景。" },
        { key: "epsilon_greedy", title: "epsilon_greedy", desc: "以贪心方式优先利用当前最优臂，同时保留小概率随机探索，兼顾收敛速度与策略稳健性。" },
        { key: "exploit", title: "exploit", desc: "纯利用模式，持续选取历史累积收益最高的策略臂，适用于奖励分布已趋于稳定的阶段。" },
        { key: "softmax", title: "softmax", desc: "依据各臂累积分数进行 softmax 概率采样，收益越高的臂被选中的概率越大。" },
        { key: "drift_recover", title: "drift_recover", desc: "检测到奖励分布发生漂移时自动提升探索率，触发策略重评估以适应新的数据分布。" },
        { key: "score_exploit", title: "score_exploit", desc: "按当前累积分数对策略臂降序排列，优先调度高分策略执行。" },
        { key: "ucb", title: "ucb", desc: "置信上界策略，优先选择高均值且不确定性大的臂。" },
      ];
      const pointsForArm = (key, arr, plotMin, plotMax) => {
        if (!arr || arr.length === 0) {
          return [];
        }
        const min = typeof plotMin === 'number' ? plotMin : 0.0;
        const max = typeof plotMax === 'number' && plotMax > min ? plotMax : Math.max(min + 0.0001, 0.1);
        const yTop = 20; // within group coordinates
        const yBottom = 104;
        const range = yBottom - yTop;
        const visualOffset = Number(armVisualYOffset[key] || 0);
        return arr.map((v, i) => {
          if (v === null || v === undefined || !Number.isFinite(Number(v))) {
            return null;
          }
          const x = 28 + (i / Math.max(maxLen - 1, 1)) * chartWidth;
          const val = Number(v);
          const norm = Math.max(0, Math.min(1, (val - min) / (max - min)));
          const y = Math.max(yTop, Math.min(yBottom, yBottom - norm * range + visualOffset));
          return { x, y, value: val };
        }).filter(Boolean);
      };
      const toPath = (key, arr, plotMin, plotMax) => {
        const points = pointsForArm(key, arr, plotMin, plotMax);
        if (!points.length) {
          return "";
        }
        return points.map((p, i) => `${i === 0 ? "M" : "L"}${p.x} ${p.y}`).join(" ");
      };
      const renderArmPath = (key) => {
        const d = toPath(key, data[key], summary?.bandit_plot_y_min, summary?.bandit_plot_y_max);
        return d ? <path key={key} d={d} stroke={armColors[key]} fill="none" strokeWidth="2.5" /> : null;
      };
      const renderArmPoints = (key) => {
        const points = pointsForArm(key, data[key], summary?.bandit_plot_y_min, summary?.bandit_plot_y_max);
        return points.map((p, i) => (
          <circle key={`${key}-point-${i}`} cx={p.x} cy={p.y} r="2.7" fill={armColors[key]} stroke="#0f172a" strokeWidth="0.7" />
        ));
      };

      };

      const getRuntimeMetric = (metricKey) => {
        const q = currentMetrics || {};
        const v = verifierDetail || {};
        const sourceCheck = v.source_check || {};
        switch (metricKey) {
          case "relevancy_index":
            return Number(v.relevancy_index ?? 0);
          case "redundancy_index":
            return Number(v.redundancy_index ?? 0);
          case "topic_alignment":
            return Number(q.topic_alignment ?? 0);

          case "logical_coherence":
            return Number(q.logical_coherence ?? 0);
          case "evidence_grounding":
            return Number(q.evidence_grounding ?? 0);
          case "novelty":
            return Number(q.novelty ?? 0);
          case "structure_clarity":
            return Number(q.structure_clarity ?? 0);

            return Number(v.quality_score ?? q.quality_score ?? 0);

          case "unique_citations":
          case "high_quality_per_section":
            return Number(v.source_reference_count ?? sourceCheck.reference_count ?? 0);
