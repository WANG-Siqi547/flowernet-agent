services:
  ollama:
    image: ollama/ollama:latest
    container_name: flower-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - flowernet

  verifier-app:
    build: ./flowernet-verifier
    container_name: flower-verifier
    restart: unless-stopped
    environment:
      - PORT=8000
      - USE_DATABASE=true
      - DATABASE_PATH=/data/flowernet_history.db
    volumes:
      - shared_data:/data
      - verifier_cache:/root/.cache
    networks:
      - flowernet

  controller-app:
    build: ./flowernet-controler
    container_name: flower-controller
    restart: unless-stopped
    depends_on:
      - verifier-app
    environment:
      - PORT=8001
      - VERIFIER_URL=http://verifier-app:8000
      - USE_DATABASE=true
      - DATABASE_PATH=/data/flowernet_history.db
    volumes:
      - shared_data:/data
    networks:
      - flowernet

  outliner-app:
    build: ./flowernet-outliner
    container_name: flower-outliner
    restart: unless-stopped
    depends_on:
      - ollama
    environment:
      - PORT=8003
      - OUTLINER_PROVIDER=ollama
      - OUTLINER_MODEL=qwen2.5:7b
      - OLLAMA_URL=http://ollama:11434
      - USE_DATABASE=true
      - DATABASE_PATH=/data/flowernet_history.db
      - OLLAMA_RETRIES=6
      - OLLAMA_BACKOFF=3
      - OLLAMA_MAX_BACKOFF=60
    volumes:
      - shared_data:/data
    networks:
      - flowernet

  generator-app:
    build: ./flowernet-generator
    container_name: flower-generator
    restart: unless-stopped
    depends_on:
      - ollama
      - verifier-app
      - controller-app
      - outliner-app
    environment:
      - PORT=8002
      - GENERATOR_PROVIDER=ollama
      - GENERATOR_MODEL=qwen2.5:7b
      - OLLAMA_URL=http://ollama:11434
      - VERIFIER_URL=http://verifier-app:8000
      - CONTROLLER_URL=http://controller-app:8001
      - OUTLINER_URL=http://outliner-app:8003
      - USE_DATABASE=true
      - DATABASE_PATH=/data/flowernet_history.db
      - OLLAMA_RETRIES=6
      - OLLAMA_BACKOFF=3
      - OLLAMA_MAX_BACKOFF=60
    volumes:
      - shared_data:/data
    networks:
      - flowernet

  web-app:
    build: ./flowernet-web
    container_name: flower-web
    restart: unless-stopped
    depends_on:
      - outliner-app
      - generator-app
    ports:
      - "8010:8010"
    environment:
      - OUTLINER_URL=http://outliner-app:8003
      - GENERATOR_URL=http://generator-app:8002
      - REQUEST_TIMEOUT=3600
      - API_AUTH_ENABLED=false
      - DOWNSTREAM_RETRIES=6
      - DOWNSTREAM_BACKOFF=2
      - DOWNSTREAM_MAX_BACKOFF=60
    volumes:
      - shared_data:/data
    networks:
      - flowernet

networks:
  flowernet:
    driver: bridge

volumes:
  ollama_data:
    driver: local
  shared_data:
    driver: local
  verifier_cache:
    driver: local