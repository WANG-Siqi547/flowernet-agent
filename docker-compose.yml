services:
  ollama:
    image: ollama/ollama:latest
    container_name: flower-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - flowernet

  verifier-app:
    build: ./flowernet-verifier
    container_name: flower-verifier
    restart: unless-stopped
    environment:
      - PORT=8000
      - USE_DATABASE=false
    volumes:
      - verifier_cache:/root/.cache
    networks:
      - flowernet

  controller-app:
    build: ./flowernet-controler
    container_name: flower-controller
    restart: unless-stopped
    depends_on:
      - verifier-app
    environment:
      - PORT=8001
      - VERIFIER_URL=http://verifier-app:8000
      - USE_DATABASE=false
      - CONTROLLER_USE_LLM_OUTLINE=true
      - CONTROLLER_REQUIRE_LLM_SOURCE=false
      - CONTROLLER_LLM_TIMEOUT=120
      - CONTROLLER_LLM_RETRIES=3
      - CONTROLLER_MIN_SCORE_GAIN=0.001
      - CONTROLLER_MIN_REL_ANCHOR_GAIN=0.005
      - CONTROLLER_MIN_NOVELTY_GAIN=0.005
      - CONTROLLER_MIN_STRUCTURE_GAIN=0.05
    networks:
      - flowernet

  outliner-app:
    build: ./flowernet-outliner
    container_name: flower-outliner
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - OUTLINER_PROVIDER=sensenova
      - OUTLINER_PROVIDER_CHAIN=sensenova,ollama,dashscope
      - OUTLINER_OLLAMA_MODEL=qwen2.5:1.5b
      - OLLAMA_MODEL=qwen2.5:1.5b
      - OUTLINER_MODEL=glm-5
      - OLLAMA_URL=http://ollama:11434
      - OUTLINER_AZURE_MODEL=gpt-4o-mini
      - OUTLINER_AZURE_API_BASE=https://poffices-ai.openai.azure.com/
      - OUTLINER_AZURE_API_VERSION=2025-04-01-preview
      - OUTLINER_AZURE_DEPLOYMENT_NAME=gpt-4o-mini
      - OUTLINER_AZURE_API_KEY=${OUTLINER_AZURE_API_KEY}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_API_BASE=https://poffices-ai.openai.azure.com/
      - AZURE_OPENAI_API_VERSION=2025-04-01-preview
      - AZURE_OPENAI_DEPLOYMENT_NAME=gpt-4o-mini
      - OUTLINER_DASHSCOPE_MODEL=glm-5
      - OUTLINER_DASHSCOPE_API_URL=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
      - OUTLINER_DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - OUTLINER_SENSENOVA_MODEL=SenseNova-V6-5-Turbo
      - OUTLINER_SENSENOVA_API_URL=https://api.sensenova.cn/v1/llm/chat-completions
      - OUTLINER_SENSENOVA_API_KEY=${SENSENOVA_API_KEY}
      - DASHSCOPE_MODEL=glm-5
      - DASHSCOPE_API_URL=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - SENSENOVA_MODEL=SenseNova-V6-5-Turbo
      - SENSENOVA_API_URL=https://api.sensenova.cn/v1/llm/chat-completions
      - SENSENOVA_API_KEY=${SENSENOVA_API_KEY}
      - USE_DATABASE=true
      - DATABASE_PATH=/data/flowernet_history.db
      - OLLAMA_RETRIES=6
      - OLLAMA_BACKOFF=3
      - OLLAMA_MAX_BACKOFF=60
      - PROVIDER_RETRIES=4
      - PROVIDER_BACKOFF=2.0
      - PROVIDER_MAX_BACKOFF=45.0
      - PROVIDER_JITTER=0.35
      - PROVIDER_MIN_INTERVAL=1.2
      - PROVIDER_FAILURE_THRESHOLD=2
      - PROVIDER_COOLDOWN_SECONDS=180
      - PROVIDER_HTTP_TIMEOUT=90
      - AZURE_HTTP_TIMEOUT=90
      - DASHSCOPE_HTTP_TIMEOUT=90
      - OPENROUTER_HTTP_TIMEOUT=90
      - OUTLINER_SERIALIZE_TASKS=true
      - OUTLINER_TASK_WAIT_TIMEOUT=5
      - OUTLINER_FLOW_RETRIES=6
      - OUTLINER_FLOW_BACKOFF=5.0
      - USE_DATABASE=false
    networks:
      - flowernet

  generator-app:
    build: ./flowernet-generator
    container_name: flower-generator
    restart: unless-stopped
    depends_on:
      - verifier-app
      - controller-app
      - outliner-app
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - GENERATOR_PROVIDER=sensenova
      - GENERATOR_PROVIDER_CHAIN=sensenova,ollama,dashscope
      - GENERATOR_OLLAMA_MODEL=qwen2.5:1.5b
      - OLLAMA_MODEL=qwen2.5:1.5b
      - GENERATOR_MODEL=glm-5
      - OLLAMA_URL=http://ollama:11434
      - GENERATOR_AZURE_MODEL=gpt-4o-mini
      - GENERATOR_AZURE_API_BASE=https://poffices-ai.openai.azure.com/
      - GENERATOR_AZURE_API_VERSION=2025-04-01-preview
      - GENERATOR_AZURE_DEPLOYMENT_NAME=gpt-4o-mini
      - GENERATOR_AZURE_API_KEY=${GENERATOR_AZURE_API_KEY}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_API_BASE=https://poffices-ai.openai.azure.com/
      - AZURE_OPENAI_API_VERSION=2025-04-01-preview
      - AZURE_OPENAI_DEPLOYMENT_NAME=gpt-4o-mini
      - GENERATOR_DASHSCOPE_MODEL=glm-5
      - GENERATOR_DASHSCOPE_API_URL=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
      - GENERATOR_DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - GENERATOR_SENSENOVA_MODEL=SenseNova-V6-5-Turbo
      - GENERATOR_SENSENOVA_API_URL=https://api.sensenova.cn/v1/llm/chat-completions
      - GENERATOR_SENSENOVA_API_KEY=${SENSENOVA_API_KEY}
      - DASHSCOPE_MODEL=glm-5
      - DASHSCOPE_API_URL=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - SENSENOVA_MODEL=SenseNova-V6-5-Turbo
      - SENSENOVA_API_URL=https://api.sensenova.cn/v1/llm/chat-completions
      - SENSENOVA_API_KEY=${SENSENOVA_API_KEY}
      - OLLAMA_URL=http://ollama:11434
      - VERIFIER_URL=http://verifier-app:8000
      - CONTROLLER_URL=http://controller-app:8001
      - OUTLINER_URL=http://outliner-app:8003
      - USE_REMOTE_HISTORY=false
      - HISTORY_HTTP_TIMEOUT=300
      - USE_DATABASE=false
      - OLLAMA_RETRIES=6
      - OLLAMA_BACKOFF=3
      - OLLAMA_MAX_BACKOFF=60
      - PROVIDER_RETRIES=4
      - PROVIDER_BACKOFF=2.0
      - PROVIDER_MAX_BACKOFF=45.0
      - PROVIDER_FAILURE_THRESHOLD=2
      - PROVIDER_COOLDOWN_SECONDS=180
      - PROVIDER_HTTP_TIMEOUT=90
      - DASHSCOPE_HTTP_TIMEOUT=90
      - AZURE_HTTP_TIMEOUT=90
      - OPENROUTER_HTTP_TIMEOUT=90
      - PROMPT_OUTLINE_MAX_CHARS=4500
      - PROMPT_ORIGINAL_MAX_CHARS=3500
      - PROMPT_RAG_MAX_CHARS=2200
      - PROMPT_HISTORY_MAX_CHARS=2600
      - MAX_SUBSECTION_ATTEMPTS=8
      - MAX_CONTROLLER_RETRIES=2
      - MIN_CONTROLLER_RETRIES_BEFORE_FORCE=2
      - MAX_GENERATOR_FAILURES_PER_SUBSECTION=2
      - STRICT_CONTROLLER_EFFECTIVE=false
      - SERIALIZE_DOCUMENT_WAIT_TIMEOUT=180
    volumes:
      - shared_data:/data
    networks:
      - flowernet

  web-app:
    build: ./flowernet-web
    container_name: flower-web
    restart: unless-stopped
    depends_on:
      - outliner-app
      - generator-app
    ports:
      - "8010:8010"
    environment:
      - PORT=8010
      - OUTLINER_URL=http://outliner-app:8003
      - GENERATOR_URL=http://generator-app:8002
      - REQUEST_TIMEOUT=3600
      - API_AUTH_ENABLED=false
      - DOWNSTREAM_RETRIES=10
      - DOWNSTREAM_BACKOFF=4.0
      - DOWNSTREAM_MAX_BACKOFF=180.0
      - DOWNSTREAM_JITTER=0.4
    volumes:
      - shared_data:/data
    networks:
      - flowernet

networks:
  flowernet:
    driver: bridge

volumes:
  ollama_data:
    driver: local
  shared_data:
    driver: local
  verifier_cache:
    driver: local